  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0e17;
      --surface: rgba(23, 28, 43, 0.78);
      --surface-strong: #171c2b;
      --surface-soft: rgba(255, 255, 255, 0.055);
      --text: #f7f8fb;
      --muted: #a7afc1;
      --line: rgba(255, 255, 255, 0.09);
      --accent: #a8b8ff;
      --accent-strong: #7f95ff;
      --danger: #ff9a9a;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(28px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      font-family:
        Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(110, 130, 255, 0.20), transparent 34rem),
        radial-gradient(circle at 86% 82%, rgba(158, 93, 255, 0.12), transparent 28rem),
        linear-gradient(160deg, #121727 0%, #090c14 58%, #080a11 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.15rem);
      line-height: 1.08;
      letter-spacing: -0.045em;
    }

    .track-count {
      flex: 0 0 auto;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      backdrop-filter: blur(16px);
    }

    .player-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(340px, 1.08fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px) saturate(125%);
      -webkit-backdrop-filter: blur(24px) saturate(125%);
    }

    .now-playing {
      position: sticky;
      top: max(16px, env(safe-area-inset-top));
      padding: 20px;
      overflow: hidden;
    }

    .art-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 24px;
      background: #101522;
      box-shadow: 0 22px 46px rgba(0, 0, 0, 0.34);
      isolation: isolate;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    .art-wrap:focus-visible {
      outline: 3px solid rgba(168, 184, 255, 0.48);
      outline-offset: 4px;
    }

    .art-wrap:hover .cover {
      transform: scale(1.025);
      filter: saturate(1.06);
    }

    .art-wrap:hover .cover.playing {
      transform: scale(1.05);
    }

    .art-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: inherit;
      pointer-events: none;
    }

    .cover {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(.2,.8,.2,1), filter 0.4s ease;
    }

    .cover.playing {
      transform: scale(1.035);
      filter: saturate(1.08);
    }

    .playing-badge {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 999px;
      background: rgba(7, 10, 17, 0.66);
      color: white;
      font-size: 0.74rem;
      font-weight: 800;
      backdrop-filter: blur(14px);
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .25s ease, transform .25s ease;
    }

    .playing-badge.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .equalizer {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      width: 14px;
      height: 13px;
    }

    .equalizer span {
      width: 3px;
      border-radius: 999px;
      background: var(--accent);
      animation: bounce 0.9s infinite ease-in-out;
    }

    .equalizer span:nth-child(1) { height: 45%; animation-delay: -0.2s; }
    .equalizer span:nth-child(2) { height: 100%; animation-delay: -0.45s; }
    .equalizer span:nth-child(3) { height: 68%; animation-delay: -0.1s; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(.45); }
      50% { transform: scaleY(1); }
    }

    .track-info {
      padding: 22px 4px 8px;
      text-align: center;
    }

    .track-info h2 {
      margin: 0;
      font-size: clamp(1.28rem, 4vw, 1.78rem);
      line-height: 1.15;
      letter-spacing: -0.035em;
      text-wrap: balance;
    }

    .author {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .status {
      min-height: 20px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .status.error {
      color: var(--danger);
    }

    .progress-area {
      margin-top: 16px;
    }

    .range {
      --value: 0%;
      width: 100%;
      height: 5px;
      margin: 0;
      appearance: none;
      border-radius: 999px;
      background:
        linear-gradient(
          90deg,
          var(--accent-strong) 0%,
          var(--accent-strong) var(--value),
          rgba(255,255,255,.13) var(--value),
          rgba(255,255,255,.13) 100%
        );
      cursor: pointer;
      outline: none;
    }

    .range::-webkit-slider-thumb {
      width: 16px;
      height: 16px;
      appearance: none;
      border: 3px solid var(--surface-strong);
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }

    .range::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border: 3px solid var(--surface-strong);
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }

    .range:focus-visible {
      outline: 3px solid rgba(168, 184, 255, .32);
      outline-offset: 5px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 9px;
      color: var(--muted);
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-top: 18px;
    }

    .icon-button {
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--surface-soft);
      color: var(--text);
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .icon-button:hover {
      background: rgba(255,255,255,.1);
      border-color: rgba(255,255,255,.18);
    }

    .icon-button:active {
      transform: scale(.94);
    }

    .icon-button:focus-visible,
    .track:focus-visible,
    .search-input:focus-visible,
    .speed-select:focus-visible {
      outline: 3px solid rgba(168, 184, 255, .36);
      outline-offset: 3px;
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .play-button {
      width: 68px;
      height: 68px;
      border: 0;
      background: linear-gradient(145deg, #c3cdff, #7e94ff);
      color: #111626;
      box-shadow: 0 14px 30px rgba(84, 110, 255, 0.34);
    }

    .play-button svg {
      width: 27px;
      height: 27px;
    }

    .secondary-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .volume-wrap {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .volume-icon {
      width: 20px;
      height: 20px;
      color: var(--muted);
      fill: currentColor;
    }

    .speed-select {
      min-width: 76px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.055);
      color: var(--text);
      cursor: pointer;
    }

    .playlist-panel {
      min-height: 620px;
      padding: 20px;
    }

    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .playlist-header h2 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: -0.02em;
    }

    .search {
      position: relative;
      margin-bottom: 14px;
    }

    .search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      width: 19px;
      height: 19px;
      color: var(--muted);
      fill: currentColor;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 13px 15px 13px 43px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255,255,255,.045);
      color: var(--text);
      outline: none;
    }

    .search-input::placeholder {
      color: #818a9e;
    }

    .playlist {
      display: grid;
      gap: 9px;
      max-height: calc(100dvh - 206px);
      min-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.18) transparent;
    }

    .track {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 9px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .track:hover {
      background: rgba(255,255,255,.055);
      border-color: var(--line);
    }

    .track:active {
      transform: scale(.99);
    }

    .track.active {
      border-color: rgba(168,184,255,.24);
      background: linear-gradient(90deg, rgba(127,149,255,.20), rgba(255,255,255,.035));
    }

    .track-thumb {
      width: 48px;
      height: 48px;
      display: block;
      border-radius: 12px;
      object-fit: cover;
      background: #111624;
    }

    .track-copy {
      min-width: 0;
    }

    .track-title {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 750;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-author {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.73rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-number {
      min-width: 28px;
      color: var(--muted);
      font-size: .74rem;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .track.active .track-number {
      color: var(--accent);
      font-weight: 800;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 230px;
      color: var(--muted);
      text-align: center;
      font-size: .9rem;
    }


    .install-button {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(168,184,255,.24);
      border-radius: 14px;
      background: rgba(127,149,255,.12);
      color: var(--text);
      font-weight: 750;
      cursor: pointer;
    }

    .install-button.visible {
      display: inline-flex;
    }

    .install-button:hover {
      background: rgba(127,149,255,.18);
    }

    @media (max-width: 820px) {
      body {
        padding-bottom: max(22px, env(safe-area-inset-bottom));
      }

      .player-layout {
        grid-template-columns: 1fr;
      }

      /* UPDATED: keep the artwork and player controls visible while scrolling */
      .now-playing {
        position: sticky;
        top: max(8px, env(safe-area-inset-top));
        z-index: 20;
        display: grid;
        grid-template-columns: 108px minmax(0, 1fr);
        gap: 12px 14px;
        align-items: center;
        padding: 13px;
        background: rgba(18, 23, 37, 0.94);
        box-shadow:
          0 18px 50px rgba(0, 0, 0, 0.42),
          0 1px 0 rgba(255, 255, 255, 0.06) inset;
      }

      .now-playing .art-wrap {
        grid-column: 1;
        grid-row: 1 / span 2;
        width: 108px;
        height: 108px;
        aspect-ratio: 1 / 1;
        border-radius: 18px;
      }

      .now-playing .playing-badge {
        left: 8px;
        bottom: 8px;
        padding: 6px 8px;
        font-size: 0.65rem;
      }

      .now-playing .track-info {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        padding: 0;
        text-align: left;
      }

      .now-playing .track-info h2 {
        display: -webkit-box;
        overflow: hidden;
        font-size: 1.02rem;
        line-height: 1.2;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
      }

      .now-playing .author {
        margin-top: 5px;
        font-size: 0.78rem;
      }

      .now-playing .status {
        min-height: 16px;
        margin-top: 5px;
        font-size: 0.68rem;
      }

      .now-playing .progress-area {
        grid-column: 1 / -1;
        grid-row: 3;
        margin-top: 2px;
      }

      .now-playing .time-row {
        margin-top: 6px;
        font-size: 0.68rem;
      }

      .now-playing .controls {
        grid-column: 2;
        grid-row: 2;
        display: grid;
        grid-template-columns: 42px 58px 42px;
        justify-content: start;
        align-items: center;
        column-gap: 24px;
        width: max-content;
        margin-top: 0;
      }

      .now-playing .icon-button {
        width: 42px;
        height: 42px;
      }

      .now-playing .play-button {
        width: 58px;
        height: 58px;
      }

      .now-playing .icon-button svg {
        width: 19px;
        height: 19px;
      }

      .now-playing .play-button svg {
        width: 23px;
        height: 23px;
      }

      .now-playing .secondary-controls {
        grid-column: 1 / -1;
        grid-row: 4;
        margin-top: 2px;
        padding-top: 10px;
      }

      .playlist-panel {
        min-height: auto;
      }

      .playlist {
        max-height: none;
        min-height: 0;
      }
    }

    @media (max-width: 520px) {
      body {
        padding-left: 12px;
        padding-right: 12px;
      }

      .topbar {
        padding: 0 4px;
      }

      .panel {
        border-radius: 24px;
      }

      .playlist-panel {
        padding: 14px;
      }

      /* UPDATED: compact sticky player for small phones */
      .now-playing {
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 10px 12px;
        padding: 11px;
        border-radius: 22px;
      }

      .now-playing .art-wrap {
        width: 92px;
        height: 92px;
        border-radius: 16px;
      }

      .now-playing .playing-badge {
        display: none;
      }

      .now-playing .track-info h2 {
        font-size: 0.94rem;
      }

      .now-playing .controls {
        grid-template-columns: 38px 54px 38px;
        column-gap: 20px;
      }

      .now-playing .icon-button {
        width: 38px;
        height: 38px;
      }

      .now-playing .play-button {
        width: 54px;
        height: 54px;
      }

      .now-playing .secondary-controls {
        grid-template-columns: minmax(0,1fr) auto;
      }

      .track {
        grid-template-columns: 46px minmax(0,1fr) 26px;
        padding: 8px;
      }

      .track-thumb {
        width: 46px;
        height: 46px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Solitude Reflections</p>
        <h1>Ninox Audio Player</h1>
      </div>
      <div class="track-count" id="trackCount">25 reflections</div>
    </header>

    <main class="player-layout">
      <section class="panel now-playing" aria-label="Now playing">
        <a
          id="coverLink"
          class="art-wrap"
          href="/reflections/pages/knowing-self/read.html"
          aria-label="Read Knowing Yourself"
          title="Open the written reflection"
        >
          <img id="cover" class="cover" src="" alt="Audio cover" />
          <div class="playing-badge" id="playingBadge">
            <span class="equalizer" aria-hidden="true">
              <span></span><span></span><span></span>
            </span>
            Playing
          </div>
        </a>

        <div class="track-info">
          <h2 id="title">Knowing Yourself</h2>
          <p id="author" class="author">Ninox Antolihao</p>
          <p id="status" class="status" role="status" aria-live="polite">Ready to listen</p>
        </div>

        <audio id="audio" preload="metadata"></audio>

        <div class="progress-area">
          <input
            id="progress"
            class="range"
            type="range"
            min="0"
            max="1000"
            value="0"
            aria-label="Audio progress"
          />
          <div class="time-row">

  const audio = document.getElementById("audio");
  const playButton = document.getElementById("playButton");
  const playIcon = document.getElementById("playIcon");
  const previousButton = document.getElementById("previousButton");
  const nextButton = document.getElementById("nextButton");
  const progressInput = document.getElementById("progress");
  const currentTimeSpan = document.getElementById("currentTime");
  const durationSpan = document.getElementById("duration");
  const titleEl = document.getElementById("title");
  const authorEl = document.getElementById("author");
  const coverImg = document.getElementById("cover");
  const coverLink = document.getElementById("coverLink");
  const statusEl = document.getElementById("status");
  const playingBadge = document.getElementById("playingBadge");
  const playlistEl = document.getElementById("playlist");
  const searchInput = document.getElementById("searchInput");
  const volumeInput = document.getElementById("volume");
  const speedSelect = document.getElementById("speed");
  const trackCountEl = document.getElementById("trackCount");
  const installButton = document.getElementById("installButton");

  const PLAY_PATH = "M8 5v14l11-7L8 5Z";
  const PAUSE_PATH = "M7 5h4v14H7V5Zm6 0h4v14h-4V5Z";

  let currentTrackIndex = 0;
  let filteredTrackIndexes = tracks.map((_, index) => index);
  let isSeeking = false;
  let deferredInstallPrompt = null;

  function formatTime(seconds) {
    if (!Number.isFinite(seconds) || seconds < 0) return "0:00";

    const hours = Math.floor(seconds / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const secs = Math.floor(seconds % 60).toString().padStart(2, "0");

    return hours > 0
      ? `${hours}:${minutes.toString().padStart(2, "0")}:${secs}`
      : `${minutes}:${secs}`;
  }

  function setRangeFill(element, valuePercent) {
    const safeValue = Math.max(0, Math.min(100, valuePercent || 0));
    element.style.setProperty("--value", `${safeValue}%`);
  }

  function setStatus(message, isError = false) {
    statusEl.textContent = message;
    statusEl.classList.toggle("error", isError);
  }

  function setPlayingUI(isPlaying) {
    playIcon.innerHTML = `<path d="${isPlaying ? PAUSE_PATH : PLAY_PATH}"/>`;
    playButton.setAttribute("aria-label", isPlaying ? "Pause audio" : "Play audio");
    coverImg.classList.toggle("playing", isPlaying);
    playingBadge.classList.toggle("visible", isPlaying);
  }

  function normalizeIndex(index) {
    if (index < 0) return tracks.length - 1;
    if (index >= tracks.length) return 0;
    return index;
  }

  function loadTrack(index, options = {}) {
    const { autoplay = false, restoreTime = 0 } = options;

    index = normalizeIndex(index);
    const track = tracks[index];
    if (!track) return;

    currentTrackIndex = index;

    titleEl.textContent = track.title;
    authorEl.textContent = track.author || "Ninox Antolihao";

    coverImg.src = track.cover || "/audio-player/icon.png";
    coverImg.alt = `${track.title} cover`;

    coverLink.href = track.read || "/reflections/";
    coverLink.setAttribute("aria-label", `Read ${track.title}`);
    coverLink.title = `Read ${track.title}`;

    progressInput.value = "0";
    setRangeFill(progressInput, 0);
    currentTimeSpan.textContent = "0:00";
    durationSpan.textContent = "0:00";

    setPlayingUI(false);
    setStatus("Loading audio…");

    const onReady = async () => {
      durationSpan.textContent = formatTime(audio.duration);

      if (restoreTime > 0 && Number.isFinite(audio.duration)) {
        audio.currentTime = Math.min(restoreTime, Math.max(0, audio.duration - 1));
        currentTimeSpan.textContent = formatTime(audio.currentTime);

        const percent = (audio.currentTime / audio.duration) * 100;
        progressInput.value = String(Math.round(percent * 10));
        setRangeFill(progressInput, percent);
      }

      setStatus("Ready to listen");

      if (autoplay) {
        await playAudio();
      }
    };

    audio.addEventListener("loadedmetadata", onReady, { once: true });

    audio.src = track.audio;
    audio.load();

    updatePlaylist();

    localStorage.setItem("ninox-current-track", String(index));
    document.title = `${track.title} | Ninox Audio Player`;
  }

  async function playAudio() {
    try {
      setStatus("Starting…");
      await audio.play();
      setPlayingUI(true);
      setStatus("Now playing");
    } catch (error) {
      console.error("Audio could not play:", error);
      setPlayingUI(false);
      setStatus("Unable to play this file. Check the MP3 path or filename.", true);
    }
  }

  function pauseAudio() {
    audio.pause();
    setPlayingUI(false);
    setStatus("Paused");
  }

  function togglePlay() {
    if (audio.paused) {
      playAudio();
    } else {
      pauseAudio();
    }
  }

  function previousTrack() {
    if (audio.currentTime > 5) {
      audio.currentTime = 0;
      return;
    }

    const position = filteredTrackIndexes.indexOf(currentTrackIndex);
    const previousPosition = position > 0 ? position - 1 : filteredTrackIndexes.length - 1;
    const previousIndex = filteredTrackIndexes[previousPosition] ?? normalizeIndex(currentTrackIndex - 1);

    loadTrack(previousIndex, { autoplay: true });
  }

  function nextTrack() {
    const position = filteredTrackIndexes.indexOf(currentTrackIndex);
    const nextPosition = position >= 0 && position < filteredTrackIndexes.length - 1 ? position + 1 : 0;
    const nextIndex = filteredTrackIndexes[nextPosition] ?? normalizeIndex(currentTrackIndex + 1);

    loadTrack(nextIndex, { autoplay: true });
  }

  function updateProgressUI() {
    if (!Number.isFinite(audio.duration) || audio.duration <= 0 || isSeeking) return;

    const percent = (audio.currentTime / audio.duration) * 100;

    progressInput.value = String(Math.round(percent * 10));
    setRangeFill(progressInput, percent);
    currentTimeSpan.textContent = formatTime(audio.currentTime);

    localStorage.setItem(
      "ninox-playback-position",
      JSON.stringify({
        index: currentTrackIndex,
        time: Math.floor(audio.currentTime)
      })
    );
  }

  function updatePlaylist() {
    playlistEl.innerHTML = "";

    if (!filteredTrackIndexes.length) {
      playlistEl.innerHTML = `<div class="empty-state">No reflection matches your search.</div>`;
      trackCountEl.textContent = "0 results";
      return;
    }

    const fragment = document.createDocumentFragment();

    filteredTrackIndexes.forEach((trackIndex, visibleIndex) => {
      const track = tracks[trackIndex];

      const button = document.createElement("button");
      button.type = "button";
      button.className = "track";
      button.dataset.index = String(trackIndex);

      if (trackIndex === currentTrackIndex) {
        button.classList.add("active");
        button.setAttribute("aria-current", "true");
      }

      const thumb = document.createElement("img");
      thumb.className = "track-thumb";
      thumb.src = track.cover || "/audio-player/icon.png";
      thumb.alt = "";
      thumb.loading = "lazy";

      const copy = document.createElement("span");
      copy.className = "track-copy";

      const name = document.createElement("span");
      name.className = "track-title";
      name.textContent = track.title;

      const byline = document.createElement("span");
      byline.className = "track-author";
      byline.textContent = track.author || "Ninox Antolihao";

      const number = document.createElement("span");
      number.className = "track-number";
      number.textContent = String(visibleIndex + 1).padStart(2, "0");

      copy.append(name, byline);
      button.append(thumb, copy, number);

      button.addEventListener("click", () => {
        if (trackIndex === currentTrackIndex) {
          togglePlay();
        } else {
          loadTrack(trackIndex, { autoplay: true });
        }
      });

      fragment.appendChild(button);
    });

    playlistEl.appendChild(fragment);

    trackCountEl.textContent =
      filteredTrackIndexes.length === tracks.length
        ? `${tracks.length} reflections`
        : `${filteredTrackIndexes.length} results`;
  }

  function filterTracks() {
    const query = searchInput.value.trim().toLowerCase();

    filteredTrackIndexes = tracks
      .map((track, index) => ({ track, index }))
      .filter(({ track }) =>
        `${track.title} ${track.author || ""}`.toLowerCase().includes(query)
      )
      .map(({ index }) => index);

    updatePlaylist();
  }

  playButton.addEventListener("click", togglePlay);
  previousButton.addEventListener("click", previousTrack);
  nextButton.addEventListener("click", nextTrack);
  searchInput.addEventListener("input", filterTracks);

  audio.addEventListener("loadedmetadata", () => {
    durationSpan.textContent = formatTime(audio.duration);
    setStatus("Ready to listen");
  });

  audio.addEventListener("canplay", () => {
    if (audio.paused) setStatus("Ready to listen");
  });

  audio.addEventListener("waiting", () => {
    if (!audio.paused) setStatus("Buffering…");
  });

  audio.addEventListener("playing", () => {
    setPlayingUI(true);
    setStatus("Now playing");
  });

  audio.addEventListener("pause", () => {
    if (!audio.ended) {
      setPlayingUI(false);
    }
  });

  audio.addEventListener("error", () => {
    setPlayingUI(false);
    setStatus("Audio file not found or could not be loaded.", true);
  });

  audio.addEventListener("timeupdate", updateProgressUI);
  audio.addEventListener("ended", nextTrack);

  progressInput.addEventListener("input", () => {
    isSeeking = true;

    const percent = Number(progressInput.value) / 10;
    setRangeFill(progressInput, percent);

    if (Number.isFinite(audio.duration) && audio.duration > 0) {
      currentTimeSpan.textContent = formatTime((percent / 100) * audio.duration);
    }
  });

  progressInput.addEventListener("change", () => {
    if (Number.isFinite(audio.duration) && audio.duration > 0) {
      audio.currentTime = (Number(progressInput.value) / 1000) * audio.duration;
    }

    isSeeking = false;
  });

  volumeInput.addEventListener("input", () => {
    audio.volume = Number(volumeInput.value);
    setRangeFill(volumeInput, Number(volumeInput.value) * 100);
    localStorage.setItem("ninox-volume", volumeInput.value);
  });

  speedSelect.addEventListener("change", () => {
    audio.playbackRate = Number(speedSelect.value);
    localStorage.setItem("ninox-speed", speedSelect.value);
  });

  coverImg.addEventListener("error", () => {
    coverImg.src = "/audio-player/icon.png";
  });

  playlistEl.addEventListener("error", event => {
    if (event.target.matches(".track-thumb")) {
      event.target.src = "/audio-player/icon.png";
    }
  }, true);

  document.addEventListener("keydown", event => {
    if (event.target.matches("input, select, textarea")) return;

    if (event.code === "Space") {
      event.preventDefault();
      togglePlay();
    }

    if (event.code === "ArrowRight") {
      audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
    }

    if (event.code === "ArrowLeft") {
      audio.currentTime = Math.max(0, audio.currentTime - 10);
    }
  });

  window.addEventListener("beforeinstallprompt", event => {
    event.preventDefault();
    deferredInstallPrompt = event;
    installButton.classList.add("visible");
  });

  installButton.addEventListener("click", async () => {
    if (!deferredInstallPrompt) return;

    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;

    deferredInstallPrompt = null;
    installButton.classList.remove("visible");
  });

  const savedVolume = Number(localStorage.getItem("ninox-volume"));
  if (Number.isFinite(savedVolume) && savedVolume >= 0 && savedVolume <= 1) {
    audio.volume = savedVolume;
    volumeInput.value = String(savedVolume);
  }

  setRangeFill(volumeInput, Number(volumeInput.value) * 100);

  const savedSpeed = localStorage.getItem("ninox-speed");
  if ([...speedSelect.options].some(option => option.value === savedSpeed)) {
    speedSelect.value = savedSpeed;
    audio.playbackRate = Number(savedSpeed);
  }

  let initialIndex = Number(localStorage.getItem("ninox-current-track"));
  if (!Number.isInteger(initialIndex) || initialIndex < 0 || initialIndex >= tracks.length) {
    initialIndex = 0;
  }

  let restoreTime = 0;

  try {
    const savedPosition = JSON.parse(localStorage.getItem("ninox-playback-position"));

    if (
      savedPosition &&
      savedPosition.index === initialIndex &&
      Number.isFinite(savedPosition.time)
    ) {
      restoreTime = savedPosition.time;
    }
  } catch (error) {
    restoreTime = 0;
  }

  trackCountEl.textContent = `${tracks.length} reflections`;
  loadTrack(initialIndex, { restoreTime });
</script>
