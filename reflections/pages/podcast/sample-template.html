<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>{{TITLE}} | Solitude Reflections</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="robots" content="index,follow">
<meta name="author" content="Ninox Antolihao">
<link rel="canonical" href="{{CANONICAL_URL}}">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="Solitude Reflections">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="{{CANONICAL_URL}}">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="og:image:alt" content="{{TITLE}}">
<meta property="fb:app_id" content="2895055444086567">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{DESCRIPTION}}">
<meta name="twitter:image" content="{{OG_IMAGE}}">

<!-- PWA -->
<link rel="manifest" href="/reflections/manifest.json">
<link rel="icon" href="/reflections/assets/icons/favicon.ico">
<link rel="apple-touch-icon" href="/reflections/assets/icons/apple-touch-icon-180x180.png">
<meta name="theme-color" content="#fffdf9">

<!-- CSS -->
<link rel="stylesheet" href="/reflections/assets/read.css">

<!-- Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-J6LE469GW6"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-J6LE469GW6');
</script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9771423771078445" crossorigin="anonymous"></script>

</head>

<body>
<main>

<header>

<!-- TOP NAV -->
<div class="utility-bar">
<a class="utility-chip" href="/reflections/">Home</a>
<a class="utility-chip" href="/reflections/">Reflections</a>
<a class="utility-chip" href="#cusdis_thread">Comments</a>
</div>

<!-- FIXED LOGO -->
<img src="/reflections/assets/icons/solitude-logo-master.png" alt="Solitude Reflections logo">

<h1>{{TITLE}}</h1>
<p class="meta">{{AUTHOR_LINE}}</p>

</header>

<!-- SMART BACK -->
<div class="back-nav">
<button class="back-btn" onclick="if(history.length>1){history.back()}else{location.href='/reflections/'}">
← Back
</button>
</div>

<!-- AUDIO -->
<div class="audio-section">
<span class="audio-label">Listen</span>
<audio controls>
<source src="{{AUDIO_FILE}}" type="audio/mpeg">
</audio>
</div>

<!-- AD -->
<div class="ads">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-9771423771078445"
data-ad-slot="6628486781"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

<!-- CONTENT -->
{{CONTENT}}

<!-- SHARE -->
<div class="share">
<a id="fb" target="_blank">Facebook</a> |
<a id="wa" target="_blank">WhatsApp</a> |
<a id="tg" target="_blank">Telegram</a>
</div>

<!-- COMMENTS -->
<div id="cusdis_thread"
data-host="https://cusdis.com"
data-app-id="YOUR_CUSDIS_ID">
</div>

<!-- FOOTER -->
<footer>
<p>
<a href="https://www.facebook.com/stonecitygrill" target="_blank">Stone Grill Press</a>
· Leyte, Philippines · © 2025
<a href="YOUR_PROFILE_LINK" target="_blank">Ninox Antolihao</a><br>
First Edition — 2025
</p>
</footer>

</main>

<!-- SCRIPTS -->
<script src="https://cusdis.com/js/cusdis.es.js"></script>

<script>
const url = encodeURIComponent(location.href);
const title = encodeURIComponent(document.title);

document.getElementById('fb').href =
`https://www.facebook.com/sharer/sharer.php?u=${url}`;

document.getElementById('wa').href =
`https://wa.me/?text=${title}%20${url}`;

document.getElementById('tg').href =
`https://t.me/share/url?url=${url}&text=${title}`;

const el = document.getElementById('cusdis_thread');
el.setAttribute('data-page-id', location.pathname);
el.setAttribute('data-page-url', location.href);
el.setAttribute('data-page-title', document.title);
</script>

<!-- SAFE SW -->
<script>
if ('serviceWorker' in navigator && !location.pathname.includes('/reflections/pages/')) {
navigator.serviceWorker.register('/reflections/sw.js');
}
</script>

</body>
</html>
