            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }

        // --- PIN SCREEN COMPONENT ---
        function PinScreen({ onUnlock }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            const CORRECT_PIN = '1234';

            const handlePress = (num) => {
                if (pin.length < 4 && !error) {
                    const newPin = pin + num;
                    setPin(newPin);
                    if (newPin.length === 4) {
                        if (newPin === CORRECT_PIN) setTimeout(onUnlock, 200);
                        else {
                            setError(true);
                            setTimeout(() => { setPin(''); setError(false); }, 800);
                        }
                    }
                }
            };

            const handleDelete = () => { if (pin.length > 0 && !error) setPin(pin.slice(0, -1)); };

            return (
                <div className="fixed inset-0 bg-blue-950 flex flex-col items-center justify-center p-4 z-50">

        // --- MAIN APP COMPONENT ---
        function App() {
            // General UI State
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(true);
            
            // Standard States
            const [selectedMonth, setSelectedMonth] = useState('2026-03');
            const [showPayCardEmpId, setShowPayCardEmpId] = useState(null); 
            const [showAddEmp, setShowAddEmp] = useState(false);
            const [rawInput, setRawInput] = useState(defaultRawData);
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '' });
            const [viewProfile, setViewProfile] = useState(null);
            const [reportDates, setReportDates] = useState({ start: '2026-03-01', end: '2026-03-31' });

            // --- LIFTED HOOKS FOR INTERACTIVE CARD ---
            const [icEmpId, setIcEmpId] = useState('');
            const [icDateStart, setIcDateStart] = useState('2026-03-01');
            const [icDateEnd, setIcDateEnd] = useState('2026-03-31');
            const [icForm, setIcForm] = useState({ days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0, other_deductions: 0 });

            // --- LIFTED HOOKS FOR ADD EMPLOYEE MODAL ---
            const [newEmpForm, setNewEmpForm] = useState({
                name: '', position: '', dept: '', rate: '', contact_number: '', address: '', date_hired: new Date().toISOString().slice(0,10), status: 'Active'
            });

            // Mobile responsiveness
            useEffect(() => {
                const handleResize = () => setSidebarOpen(window.innerWidth >= 1024);
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleTabSwitch = (tab) => {
                setActiveTab(tab);
                if (window.innerWidth < 1024) setSidebarOpen(false);
            };

            // --- DATA PERSISTENCE ---
            const loadData = (key, defaultData) => {
                try {
                    const saved = localStorage.getItem('stonegrill_' + key);
                    return saved ? JSON.parse(saved) : defaultData;
                } catch (e) { return defaultData; }
            };

            const [employees, setEmployees] = useState(() => loadData('employees', initialEmployees));
            const [attendance, setAttendance] = useState(() => loadData('attendance', []));
            const [cashAdvances, setCashAdvances] = useState(() => loadData('cashAdvances', initialCashAdvances));
            const [interactivePayrolls, setInteractivePayrolls] = useState(() => loadData('interactivePayrolls', []));

            useEffect(() => { localStorage.setItem('stonegrill_employees', JSON.stringify(employees)); }, [employees]);
            useEffect(() => { localStorage.setItem('stonegrill_attendance', JSON.stringify(attendance)); }, [attendance]);
            useEffect(() => { localStorage.setItem('stonegrill_cashAdvances', JSON.stringify(cashAdvances)); }, [cashAdvances]);
            useEffect(() => { localStorage.setItem('stonegrill_interactivePayrolls', JSON.stringify(interactivePayrolls)); }, [interactivePayrolls]);

            // Set Initial icEmpId safely after employees are loaded
            useEffect(() => {
                if (!icEmpId && employees.length > 0) {
                    setIcEmpId(employees[0].id.toString());
                }
            }, [employees, icEmpId]);

            // Interactive Card Form Data Loader Effect
            useEffect(() => {
                if (icEmpId && icDateStart && icDateEnd) {
                    const key = `${icEmpId}_${icDateStart}_${icDateEnd}`;
                    const existingRecord = interactivePayrolls.find(p => p.id === key);
                    if (existingRecord) {
                        setIcForm(existingRecord.data);
                    } else {
                        // Default to zero per spec
                        setIcForm({ days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0, other_deductions: 0 });
                    }
                }
            }, [icEmpId, icDateStart, icDateEnd, interactivePayrolls]);


            // Computed Standard Payroll Data
            const payrollData = useMemo(() => {
                return employees.map(emp => {
                    const empAtt = attendance.filter(a => a.empId === emp.id && a.date.startsWith(selectedMonth));
                    const daysWorked = empAtt.reduce((sum, record) => sum + record.dayEquivalent, 0);
                    const gross = daysWorked * emp.rate;
                    const sss = gross > 0 ? 135 : 0;
                    const philhealth = gross > 0 ? 100 : 0;
                    const pagibig = gross > 0 ? 100 : 0;
                    
                    let caDeduction = 0;
                    if (emp.caBalance > 0 && gross > 0) caDeduction = Math.min(emp.caBalance, gross * 0.2);
                    
                    const totalDeductions = sss + philhealth + pagibig + caDeduction;
                    const netSalary = gross - totalDeductions;
                    
                    return {
                        ...emp,
                        daysWorked,
                        gross,
                        sss,
                        philhealth,
                        pagibig,
                        caDeduction,
                        totalDeductions,
                        netSalary,
                        newCaBalance: emp.caBalance - caDeduction
                    };
                });
            }, [employees, attendance, cashAdvances, selectedMonth]);

            const metrics = useMemo(() => {
                const today = '2026-03-01'; 
                const presentToday = attendance.filter(a => a.date === today).length;
                const totalCaBalance = employees.reduce((sum, e) => sum + e.caBalance, 0);
                const negativeBalances = payrollData.filter(p => p.netSalary < 0).length;

                return { totalEmployees: employees.length, presentToday, absentToday: employees.length - presentToday, totalCaBalance, negativeBalances };
            }, [employees, attendance, payrollData]);


            // --- PARSER LOGIC ---
            const parseBiometricData = (rawData) => {
                const lines = rawData.trim().split('\n');
                const logsMap = {};

                lines.forEach(line => {
                    const parts = line.split('\t').map(p => p.trim());
                    if (parts.length >= 4 && parts[0] !== 'ID' && parts[0] !== '') {
                        const empId = parseInt(parts[0]);
                        const timeStrRaw = parts[3].replace(/\s+/g, ' '); 
                        const [datePart, timePart] = timeStrRaw.split(' ');
                        
                        if (!datePart || !timePart) return;

                        const [m, d, y] = datePart.split('/');
                        const isoDate = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
                        
                        const key = `${empId}_${isoDate}`;
                        if (!logsMap[key]) logsMap[key] = { empId, date: isoDate, punches: [] };
                        logsMap[key].punches.push(timePart);
                    }
                });

                const processed = Object.values(logsMap).map(log => {
                    log.punches.sort();
                    const firstIn = log.punches[0];
                    const lastOut = log.punches[log.punches.length - 1];
                    let hours = 0, dayEquivalent = 0, remarks = 'Missing Out';

                    if (log.punches.length > 1 && firstIn !== lastOut) {
                        const t1 = new Date(`1970-01-01T${firstIn}Z`);
                        const t2 = new Date(`1970-01-01T${lastOut}Z`);
                        hours = (t2 - t1) / (1000 * 60 * 60);
                        if (hours >= 7.5) dayEquivalent = 1;
                        else if (hours >= 4) dayEquivalent = 0.5;
                        else dayEquivalent = Number((hours / 8).toFixed(2));
                        remarks = hours >= 7.5 ? 'Complete' : 'Undertime';
                    } else {
                        if (log.empId === 6 || log.empId === 1) {
                            dayEquivalent = 1; hours = 8; remarks = 'Manual Override (1 Punch)';
                        }
                    }

                    return { id: Math.random().toString(36).substr(2, 9), empId: log.empId, date: log.date, firstIn, lastOut: log.punches.length > 1 ? lastOut : '--:--:--', hours: hours.toFixed(2), dayEquivalent, remarks };
                });

                setAttendance(prev => {
                    const merged = [...prev];
                    let addedCount = 0;
                    processed.forEach(newLog => {
                        const exists = merged.find(a => a.empId === newLog.empId && a.date === newLog.date && a.firstIn === newLog.firstIn);
                        if (!exists) { merged.push(newLog); addedCount++; }
                    });

                                                    style={{ textAlignLast: 'center' }}
                                                >
                                                    <option value={selectedMonth}>{monthName}</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="mb-8 relative z-10">
                                            <div className="border-b-[3px] border-[#c55a5a] pb-1 mb-2 inline-block relative max-w-full">
                                                <select 
                                                    value={showPayCardEmpId} 
                                                    onChange={e => setShowPayCardEmpId(parseInt(e.target.value))}
                                                    className="text-xl sm:text-2xl font-bold text-slate-900 outline-none appearance-none cursor-pointer bg-transparent pr-8 w-full truncate print:appearance-auto"
                                                >
                                                    {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                                </select>
                                                <div className="absolute right-0 bottom-3 w-0 h-0 border-l-[5px] border-r-[5px] border-t-[6px] border-transparent border-t-slate-400 pointer-events-none print:hidden"></div>
                                            </div>
                                            <div className="flex justify-between items-end flex-wrap gap-2">
                                                <div className="text-slate-700 text-base sm:text-lg truncate max-w-[60%]">{empProfile?.dept || 'Department'}</div>
                                                <div className="text-slate-900 text-base sm:text-lg font-bold shrink-0">
                                                    DAYS <span className="text-black ml-1 sm:ml-2 text-lg sm:text-xl">{activePayroll?.daysWorked || '0'}</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="w-full text-sm sm:text-base border-collapse relative z-10">
                                            <div className="flex text-center mb-4">
                                                <div className="flex-1 bg-[#dce6f2] py-2 text-slate-800 tracking-wide font-medium">EARNINGS</div>
                                                <div className="flex-1 bg-[#fae6d4] py-2 text-slate-800 tracking-wide font-medium">DEDUCTIONS</div>
                                            </div>

                                            <div className="flex border-b border-transparent mb-4 flex-col sm:flex-row gap-4 sm:gap-0">
                                                <div className="flex-1 sm:pr-6 flex flex-col gap-3">
                                                    <div className="flex justify-between">
                                                        <span className="text-slate-800">AMT ({activePayroll?.rate}/day)</span>
                                                        <span className="text-slate-900 flex items-center font-medium">
                                                            <span className="mr-1 text-sm font-normal">₱</span>{formatNum(activePayroll?.gross)}
                                                        </span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-slate-800">Bonus :</span>
                                                        <span className="text-slate-900 font-medium"></span>
                                                    </div>
                                                </div>
                                                <div className="border-b border-slate-200 sm:hidden w-full"></div>
                                                <div className="flex-1 sm:pl-6 flex flex-col gap-3 border-l border-gray-100">
                                                    <div className="flex justify-between">
                                                        <span className="text-slate-800">C.A.</span>
                                                        <span className="text-slate-900 font-medium">{formatNum(activePayroll?.caDeduction)}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-slate-800">SSS/PH/PI</span>
                                                        <span className="text-slate-900 font-medium">{formatNum(activePayroll?.totalDeductions - activePayroll?.caDeduction)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex text-center font-medium mt-8 flex-col sm:flex-row gap-2 sm:gap-0">
                                                <div className="flex-1 bg-[#dce6f2] py-3 flex justify-between px-4 sm:px-6 items-center">
                                                    <span className="text-slate-800">TOTAL :</span>
                                                    <span className="text-slate-900 flex items-center"><span className="mr-1 text-sm">₱</span> {formatNum(activePayroll?.gross)}</span>
                                                </div>
                                                <div className="flex-1 bg-[#fae6d4] py-3 flex justify-between px-4 sm:px-6 items-center">
                                                    <span className="text-slate-800">TOTAL :</span>
                                                    <span className="text-slate-900">{formatNum(activePayroll?.totalDeductions)}</span>
                                                </div>
                                            </div>

                                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mt-8 pl-0 sm:pl-6 gap-3 sm:gap-0">
                                                <div className="text-base sm:text-lg text-slate-800">TOTAL EARNINGS :</div>
                                                <div className={`w-full sm:w-auto text-center px-6 sm:px-10 py-3 text-xl sm:text-2xl font-bold ${activePayroll?.netSalary < 0 ? 'bg-[#ffcccb] text-[#8b0000]' : 'bg-slate-100 text-slate-900'}`}>
                                                    {activePayroll?.netSalary < 0 ? activePayroll?.netSalary : formatNum(activePayroll?.netSalary || 0)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-4 border-t border-slate-200 text-center print:hidden flex justify-between items-center shrink-0">
                                        <div className="text-xs text-slate-400">View format</div>
                                        <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium text-sm transition-colors">
                                            Print Payslip
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW PROFILE MODAL */}
                        {viewProfile && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                                    <div className="bg-blue-900 text-white p-4 flex justify-between items-center shrink-0">
                                        <h2 className="text-xl font-bold tracking-tight">Employee Profile Ledger</h2>
                                        <button onClick={() => setViewProfile(null)} className="text-white/70 hover:text-white"><X className="w-5 h-5"/></button>
                                    </div>
                                    <div className="overflow-y-auto p-4 md:p-6 flex-1 space-y-6">
                                        
                                        <div className="flex justify-between items-start border-b border-gray-100 pb-4">
                                            <div>
                                                <h3 className="text-2xl font-bold text-gray-800 mb-1">{viewProfile.name}</h3>
                                                <p className="text-xs text-gray-500 font-medium uppercase tracking-wider mb-2">ID: {viewProfile.id} • {viewProfile.position || viewProfile.dept}</p>
                                                
                                                <div className="text-sm text-gray-600 mt-2 space-y-1">
                                                    <p><b>Contact:</b> {viewProfile.contact_number || 'N/A'}</p>
                                                    <p><b>Address:</b> {viewProfile.address || 'N/A'}</p>
                                                    <p><b>Date Hired:</b> {viewProfile.date_hired || 'N/A'}</p>
                                                </div>
                                            </div>
                                            <div className="text-right flex flex-col items-end">
                                                <span className="px-3 py-1 text-xs uppercase tracking-wider font-bold rounded-full bg-green-100 text-green-800 shadow-sm">{viewProfile.status}</span>
                                                <p className="mt-2 text-sm font-mono tracking-tight text-gray-600">Rate: ₱{Number(viewProfile.rate).toFixed(2)}/day</p>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="border border-gray-200 p-4 rounded-xl bg-gray-50 shadow-sm">
                                                <h4 className="font-bold text-gray-500 text-[11px] mb-1 uppercase tracking-wider">Total Days Worked</h4>
                                                <p className="text-3xl font-mono tracking-tight text-blue-700 font-bold">
                                                    {attendance.filter(a => a.empId === viewProfile.id).reduce((sum, a) => sum + a.dayEquivalent, 0)} <span className="text-sm font-sans font-medium text-gray-500">days</span>
                                                </p>
                                            </div>
                                            <div className="border border-red-200 p-4 rounded-xl bg-red-50 shadow-sm">
                                                <h4 className="font-bold text-red-800/60 text-[11px] mb-1 uppercase tracking-wider">Outstanding C.A. Balance</h4>
                                                <p className="text-3xl font-mono tracking-tight text-red-600 font-bold">₱{Number(viewProfile.caBalance || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                            </div>
                                        </div>

                                        <div>
                                            <h4 className="font-bold text-gray-800 mb-3 flex items-center text-sm"><Banknote className="w-4 h-4 mr-1.5 text-gray-500"/> Cash Advance Ledger</h4>
                                            <div className="border border-gray-200 rounded-lg overflow-hidden">
                                                <table className="w-full text-xs text-left">
                                                    <thead className="bg-gray-50 text-gray-500 uppercase text-[10px] tracking-wider">
                                                        <tr><th className="p-3">Date</th><th className="p-3">Reason</th><th className="p-3 text-right">Amount</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-gray-100">
                                                        {cashAdvances.filter(ca => ca.empId === viewProfile.id).length === 0 ? 
                                                            <tr><td colSpan="3" className="p-6 text-center text-gray-400">No cash advances on record.</td></tr> :
                                                            cashAdvances.filter(ca => ca.empId === viewProfile.id).map(ca => (
                                                                <tr key={ca.id} className="hover:bg-gray-50 transition-colors">
                                                                    <td className="p-3 font-medium text-gray-700">{ca.date}</td>
                                                                    <td className="p-3 text-gray-600">{ca.reason}</td>
                                                                    <td className="p-3 text-right font-mono tracking-tight font-bold text-red-600">₱{ca.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                                                                </tr>
                                                            ))
                                                        }
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ADD EMPLOYEE MODAL EXTENDED */}
                        {showAddEmp && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                <form onSubmit={handleAddEmployee} className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                    <div className="flex justify-between items-center p-6 border-b border-gray-100 bg-gray-50 shrink-0">
                                        <h3 className="text-lg font-bold">Add New Employee Profile</h3>
                                        <button type="button" onClick={() => setShowAddEmp(false)}><X className="w-5 h-5 text-gray-500 hover:text-gray-800"/></button>
                                    </div>
                                    <div className="p-6 space-y-4 overflow-y-auto custom-scrollbar flex-1">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2">
                                                <label className="text-xs font-bold text-gray-500 uppercase">Full Name</label>
                                                <input type="text" required value={newEmpForm.name} onChange={e => setNewEmpForm({...newEmpForm, name: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1"/>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 uppercase">Position / Role</label>
                                                <input type="text" value={newEmpForm.position} onChange={e => setNewEmpForm({...newEmpForm, position: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1"/>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 uppercase">Department</label>
                                                <input type="text" value={newEmpForm.dept} onChange={e => setNewEmpForm({...newEmpForm, dept: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1"/>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 uppercase">Daily Rate (₱)</label>
                                                <input type="number" required value={newEmpForm.rate} onChange={e => setNewEmpForm({...newEmpForm, rate: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1"/>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 uppercase">Status</label>
                                                <select value={newEmpForm.status} onChange={e => setNewEmpForm({...newEmpForm, status: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1 bg-white">
                                                    <option value="Active">Active</option>
                                                    <option value="Inactive">Inactive</option>
                                                    <option value="Terminated">Terminated</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 uppercase">Contact Number</label>
                                                <input type="text" value={newEmpForm.contact_number} onChange={e => setNewEmpForm({...newEmpForm, contact_number: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1"/>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 uppercase">Date Hired</label>
                                                <input type="date" value={newEmpForm.date_hired} onChange={e => setNewEmpForm({...newEmpForm, date_hired: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1"/>
                                            </div>
                                            <div className="col-span-2">
                                                <label className="text-xs font-bold text-gray-500 uppercase">Address</label>
                                                <input type="text" value={newEmpForm.address} onChange={e => setNewEmpForm({...newEmpForm, address: e.target.value})} className="w-full border border-gray-300 focus:border-blue-500 outline-none p-2 rounded mt-1"/>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-6 border-t border-gray-100 bg-gray-50 shrink-0">
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded shadow-sm transition-colors">Save Employee Profile</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </React.Fragment>
                );
            };

            if (!isAuthenticated) return <PinScreen onUnlock={() => setIsAuthenticated(true)} />;

            return (
                <div className="flex h-screen bg-gray-50 font-sans text-gray-900 overflow-hidden relative">
                    
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/50 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />}

                    {/* SIDEBAR */}
                    <aside className={`fixed lg:static inset-y-0 left-0 z-40 bg-blue-900 text-white transition-all duration-300 flex flex-col h-full ${isSidebarOpen ? 'translate-x-0 w-64' : '-translate-x-full w-64 lg:translate-x-0 lg:w-20'} flex-shrink-0`}>
                        <div className="p-4 flex items-center justify-between border-b border-blue-800">
                            {isSidebarOpen ? (
                                <div className="font-black text-xl tracking-tight flex items-center">
                                    <span className="bg-white text-blue-900 p-1 rounded mr-2"><LayoutDashboard className="w-5 h-5"/></span> STONEGRILL
                                </div>
                            ) : (
                                <div className="bg-white text-blue-900 p-1 rounded mx-auto"><LayoutDashboard className="w-5 h-5"/></div>
                            )}
                            {isSidebarOpen && <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-white/70 hover:text-white"><X className="w-5 h-5"/></button>}
                        </div>

                        <nav className="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar">
                            <NavItem icon={<LayoutDashboard />} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabSwitch('dashboard')} open={isSidebarOpen} />
                            <NavItem icon={<Users />} label="Employees" active={activeTab === 'employees'} onClick={() => handleTabSwitch('employees')} open={isSidebarOpen} />
                            
                            {/* --- NEW INTERACTIVE CARD TAB --- */}
                            <NavItem icon={<FileText />} label="Interactive Payslip" active={activeTab === 'interactive-card'} onClick={() => handleTabSwitch('interactive-card')} open={isSidebarOpen} />

                            <NavItem icon={<Clock />} label="Attendance Logs" active={activeTab === 'attendance'} onClick={() => handleTabSwitch('attendance')} open={isSidebarOpen} />
                            <NavItem icon={<Banknote />} label="Cash Advances" active={activeTab === 'ca'} onClick={() => handleTabSwitch('ca')} open={isSidebarOpen} />
                            <NavItem icon={<Calculator />} label="Payroll Summary" active={activeTab === 'payroll'} onClick={() => handleTabSwitch('payroll')} open={isSidebarOpen} />
                            <NavItem icon={<CalendarDays />} label="Yearly Summary" active={activeTab === 'summary'} onClick={() => handleTabSwitch('summary')} open={isSidebarOpen} />
                            <NavItem icon={<FileSpreadsheet />} label="Reports" active={activeTab === 'reports'} onClick={() => handleTabSwitch('reports')} open={isSidebarOpen} />
                        </nav>
                        <div className="p-4 border-t border-blue-800">
                            <NavItem icon={<Settings />} label="Settings" active={activeTab === 'settings'} onClick={() => handleTabSwitch('settings')} open={isSidebarOpen} />
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden w-full">
                        <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-8 shrink-0">
                            <div className="flex items-center">
                                <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="mr-4 text-gray-500 hover:text-gray-800">
                                    <Menu className="w-6 h-6" />
                                </button>
                                <h1 className="text-lg font-bold text-gray-800 capitalize">{activeTab.replace('-', ' ')}</h1>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 lg:p-6 bg-gray-100 custom-scrollbar">
                            <div className="max-w-7xl mx-auto h-full flex flex-col">
                                {activeTab === 'dashboard' && renderDashboard()}
                                {activeTab === 'employees' && renderEmployees()}
                                {activeTab === 'interactive-card' && renderInteractiveCard()}
                                {activeTab === 'attendance' && renderAttendance()}
                                {activeTab === 'payroll' && renderPayroll()}
                                {activeTab === 'ca' && renderCA()}
                                {activeTab === 'summary' && renderSummary()}
                                {activeTab === 'reports' && renderReports()}
                                {activeTab === 'settings' && renderSettings()}
                            </div>
                        </div>
                    </main>

                    {renderModals()}
                </div>
            );
        }

        // Subcomponents
        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-4 py-3 transition-colors ${active ? 'bg-blue-800 text-white border-r-4 border-blue-400' : 'text-blue-200 hover:bg-blue-800 hover:text-white border-r-4 border-transparent'}`} title={label}>
                    <span className="flex-shrink-0">{icon}</span>
                    {open && <span className="ml-3 text-sm font-medium whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition-shadow">
                    <div>
                        <p className="text-sm font-medium text-gray-500 mb-1">{title}</p>
                        <p className="text-3xl font-black text-gray-800">{value}</p>
                    </div>
                    <div className={`p-4 rounded-full ${color}`}>{icon}</div>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
