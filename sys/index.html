<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill | Master Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <script>
        const ADMIN_PIN = "1234"; 

        const INITIAL_STAFF = {
            "1": { name: "NINOX", rate: 100, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "2": { name: "NEL2X", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "4": { name: "JHIE", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "5": { name: "ROEL", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "6": { name: "LIZA", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "7": { name: "CALOY", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "9": { name: "JEREY", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "12": { name: "CHRIS", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "13": { name: "DELIA", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "14": { name: "JEVON", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "18": { name: "CLAUDINE LOTA", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 },
            "19": { name: "RAFFY JAVIER", rate: 80, sss: 0, phil: 0, pagibig: 0, advance: 0 }
        };

        let state = {
            isUnlocked: false,
            activeTab: 'summary',
            query: '',
            startDate: '2026-03-01',
            endDate: new Date().toISOString().split('T')[0],
            employees: { ...INITIAL_STAFF, ...(JSON.parse(localStorage.getItem('sg_employees')) || {}) },
            attendance: JSON.parse(localStorage.getItem('sg_attendance')) || []
        };

        function persist() {
            localStorage.setItem('sg_employees', JSON.stringify(state.employees));
            localStorage.setItem('sg_attendance', JSON.stringify(state.attendance));
        }

        window.checkPin = () => {
            if (document.getElementById('pinInput').value === ADMIN_PIN) { state.isUnlocked = true; render(); }
            else { alert("Invalid PIN"); }
        };

        window.updateFilters = () => {
            state.query = document.getElementById('searchBox')?.value.toUpperCase() || '';
            state.startDate = document.getElementById('startD')?.value || state.startDate;
            state.endDate = document.getElementById('endD')?.value || state.endDate;
            render();
        };

        window.switchTab = (tab) => { state.activeTab = tab; render(); };

        window.importLogs = () => {
            const text = document.getElementById('rawLogs').value;
            if (!text.trim()) return;
            const lines = text.split('\n').filter(l => l.includes('\t'));
            const logs = {};
            lines.forEach(line => {
                const parts = line.split('\t').map(p => p.trim());
                if (parts.length < 4) return;
                const id = parts[0], rawTime = parts[3];
                const [dPart, tPart] = rawTime.split(/\s+/);
                const [m, d, y] = dPart.split('/');
                const isoDate = `${y}-${m}-${d}`, key = `${id}_${isoDate}`;
                if (!logs[key]) logs[key] = { empId: id, date: isoDate, times: [] };
                logs[key].times.push(tPart);
            });
            let combined = [...state.attendance];
            Object.values(logs).forEach(day => {
                day.times.sort();
                const tIn = day.times[0], tOut = day.times.length > 1 ? day.times[day.times.length-1] : null;
                let count = tIn && tOut && (new Date(`2026-01-01 ${tOut}`) - new Date(`2026-01-01 ${tIn}`)) / 3600000 >= 5 ? 1.0 : 0.5;
                const record = { empId: day.empId, date: day.date, in: tIn, out: tOut, count };
                const idx = combined.findIndex(r => r.empId === day.empId && r.date === day.date);
                if (idx > -1) combined[idx] = record; else combined.push(record);
            });
            state.attendance = combined; persist(); render(); alert("Logs Synced");
        };

        window.updateStaff = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = fd.get('id').trim();
            state.employees[id] = {
                name: fd.get('name').toUpperCase(),
                rate: parseFloat(fd.get('rate')) || 0,
                sss: parseFloat(fd.get('sss')) || 0,
                phil: parseFloat(fd.get('phil')) || 0,
                pagibig: parseFloat(fd.get('pagibig')) || 0,
                advance: parseFloat(fd.get('advance')) || 0
            };
            persist(); render(); alert("Saved");
        };

        function render() {
            const root = document.getElementById('root');
            if (!state.isUnlocked) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center bg-slate-900 p-6"><div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-md text-center"><div class="w-20 h-20 bg-orange-600 rounded-[30px] mx-auto mb-8 flex items-center justify-center text-white font-black text-4xl shadow-xl shadow-orange-900/20">S</div><h1 class="text-3xl font-black mb-10 tracking-tighter uppercase italic">Stone Grill</h1><input type="password" id="pinInput" placeholder="PIN" class="w-full text-center text-3xl p-5 bg-slate-50 border-2 rounded-3xl mb-6 outline-none focus:border-orange-600 font-mono tracking-widest"><button onclick="checkPin()" class="w-full bg-orange-600 text-white font-black py-6 rounded-3xl shadow-xl hover:bg-orange-700 transition-all">SIGN IN</button></div></div>`;
                return;
            }

            root.innerHTML = `
                <nav class="bg-white border-b border-slate-200 p-6 sticky top-0 z-50 flex justify-between items-center no-print">
                    <div class="flex items-center gap-6">
                        <div class="flex items-center gap-2 font-black italic tracking-tighter uppercase text-lg"><div class="w-8 h-8 bg-orange-600 rounded-xl flex items-center justify-center text-white text-[10px]">S</div>Stone Grill</div>
                        <div class="flex bg-slate-100 p-1 rounded-2xl gap-1">
                            ${['summary', 'attendance', 'accounting'].map(tab => `
                                <button onclick="switchTab('${tab}')" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${state.activeTab === tab ? 'bg-white shadow-sm text-orange-600' : 'text-slate-400'}">${tab}</button>
                            `).join('')}
                        </div>
                    </div>
                </nav>
                <div class="max-w-7xl mx-auto p-8">
                    ${state.activeTab === 'summary' ? renderSummary() : ''}
                    ${state.activeTab === 'attendance' ? renderAttendance() : ''}
                    ${state.activeTab === 'accounting' ? renderAccounting() : ''}
                </div>
            `;
        }

        function renderSummary() {
            return `
                <div class="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm mb-8 no-print">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <div class="md:col-span-2">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Search Employee</p>
                            <input id="searchBox" oninput="updateFilters()" value="${state.query}" placeholder="Type Name..." class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">From</p>
                            <input type="date" id="startD" onchange="updateFilters()" value="${state.startDate}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">To</p>
                            <input type="date" id="endD" onchange="updateFilters()" value="${state.endDate}" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-[40px] border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase"><tr><th class="p-8">Employee</th><th class="p-8">Days</th><th class="p-8">Gross</th><th class="p-8 text-rose-500">Deductions</th><th class="p-8 text-right">Net Pay</th></tr></thead>
                        <tbody class="divide-y divide-slate-50">
                            ${Object.entries(state.employees)
                                .filter(([id, emp]) => emp.name.includes(state.query))
                                .map(([id, emp]) => {
                                    const logsInRange = state.attendance.filter(l => l.empId === id && l.date >= state.startDate && l.date <= state.endDate);
                                    const days = logsInRange.reduce((s, l) => s + l.count, 0);
                                    const gross = days * 8 * emp.rate;
                                    const totalDed = emp.sss + emp.phil + emp.pagibig + emp.advance;
                                    return `<tr class="hover:bg-slate-50/50"><td class="p-8"><b>${emp.name}</b><br><span class="text-[10px] text-slate-400 font-bold uppercase">ID ${id}</span></td><td class="p-8 font-black">${days.toFixed(1)}</td><td class="p-8">₱${gross.toLocaleString()}</td><td class="p-8 text-rose-500">-₱${totalDed.toLocaleString()}</td><td class="p-8 text-right font-black text-orange-600 text-lg">₱${(gross - totalDed).toLocaleString()}</td></tr>`;
                                }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderAttendance() {
            return `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm h-fit">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Process Machine Data</h3>
                        <textarea id="rawLogs" placeholder="Paste tabbed text from machine..." class="w-full h-64 p-6 bg-slate-50 rounded-[30px] border-none font-mono text-[10px] mb-6 outline-none focus:ring-2 ring-orange-100"></textarea>
                        <button onclick="importLogs()" class="w-full bg-slate-900 text-white py-5 rounded-[25px] font-black text-[10px] uppercase shadow-xl">Sync Logs</button>
                    </div>
                    <div class="lg:col-span-2 bg-white rounded-[40px] border border-slate-200 shadow-sm overflow-hidden">
                         <table class="w-full text-left text-sm font-medium"><thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase"><tr><th class="p-6">Staff</th><th class="p-6">Date</th><th class="p-6 text-right">Status</th></tr></thead>
                         <tbody class="divide-y divide-slate-50">${state.attendance.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(log=>`<tr class="hover:bg-slate-50/50"><td class="p-6 uppercase font-black text-xs">${state.employees[log.empId]?.name || 'Unknown'}</td><td class="p-6 text-slate-500">${log.date}</td><td class="p-6 text-right"><span class="px-4 py-1.5 rounded-full text-[10px] font-black ${log.count===1?'bg-emerald-100 text-emerald-700':'bg-orange-100 text-orange-700'}">${log.count===1?'FULL':'HALF'}</span></td></tr>`).join('')}</tbody></table>
                    </div>
                </div>
            `;
        }

        function renderAccounting() {
            return `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm h-fit">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Employee Financial Data</h3>
                        <form onsubmit="updateStaff(event)" class="space-y-4">
                            <input name="id" placeholder="BIO ID" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs" required>
                            <input name="name" placeholder="FULL NAME" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs" required>
                            <div class="grid grid-cols-2 gap-4">
                                <input name="rate" placeholder="RATE (₱)" class="p-4 bg-slate-50 rounded-2xl font-bold text-xs" required>
                                <input name="advance" placeholder="CASH ADVANCE" class="p-4 bg-orange-50 rounded-2xl font-bold text-xs text-orange-700">
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <input name="sss" placeholder="SSS" class="p-4 bg-slate-50 rounded-2xl font-bold text-xs">
                                <input name="phil" placeholder="PHIL" class="p-4 bg-slate-50 rounded-2xl font-bold text-xs">
                                <input name="pagibig" placeholder="PAGI" class="p-4 bg-slate-50 rounded-2xl font-bold text-xs">
                            </div>
                            <button type="submit" class="w-full bg-orange-600 text-white py-5 rounded-[25px] font-black text-[10px] uppercase shadow-lg mt-2">Update Record</button>
                        </form>
                    </div>
                    <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${Object.entries(state.employees).map(([id, emp]) => `
                            <div class="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-between">
                                <div class="flex justify-between items-start mb-6">
                                    <div><p class="text-[9px] font-black text-slate-400 uppercase mb-1">ID ${id}</p><p class="font-black text-sm uppercase">${emp.name}</p></div>
                                    <div class="text-right"><p class="text-[9px] font-black text-orange-400 uppercase mb-1">Current Advance</p><p class="font-black text-orange-600">₱${emp.advance.toLocaleString()}</p></div>
                                </div>
                                <div class="grid grid-cols-3 gap-2 p-4 bg-slate-50 rounded-2xl">
                                    <div class="text-center"><p class="text-[8px] font-black text-slate-400 uppercase">SSS</p><p class="font-black text-xs">₱${emp.sss}</p></div>
                                    <div class="text-center"><p class="text-[8px] font-black text-slate-400 uppercase">PHIL</p><p class="font-black text-xs">₱${emp.phil}</p></div>
                                    <div class="text-center"><p class="text-[8px] font-black text-slate-400 uppercase">PAGI</p><p class="font-black text-xs">₱${emp.pagibig}</p></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        render();
    </script>
</body>
</html>
