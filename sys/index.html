<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stone Grill Payroll - V3 Stable</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6; --accent: #10b981;
            --danger: #ef4444; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; }
        
        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .pin-display { font-size: 2.5rem; font-weight: 800; letter-spacing: 10px; margin-bottom: 30px; color: var(--primary); min-height: 60px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 300px; }
        .num-btn { background: white; border: none; padding: 20px; font-size: 1.5rem; font-weight: 600; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .num-btn:active { background: #e5e7eb; transform: scale(0.95); }
        .btn-clear { background: #fee2e2; color: var(--danger); }

        /* Main Header */
        .header { background: var(--primary); color: white; padding: 25px 20px; border-radius: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; font-weight: 600; cursor: pointer; }

        /* Profile Section (From Caloy Screenshot) */
        .profile-card { background: white; border-radius: 30px; padding: 30px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .status-badge { position: absolute; top: 20px; right: 20px; background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
        .profile-header { margin-bottom: 20px; }
        .profile-name { font-size: 2rem; font-weight: 800; color: #1e293b; line-height: 1; }
        .profile-sub { color: #94a3b8; font-size: 0.9rem; font-weight: 600; }
        .rate-display { color: #2563eb; font-weight: 800; font-size: 1.3rem; float: right; margin-top: -30px; }
        .edit-btn { display: inline-flex; align-items: center; background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 12px; color: #475569; font-weight: 600; text-decoration: none; font-size: 0.85rem; margin-top: 15px; }

        /* Grid Data Cards */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .stat-box { background: #f8fafc; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #f1f5f9; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: #1e293b; }
        .blue-text { color: #2563eb; }
        .red-text { color: #ef4444; }

        /* Net Pay Highlight */
        .net-pay-card { background: #1e293b; padding: 25px; border-radius: 25px; margin-top: 15px; text-align: center; }
        .net-pay-label { color: #94a3b8; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .net-pay-value { color: #4ade80; font-size: 2.2rem; font-weight: 800; margin-top: 5px; }

        /* History Table */
        .history-section { margin-top: 30px; }
        .history-title { font-weight: 800; font-size: 0.9rem; color: #64748b; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; font-size: 0.85rem; }
        .history-table th { background: #f8fafc; padding: 12px; text-align: left; color: #94a3b8; }
        .history-table td { padding: 12px; border-top: 1px solid #f1f5f9; }
        .amount-cell { font-weight: 800; color: #ef4444; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2 style="margin-bottom: 10px;">STONE GRILL</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Enter Access PIN</p>
        <div class="pin-display" id="pin-dots">****</div>
        <div class="numpad">
            <button class="num-btn" onclick="pressPin('1')">1</button>
            <button class="num-btn" onclick="pressPin('2')">2</button>
            <button class="num-btn" onclick="pressPin('3')">3</button>
            <button class="num-btn" onclick="pressPin('4')">4</button>
            <button class="num-btn" onclick="pressPin('5')">5</button>
            <button class="num-btn" onclick="pressPin('6')">6</button>
            <button class="num-btn" onclick="pressPin('7')">7</button>
            <button class="num-btn" onclick="pressPin('8')">8</button>
            <button class="num-btn" onclick="pressPin('9')">9</button>
            <button class="num-btn btn-clear" onclick="clearPin()">C</button>
            <button class="num-btn" onclick="pressPin('0')">0</button>
            <button class="num-btn" style="background:#dcfce7; color:#166534;" onclick="submitPin()">OK</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="header">
            <h1 id="view-title">STAFF PROFILE</h1>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>

        <div class="profile-card">
            <span class="status-badge">ACTIVE</span>
            <div class="profile-header">
                <div class="profile-name" id="emp-name">LOADING...</div>
                <div class="profile-sub" id="emp-role">ID: -- • Role</div>
                <div class="rate-display" id="emp-rate">₱0/DAY</div>
                <button id="admin-edit-btn" class="edit-btn hidden">Edit Profile</button>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-label">Days</span>
                    <div class="stat-value" id="val-days">0</div>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Gross Pay</span>
                    <div class="stat-value blue-text" id="val-gross">₱0</div>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Deducted</span>
                    <div class="stat-value red-text" id="val-deduct">₱0</div>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Net Pay</span>
                    <div class="stat-value" style="color:#10b981" id="val-net-grid">₱0</div>
                </div>
            </div>

            <div class="net-pay-card">
                <span class="net-pay-label">NET SALARY (TAKE HOME)</span>
                <div class="net-pay-value" id="val-total-net">₱0</div>
            </div>
            
            <div id="lifetime-stats" class="stats-grid">
                 <div class="stat-box" style="background:#fff1f2">
                    <span class="stat-label" style="color:#e11d48">Lifetime C.A. Bal.</span>
                    <div class="stat-value red-text" id="val-lifetime-ca">₱0</div>
                </div>
                <div class="stat-box" style="background:#f0f9ff">
                    <span class="stat-label" style="color:#0284c7">Total Attendance</span>
                    <div class="stat-value blue-text" id="val-total-attn">0</div>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">Transaction History</div>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Note</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // FIREBASE CONFIG - PASTE YOUR KEYS HERE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "stone-grill-payroll.firebaseapp.com",
        projectId: "stone-grill-payroll",
        storageBucket: "stone-grill-payroll.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentPin = "";
    let userRole = ""; // 'admin' or 'staff'
    const ADMIN_UID = "TY8qdAMRtsZf48ibeNqdTNdO0aE2"; // Found in your screenshot

    function pressPin(num) {
        if (currentPin.length < 4) {
            currentPin += num;
            updatePinDisplay();
        }
    }

    function clearPin() { currentPin = ""; updatePinDisplay(); }
    function updatePinDisplay() { document.getElementById('pin-dots').innerText = "*".repeat(currentPin.length) || "****"; }

    function submitPin() {
        if (currentPin === "2558") {
            userRole = "admin";
            loadDashboard();
        } else if (currentPin === "1234") {
            userRole = "staff";
            loadDashboard();
        } else {
            alert("Invalid PIN");
            clearPin();
        }
    }

    function loadDashboard() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        
        if (userRole === 'admin') {
            document.getElementById('view-title').innerText = "ADMIN MASTERLIST";
            document.getElementById('admin-edit-btn').classList.remove('hidden');
        } else {
            document.getElementById('view-title').innerText = "STAFF CLOUD PROFILE";
        }

        fetchData();
    }

    async function fetchData() {
        const historyBody = document.getElementById('history-body');
        historyBody.innerHTML = "<tr><td colspan='4'>Loading transactions...</td></tr>";

        try {
            // TARGETING THE FOLDER FROM YOUR SCREENSHOT
            // artifacts > stone-grill-v1 > users > ADMIN_ID > cash_advances
            const caRef = db.collection('artifacts').doc('stone-grill-v1')
                           .collection('users').doc(ADMIN_UID)
                           .collection('cash_advances');
            
            const snapshot = await caRef.orderBy('date', 'desc').get();
            historyBody.innerHTML = "";

            if (snapshot.empty) {
                historyBody.innerHTML = "<tr><td colspan='4'>No records found.</td></tr>";
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const row = `
                    <tr>
                        <td>${data.date}</td>
                        <td>C.A.</td>
                        <td>${data.reason || '-'}</td>
                        <td class="amount-cell">₱${Number(data.amount).toLocaleString()}</td>
                    </tr>
                `;
                historyBody.innerHTML += row;
            });

            // Demo Data for Header (This would normally be a separate fetch to 'employees' folder)
            document.getElementById('emp-name').innerText = "CALOY";
            document.getElementById('emp-role').innerText = "ID: 7 • COOK";
            document.getElementById('emp-rate').innerText = "₱650/DAY";
            document.getElementById('val-days').innerText = "21.5";
            document.getElementById('val-gross').innerText = "₱13,975";
            document.getElementById('val-deduct').innerText = "₱13,975";
            document.getElementById('val-total-net').innerText = "₱0";
            document.getElementById('val-lifetime-ca').innerText = "₱18,000";
            document.getElementById('val-total-attn').innerText = "268";

        } catch (error) {
            console.error("Error:", error);
            historyBody.innerHTML = "<tr><td colspan='4'>Error connecting to database.</td></tr>";
        }
    }

    function logout() { location.reload(); }
</script>

</body>
</html>
