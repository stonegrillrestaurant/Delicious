<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill Payroll - Smart Cloud Suite</title>
    
    <link rel="icon" type="image/png" href="/sys/icon.png">
    <link rel="apple-touch-icon" href="/sys/icon.png">
    <link rel="manifest" href="/sys/manifest.json">
    <meta name="theme-color" content="#7a2e13">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "stone-grill-v1";

        window.fb = { db, auth, appId, signInWithEmailAndPassword, signOut, onAuthStateChanged, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #interactive-print-section, #interactive-print-section * { visibility: visible; }
            .print-hidden { display: none !important; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const normalizeId = (id) => {
            if (!id) return '';
            const strId = String(id).trim();
            return /^\d+$/.test(strId) ? parseInt(strId, 10).toString() : strId.toLowerCase();
        };

        const formatMoney = (v) => {
            const num = Number(v || 0); if (isNaN(num)) return "0";
            return Math.abs(num).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        };

        const Icon = ({ d, className = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}{children}
            </svg>
        );
        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Banknote = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></Icon>;
        const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;

        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-6 py-3.5 transition-all duration-300 ${active ? 'bg-[#386df2] text-white border-l-4 border-white shadow-lg' : 'text-blue-200 hover:bg-blue-800/50 hover:text-white border-l-4 border-transparent'}`}>
                    <span className="shrink-0">{icon}</span>{open && <span className="ml-4 text-[11px] font-black uppercase tracking-widest whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function LoginScreen() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    await window.fb.signInWithEmailAndPassword(window.fb.auth, email, password);
                } catch (err) { alert("Login failed."); setLoading(false); }
            };

            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up">
                        <img src="/sys/icon.png" className="w-16 h-16 mb-6" alt="Logo" />
                        <h2 className="text-2xl font-black text-slate-800 mb-6 uppercase tracking-widest">Sign In</h2>
                        <form onSubmit={handleLogin} className="w-full space-y-4">
                            <input type="email" placeholder="Email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full border p-4 rounded-2xl outline-none font-bold bg-slate-50"/>
                            <input type="password" placeholder="Password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full border p-4 rounded-2xl outline-none font-bold bg-slate-50"/>
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white h-14 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                                {loading ? 'Loading...' : 'Login to Cloud'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState('Staff'); // Admin or Staff
            const [currentBiometricId, setCurrentBiometricId] = useState(''); 
            const [isReady, setIsReady] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 1024);
            
            const [employees, setEmployees] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState(() => new Date().toISOString().slice(0, 7));
            const [dashSearchEmpId, setDashSearchEmpId] = useState('');
            const [viewProfile, setViewProfile] = useState(null);
            const [rawInput, setRawInput] = useState('');
            const [caType, setCaType] = useState('advance');
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });

            const isAdmin = userRole === 'Admin';

            const monthOptions = useMemo(() => {
                const options = []; const d = new Date();
                for (let i = 0; i < 12; i++) {
                    options.push({ value: d.toISOString().slice(0, 7), label: d.toLocaleString('default', { month: 'long', year: 'numeric' }) });
                    d.setMonth(d.getMonth() - 1);
                }
                return options;
            }, []);

            useEffect(() => {
                window.fb.onAuthStateChanged(window.fb.auth, (u) => { setUser(u); setIsReady(true); if(!u) {setUserRole('Staff'); setCurrentBiometricId('');} });
            }, []);

            // DYNAMIC DATA PULLING BASED ON LOGGED IN USER
            useEffect(() => {
                if (!user) return;
                const { db, appId, onSnapshot, collection } = window.fb;
                const path = (n) => collection(db, 'artifacts', appId, 'users', user.uid, n);
                
                const unsubEmps = onSnapshot(path('employees'), (s) => setEmployees(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubAtt = onSnapshot(path('attendance'), (s) => setAttendance(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubCA = onSnapshot(path('cash_advances'), (s) => setCashAdvances(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubEmps(); unsubAtt(); unsubCA(); };
            }, [user]);

            const payrollSummary = useMemo(() => {
                const source = (!isAdmin && currentBiometricId) ? employees.filter(e => normalizeId(e.id) === normalizeId(currentBiometricId)) : employees;
                return source.map(emp => {
                    const empAtt = attendance.filter(a => normalizeId(a.empId) === normalizeId(emp.id) && (a.date || '').startsWith(selectedMonth));
                    let days = 0; const uniqueDates = new Set(empAtt.map(a => a.date));
                    uniqueDates.forEach(date => days += Math.min(Math.max(...empAtt.filter(a => a.date === date).map(r => parseFloat(r.dayEquivalent) || 0)), 1));
                    const empCAsThisMonth = cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(emp.id) && (ca.date || '').startsWith(selectedMonth));
                    const monthlyCA = empCAsThisMonth.reduce((sum, ca) => sum + (parseFloat(ca.amount) || 0), 0);
                    const gross = days * (parseFloat(emp.dailyRate || emp.rate) || 0);
                    const net = gross - monthlyCA - (parseFloat(emp.sssRate) || 0) - (parseFloat(emp.miscRate) || 0);
                    return { ...emp, days, gross, net, monthlyCA, caBalance: parseFloat(emp.caBalance) || 0 };
                });
            }, [employees, attendance, cashAdvances, selectedMonth, isAdmin, currentBiometricId]);

            const handleProcessLogs = async () => {
                if (!isAdmin || !rawInput.trim()) return;
                const lines = rawInput.trim().split('\n'); let count = 0; const map = {};
                for (const line of lines) {
                    const cols = line.split(/\t+| {2,}/).filter(Boolean); if (cols.length < 3) continue;
                    const id = normalizeId(cols[0]); const name = cols[1];
                    const dM = line.match(/(\d{2}\/\d{2}\/\d{4})/); const tM = line.match(/(\d{2}:\d{2}:\d{2})/);
                    if (!dM || !tM) continue;
                    const [m, d, y] = dM[1].split('/'); const iso = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
                    const key = `${id}_${iso}`; if (!map[key]) map[key] = { id, name, date: iso, p: [] };
                    map[key].p.push(tM[1].substring(0,5));
                }
                for (const k in map) {
                    const r = map[k]; const s = r.p.sort();
                    await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'attendance', k), { empId: r.id, empName: r.name, date: r.date, firstIn: s[0], lastOut: s.length > 1 ? s[s.length-1] : '00:00', dayEquivalent: s.length > 1 ? 1 : 0.5 }, { merge: true });
                    count++;
                }
                setRawInput(''); alert(`Synced ${count} attendance records.`);
            };

            const handleIssueCA = async () => {
                if (!isAdmin || !newCa.empId) return;
                let amt = parseFloat(newCa.amount) || 0; if (caType === 'payment') amt = -Math.abs(amt);
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'cash_advances'), { ...newCa, amount: amt, type: caType });
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', normalizeId(newCa.empId)), { caBalance: (parseFloat(employees.find(e=>normalizeId(e.id)===normalizeId(newCa.empId))?.caBalance) || 0) + amt });
                setNewCa({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });
            };

            if (!isReady) return null;
            if (!user) return <LoginScreen />;

            // PIN GATE
            if (userRole === 'Staff' && !currentBiometricId) {
                return (
                    <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-6 text-center">
                        <div className="bg-white rounded-3xl p-10 shadow-2xl max-w-sm w-full animate-slide-up">
                            <h2 className="text-xl font-black text-slate-800 mb-6 uppercase">Access Verification</h2>
                            <input type="password" placeholder="ENTER PIN (1234 or 2558)" autoFocus className="w-full border-2 p-4 rounded-2xl mb-6 text-center text-xl font-black outline-none border-slate-100" 
                                onChange={(e) => {
                                    if(e.target.value === '2558') { setUserRole('Admin'); setCurrentBiometricId('ADMIN'); }
                                    if(e.target.value === '1234') { 
                                        const id = window.prompt("Enter Biometric ID:"); 
                                        if (employees.some(emp => normalizeId(emp.id) === normalizeId(id))) { setCurrentBiometricId(id); setUserRole('User'); } 
                                        else if (id) alert("ID Not Found");
                                    }
                                }} 
                            />
                            <button onClick={() => window.fb.signOut(window.fb.auth)} className="text-slate-400 font-bold uppercase text-[10px]">Logout</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden relative font-sans">
                    <aside className={`fixed lg:static inset-y-0 left-0 z-40 bg-blue-900 text-white transition-all duration-300 flex flex-col h-full print-hidden ${isSidebarOpen ? 'w-64 translate-x-0' : 'w-20 -translate-x-full lg:translate-x-0'} shadow-2xl`}>
                        <div className="p-6 border-b border-blue-800 flex items-center font-black text-xl">STONE GRILL</div>
                        <nav className="flex-1 py-8 space-y-2 overflow-y-auto custom-scrollbar">
                            <NavItem icon={<LayoutDashboard />} label="Ledger" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} open={isSidebarOpen} />
                            {isAdmin && (
                                <>
                                    <NavItem icon={<Users />} label="Masterlist" active={activeTab === 'employees'} onClick={() => setActiveTab('employees')} open={isSidebarOpen} />
                                    <NavItem icon={<Clock />} label="Attendance" active={activeTab === 'attendance'} onClick={() => setActiveTab('attendance')} open={isSidebarOpen} />
                                    <NavItem icon={<Banknote />} label="Cash Advance" active={activeTab === 'ca'} onClick={() => setActiveTab('ca')} open={isSidebarOpen} />
                                </>
                            )}
                        </nav>
                        <div className="p-4 border-t border-blue-800"><button onClick={() => window.fb.signOut(window.fb.auth)} className="w-full flex items-center px-6 py-4 text-rose-300"><LogOut /><span className={isSidebarOpen ? 'ml-4 uppercase text-xs font-black' : 'hidden'}>Logout</span></button></div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0 print-hidden">
                            <button onClick={() => setSidebarOpen(!isSidebarOpen)}><Menu /></button>
                            <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase border ${isAdmin ? 'bg-emerald-100 text-emerald-700' : 'bg-stone-100 text-stone-500'}`}>{isAdmin ? 'Admin' : 'Staff'} Mode</span>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 lg:p-10 custom-scrollbar">
                            <div className="max-w-4xl mx-auto space-y-6">
                                
                                {activeTab === 'dashboard' && payrollSummary.map(emp => (
                                    <div key={emp.id} className="animate-slide-up space-y-6">
                                        <div className="bg-white rounded-3xl p-6 md:p-10 shadow-xl border border-blue-50 text-center">
                                            <h2 className="text-4xl lg:text-6xl font-black text-slate-800 uppercase tracking-tighter">{emp.name}</h2>
                                            <p className="text-slate-400 font-bold uppercase mt-2 mb-6">ID: {emp.id} • {emp.position}</p>
                                            
                                            <select className="bg-slate-100 p-2 rounded-xl font-black text-xs uppercase mb-8" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
                                                {monthOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                                            </select>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-slate-50 p-6 rounded-2xl border text-center"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Days Present</p><p className="text-3xl font-black">{emp.days}</p></div>
                                                <div className="bg-slate-50 p-6 rounded-2xl border text-center"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Net Salary</p><p className={`text-3xl font-black ${emp.net < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{emp.net < 0 ? '-' : ''}₱{formatMoney(emp.net)}</p></div>
                                            </div>
                                            
                                            <div className="mt-6 bg-rose-50 p-8 rounded-3xl border border-rose-100 text-center">
                                                <p className="text-[10px] font-black text-rose-800 opacity-50 uppercase mb-1">Lifetime C.A. Balance</p>
                                                <p className="text-5xl font-black text-rose-600 font-mono tracking-tighter">₱{formatMoney(emp.caBalance)}</p>
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest flex items-center gap-2"><Banknote className="w-4 h-4"/> Transaction history</h4>
                                            <table className="w-full text-left text-xs">
                                                <thead className="bg-slate-50 font-black text-slate-400 uppercase"><tr><th className="p-3">Date</th><th className="p-3">Reason</th><th className="p-3 text-right">Amount</th></tr></thead>
                                                <tbody className="divide-y">
                                                    {cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(emp.id)).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(ca => (
                                                        <tr key={ca.id}><td className="p-3 font-mono">{ca.date}</td><td className="p-3 italic">{ca.reason || '--'}</td><td className={`p-3 text-right font-black ${ca.amount < 0 ? 'text-emerald-600' : 'text-rose-600'}`}>₱{formatMoney(ca.amount)}</td></tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ))}

                                {isAdmin && activeTab === 'attendance' && (
                                    <div className="bg-white p-8 rounded-3xl shadow-xl flex flex-col space-y-6">
                                        <h3 className="font-black text-blue-900 uppercase">Biometric Sync</h3>
                                        <textarea className="w-full h-40 p-4 border rounded-2xl bg-slate-50 text-xs font-mono" placeholder="Paste tab data here..." value={rawInput} onChange={e=>setRawInput(e.target.value)} />
                                        <button onClick={handleProcessLogs} className="bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest">Process Into Database</button>
                                    </div>
                                )}

                                {isAdmin && activeTab === 'employees' && (
                                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden animate-slide-up">
                                        <div className="p-6 border-b flex justify-between items-center bg-[#243c84] text-white">
                                            <h2 className="font-black uppercase tracking-widest">Database Masterlist</h2>
                                            <select className="bg-white/10 text-white rounded-lg px-3 py-1 text-xs border-none outline-none font-bold" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>{monthOptions.map(opt => <option className="text-black" key={opt.value} value={opt.value}>{opt.label}</option>)}</select>
                                        </div>
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-50 uppercase text-[10px] font-black"><tr><th className="p-4">Name</th><th className="p-4 text-center">Days</th><th className="p-4 text-right">Balance</th><th className="p-4 text-right">Salary</th></tr></thead>
                                            <tbody className="divide-y">
                                                {payrollSummary.map(row => (
                                                    <tr key={row.id} className="hover:bg-blue-50 cursor-pointer" onClick={() => setViewProfile(row)}>
                                                        <td className="p-4 font-black uppercase">{row.name}</td>
                                                        <td className="p-4 text-center font-bold">{row.days}</td>
                                                        <td className="p-4 text-right font-black text-rose-600">₱{formatMoney(row.caBalance)}</td>
                                                        <td className="p-4 text-right font-black">₱{formatMoney(row.net)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
