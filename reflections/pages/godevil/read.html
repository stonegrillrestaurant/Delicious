<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Reflection | Solitude Reflections</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --radius-sm: 14px; --radius-md: 24px; --radius-lg: 32px;
      --bg: #f4f2ee; --text: #1d1b1a; --text-muted: #736b63; --brand: #a67b51;
      --glass-panel: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.5);
      --glass-control: rgba(255, 255, 255, 0.4);
    }

    html[data-theme="dark"] {
      --bg: #0f0e0d; --text: #f0ebe1; --text-muted: #a39b90;
      --glass-panel: rgba(30, 28, 26, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-control: rgba(50, 48, 45, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; transition: background 0.4s ease; overflow-x: hidden; }
    .shell { width: min(1000px, calc(100% - 32px)); margin: 0 auto; }
    
    .glass { 
      background: var(--glass-panel); 
      backdrop-filter: blur(25px); 
      -webkit-backdrop-filter: blur(25px); 
      border: 1px solid var(--glass-border); 
    }
    
    .topbar { position: sticky; top: 16px; z-index: 50; margin-bottom: 32px; }
    .topbar-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; border-radius: 99px; padding: 0 10px 0 20px; }
    
    /* Content transition animation */
    #content-container { transition: opacity 0.3s ease, transform 0.3s ease; }
    .fade-out { opacity: 0; transform: translateY(10px); }

    .hero-card { border-radius: var(--radius-lg); overflow: hidden; display: grid; grid-template-columns: 1.2fr 1fr; min-height: 420px; margin-bottom: 32px; }
    .hero-copy { padding: 48px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; }
    .category-tag { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; color: var(--brand); }

    .section-card { padding: 40px; border-radius: var(--radius-lg); margin-bottom: 32px; }
    h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }

    /* Explore Grid */
    .explore-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .explore-group { background: var(--glass-control); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--glass-border); }
    .explore-group h3 { font-size: 0.85rem; text-transform: uppercase; margin-bottom: 16px; opacity: 0.6; }
    .group-links { display: flex; flex-direction: column; gap: 10px; }
    .group-links a { font-size: 0.95rem; color: var(--text-muted); transition: 0.2s; text-decoration: none; cursor: pointer; }
    .group-links a:hover { color: var(--text); transform: translateX(4px); }
    .group-links a.active { font-weight: 600; color: var(--brand); padding-left: 8px; border-left: 2px solid var(--brand); }

    /* Audio List */
    .audio-list { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .audio-btn { flex: 1; min-width: 200px; padding: 18px; border-radius: var(--radius-md); background: var(--glass-control); border: 1px solid var(--glass-border); color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
    .audio-btn.active { border-color: var(--brand); background: var(--glass-panel); }
    audio { width: 100%; height: 45px; border-radius: 99px; }

    .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--glass-control); border: 1px solid var(--glass-border); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
    .pill-btn { padding: 12px 24px; border-radius: 99px; background: var(--glass-control); border: 1px solid var(--glass-border); cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 10px; color: var(--text); }

    .article-content { font-size: 1.15rem; line-height: 1.9; max-width: 760px; margin: 0 auto; }
    .article-content p { margin-bottom: 1.5rem; }

    @media (max-width: 860px) { 
      .hero-card { grid-template-columns: 1fr; } 
      .hero-img { height: 300px; order: -1; }
    }
  </style>
</head>
<body>

  <header class="topbar shell">
    <div class="topbar-inner glass">
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:32px; height:32px; background:var(--brand); border-radius:8px;"></div>
        <strong style="letter-spacing:-0.02em;">Solitude Reflections</strong>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="icon-btn" id="themeBtn"><svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      </div>
    </div>
  </header>

  <div id="content-container">
    <main class="shell">
      <!-- Hero -->
      <section class="hero-card glass">
        <div class="hero-copy">
          <span class="category-tag" id="catTag">...</span>
          <h1 id="title" style="font-family:'Playfair Display'; font-size: clamp(2rem, 5vw, 3rem); line-height:1.2;"></h1>
          <p id="subtitle" style="opacity:0.8; font-size: 1.1rem;"></p>
          <div style="margin-top: 10px;">
            <button class="pill-btn" id="shareBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg> Share</button>
          </div>
        </div>
        <div class="hero-img"><img id="cover" src="" alt=""></div>
      </section>

      <!-- Navigation/Explore -->
      <section class="section-card glass">
        <h2>Explore Topics</h2>
        <div class="explore-grid" id="navGrid"></div>
      </section>

      <!-- Audio -->
      <section class="section-card glass" id="listenSect">
        <h2>Listen</h2>
        <div class="audio-list" id="audioBtns"></div>
        <audio id="player" controls></audio>
      </section>

      <!-- Read -->
      <section class="section-card glass">
        <h2>Read Article</h2>
        <div id="content" class="article-content"></div>
      </section>
    </main>
  </div>

  <script src="/reflections/assets/reflection-data.js"></script>

  <script>
    const DATA = window.REFLECTION_DATA || {};
    const container = document.getElementById('content-container');

    // Extracts key from URL or fallback
    const getKeyFromURL = () => {
      const parts = window.location.pathname.split('/');
      const pagesIdx = parts.indexOf('pages');
      if (pagesIdx !== -1 && parts[pagesIdx + 1]) return parts[pagesIdx + 1];
      return Object.keys(DATA)[0] || "godevil";
    };

    // Main render function
    function loadReflection(key, isInitial = false) {
      const ref = DATA[key];
      if (!ref) return;

      if (!isInitial) container.classList.add('fade-out');

      setTimeout(() => {
        // Update Metadata
        document.title = `${ref.title} | Solitude Reflections`;
        
        // Update Static Elements
        document.getElementById('title').textContent = ref.title;
        document.getElementById('subtitle').textContent = ref.subtitle || "";
        document.getElementById('catTag').textContent = ref.category?.replace('-', ' ') || "Reflection";
        document.getElementById('cover').src = ref.cover || "";
        document.getElementById('content').innerHTML = ref.articleHtml || `<p>${ref.description || ""}</p>`;

        // Render Audio
        const aBtnBox = document.getElementById('audioBtns');
        const player = document.getElementById('player');
        aBtnBox.innerHTML = "";
        const tracks = [];
        if (ref.audio1) tracks.push({ label: ref.audio1Label || "Track 1", src: ref.audio1 });
        if (ref.audio2) tracks.push({ label: ref.audio2Label || "Track 2", src: ref.audio2 });

        if (tracks.length === 0) {
          document.getElementById('listenSect').style.display = 'none';
        } else {
          document.getElementById('listenSect').style.display = 'block';
          tracks.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'audio-btn';
            b.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> <span>${t.label}</span>`;
            b.onclick = () => {
              player.src = t.src;
              [...aBtnBox.children].forEach(btn => btn.classList.remove('active'));
              b.classList.add('active');
              player.play();
            };
            aBtnBox.appendChild(b);
            if(i === 0) { player.src = t.src; b.classList.add('active'); }
          });
        }

        // Render Navigation (Topic Grid)
        renderNav(key);

        if (!isInitial) {
          container.classList.remove('fade-out');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }, isInitial ? 0 : 300);
    }

    function renderNav(currentKey) {
      const nGrid = document.getElementById('navGrid');
      nGrid.innerHTML = "";
      const categories = { "spirituality": "Spirituality", "human-nature": "Human Nature", "religion": "Religion" };
      
      Object.entries(categories).forEach(([catKey, catName]) => {
        const items = Object.entries(DATA).filter(([k, v]) => v.category === catKey);
        if (items.length === 0) return;

        const group = document.createElement('div');
        group.className = 'explore-group';
        group.innerHTML = `<h3>${catName}</h3><div class="group-links"></div>`;
        const linksContainer = group.querySelector('.group-links');

        items.forEach(([k, v]) => {
          const a = document.createElement('a');
          const targetUrl = `/reflections/pages/${k}/read.html`;
          a.textContent = v.title;
          if (k === currentKey) a.className = 'active';
          
          // THE SPA MAGIC: INTERCEPT CLICK
          a.onclick = (e) => {
            e.preventDefault();
            if (k === currentKey) return;
            // Update the browser URL without reloading
            history.pushState({ key: k }, "", targetUrl);
            loadReflection(k);
          };
          linksContainer.appendChild(a);
        });
        nGrid.appendChild(group);
      });
    }

    // Handle browser Back/Forward buttons
    window.onpopstate = (event) => {
      const key = (event.state && event.state.key) ? event.state.key : getKeyFromURL();
      loadReflection(key);
    };

    // Initial Load
    window.onload = () => {
      const initialKey = getKeyFromURL();
      loadReflection(initialKey, true);
    };

    // Simple Theme Toggle
    document.getElementById('themeBtn').onclick = () => {
      const root = document.documentElement;
      const isDark = root.getAttribute('data-theme') === 'dark';
      root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    };
  </script>
</body>
</html>
