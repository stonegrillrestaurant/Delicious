<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Paradox of God | Audio Demo</title>

  <style>
    :root{
      --bg:#f7f2ec;
      --card:#ffffff;
      --text:#2c231e;
      --muted:#6c5b51;
      --dark:#261a15;
      --line:rgba(0,0,0,.08);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Georgia, "Times New Roman", serif;
    }

    .page{
      max-width:820px;
      margin:0 auto;
      padding:40px 16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.05);
    }

    h1{
      margin:0 0 8px 0;
      font-size:clamp(1.8rem, 4vw, 2.6rem);
      line-height:1.15;
    }

    .subtitle{
      margin:0 0 18px 0;
      color:var(--muted);
      font-size:1rem;
    }

    .audio-wrap{
      margin-top:18px;
      background:var(--dark);
      border:3px solid rgba(101,55,14,1);
      border-radius:16px;
      padding:14px;
    }

    #reflectionAudio{
      width:100%;
      display:block;
      margin-bottom:12px;
    }

    .playlist{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .playlist-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      background:#261a15;
      border:1.5px solid #120d09;
      border-radius:10px;
      padding:12px;
      cursor:pointer;
      transition:.2s ease;
    }

    .playlist-row:hover{
      border-color:#6a4236;
      transform:translateY(-1px);
    }

    .playlist-row.active{
      background:#170d09;
      border-color:#997060;
      box-shadow:0 0 4px rgba(255,107,61,.35);
    }

    .playlist-main{
      min-width:0;
      display:flex;
      flex-direction:column;
    }

    .playlist-title{
      color:#f3e6dd;
      font-size:1rem;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .playlist-sub{
      color:#b29587;
      font-size:.84rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .playlist-duration{
      color:#c9b0a4;
      font-size:.85rem;
      flex-shrink:0;
    }

    @media (max-width:640px){
      .card{
        padding:16px;
      }

      .playlist-row{
        padding:10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>The Paradox of God</h1>
      <p class="subtitle">A sample audio playlist using real reflection-style data.</p>

      <section class="audio-wrap">
        <audio id="reflectionAudio" controls preload="metadata">
          <source id="audioSource" src="/reflections/pages/the-paradox-of-god/theparadoxofgod.mp3" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>

        <div class="playlist" id="playlist">
          <div class="playlist-row active" data-src="/reflections/pages/the-paradox-of-god/theparadoxofgod.mp3">
            <div class="playlist-main">
              <div class="playlist-title">The Paradox of God</div>
              <div class="playlist-sub">Full Reflection</div>
            </div>
            <div class="playlist-duration">12:48</div>
          </div>

          <div class="playlist-row" data-src="/reflections/pages/the-paradox-of-god/godparadox.mp3">
            <div class="playlist-main">
              <div class="playlist-title">Paradox of God</div>
              <div class="playlist-sub">Short Version</div>
            </div>
            <div class="playlist-duration">04:32</div>
          </div>

          <div class="playlist-row" data-src="/reflections/pages/the-paradox-of-god/Paradox-podcast.mp3">
            <div class="playlist-main">
              <div class="playlist-title">Paradox Podcast</div>
              <div class="playlist-sub">Deep Dive</div>
            </div>
            <div class="playlist-duration">18:10</div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const audioPlayer = document.getElementById('reflectionAudio');
      const audioSource = document.getElementById('audioSource');
      const rows = document.querySelectorAll('.playlist-row');

      rows.forEach(function (row) {
        row.addEventListener('click', function () {
          rows.forEach(function (r) {
            r.classList.remove('active');
          });

          row.classList.add('active');

          const newSrc = row.getAttribute('data-src');
          audioSource.src = newSrc;
          audioPlayer.load();
          audioPlayer.play().catch(function () {});
        });
      });
    });
  </script>
</body>
</html>
