<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<!-- ===== BASIC SEO ===== -->
<title>{{TITLE}} | Solitude Reflections</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="robots" content="index,follow">
<meta name="author" content="Ninox Antolihao">
<link rel="canonical" href="{{CANONICAL_URL}}">

<!-- ===== OPEN GRAPH ===== -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="Solitude Reflections">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="{{CANONICAL_URL}}">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="og:image:alt" content="{{TITLE}}">
<meta property="fb:app_id" content="2895055444086567">

<!-- ===== TWITTER ===== -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{DESCRIPTION}}">
<meta name="twitter:image" content="{{OG_IMAGE}}">

<!-- ===== PWA ===== -->
<link rel="manifest" href="/reflections/manifest.json">
<link rel="icon" href="/reflections/assets/icons/favicon.ico">
<link rel="apple-touch-icon" href="/reflections/assets/icons/apple-touch-icon-180x180.png">
<meta name="theme-color" content="#fffdf9">

<!-- ===== GOOGLE ANALYTICS ===== -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-J6LE469GW6"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-J6LE469GW6');
</script>

<!-- ===== ADSENSE ===== -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9771423771078445"
crossorigin="anonymous"></script>

<!-- ===== STRUCTURED DATA ===== -->
<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"Article",
 "headline":"{{TITLE}}",
 "description":"{{DESCRIPTION}}",
 "image":["{{OG_IMAGE}}"],
 "author":{"@type":"Person","name":"Ninox Antolihao"},
 "publisher":{
   "@type":"Organization",
   "name":"Solitude Reflections",
   "logo":{
     "@type":"ImageObject",
     "url":"https://stonegrillresto.net/reflections/assets/icons/icon-512x512.png"
   }
 },
 "mainEntityOfPage":{"@type":"WebPage","@id":"{{CANONICAL_URL}}"},
 "datePublished":"{{DATE}}",
 "dateModified":"{{DATE}}"
}
</script>

<style>
body{
  font-family:Georgia,serif;
  background:#fffdf9;
  color:#3b2b26;
  margin:0;
  padding:40px 10%;
  line-height:1.8;
}
header{text-align:center;margin-bottom:20px;}
h1{font-size:2.2rem;}
h2{font-size:1.2rem;color:#7b5f54;}
p{margin:14px 0;text-align:justify;}
.utility-bar{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.utility-chip{padding:6px 12px;border:1px solid #ddd;border-radius:8px;text-decoration:none;}
.back-btn{margin:10px 0;padding:6px 10px;cursor:pointer;}
.audio{margin:20px 0;}
.share{text-align:center;margin-top:30px;}
footer{text-align:center;margin-top:50px;font-size:.9rem;}
</style>
</head>

<body id="top">

<header>

<div class="utility-bar">
<a class="utility-chip" href="/reflections/">Home</a>
<a class="utility-chip" href="/reflections/">Reflections</a>
<a class="utility-chip" href="#cusdis_thread">Comments</a>
</div>

<h1>{{TITLE}}</h1>
<h2>{{SUBTITLE}}</h2>
<p>{{AUTHOR_LINE}}</p>

</header>

<!-- ===== BACK BUTTON ===== -->
<button class="back-btn" onclick="if(history.length>1){history.back()}else{location.href='/reflections/'}">← Back</button>

<!-- ===== AUDIO ===== -->
<div class="audio">
<audio controls>
<source src="{{AUDIO}}">
</audio>
</div>

<!-- ===== AD TOP ===== -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-9771423771078445"
data-ad-slot="6628486781"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>

<!-- ===== CONTENT ===== -->
<main>
{{CONTENT}}
</main>

<!-- ===== SHARE BUTTONS ===== -->
<div class="share">
<a id="fb">Facebook</a> |
<a id="wa">WhatsApp</a> |
<a id="tg">Telegram</a>
</div>

<!-- ===== COMMENTS ===== -->
<div id="cusdis_thread"
data-host="https://cusdis.com"
data-app-id="YOUR_CUSDIS_ID"
data-page-id=""
data-page-url=""
data-page-title="">
</div>

<script src="https://cusdis.com/js/cusdis.es.js"></script>

<script>
const url = encodeURIComponent(location.href);
const title = encodeURIComponent(document.title);

document.getElementById('fb').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
document.getElementById('wa').href = `https://wa.me/?text=${title}%20${url}`;
document.getElementById('tg').href = `https://t.me/share/url?url=${url}&text=${title}`;

// Cusdis dynamic
const el = document.getElementById('cusdis_thread');
el.setAttribute('data-page-id', location.pathname);
el.setAttribute('data-page-url', location.href);
el.setAttribute('data-page-title', document.title);
</script>

<!-- ===== FOOTER ===== -->
<footer>
<p>
<a href="https://www.facebook.com/stonecitygrill" target="_blank">Stone Grill Press</a>
· Leyte, Philippines · © {{YEAR}}
<a href="{{FB_PROFILE}}" target="_blank">Ninox Antolihao</a><br>
{{EDITION}}
</p>
</footer>

<!-- ===== SERVICE WORKER SAFE ===== -->
<script>
if ('serviceWorker' in navigator && !location.pathname.includes('/reflections/pages/')) {
navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
