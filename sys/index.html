    <script type="text/babel">

        // --- INLINE ICONS (Replacing lucide-react for standalone HTML) ---

        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;

        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;

        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></Icon>;
        const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;

        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
        const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="9 11 12 14 22 4"/></Icon>;
        const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
        const Delete = (p) => <Icon {...p}><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></Icon>;

        // --- PIN SCREEN COMPONENT ---
        function PinScreen({ onUnlock }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            const CORRECT_PIN = '1234'; // Default Admin PIN

            const handlePress = (num) => {
                if (pin.length < 4 && !error) {
                    const newPin = pin + num;
                    setPin(newPin);
                    if (newPin.length === 4) {
                        if (newPin === CORRECT_PIN) {
                            setTimeout(onUnlock, 200);
                        } else {
                            setError(true);
                            setTimeout(() => {
                                setPin('');
                                setError(false);
                            }, 800);
                        }
                    }
                }
            };

            const handleDelete = () => {
                if (pin.length > 0 && !error) {
                    setPin(pin.slice(0, -1));
                }
            };

            return (
                <div className="fixed inset-0 bg-blue-950 flex flex-col items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 flex flex-col items-center animate-in zoom-in-95 duration-300">
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700">
                            <Lock className="w-8 h-8" />
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-2 tracking-tight">Admin Access</h2>
                        <p className="text-sm text-gray-500 mb-8">Enter PIN to access dashboard</p>

                        <div className={`flex space-x-4 mb-8 ${error ? 'animate-bounce' : ''}`}>
                            {[...Array(4)].map((_, i) => (
                                <div 
                                    key={i} 
                                    className={`w-4 h-4 rounded-full border-2 transition-colors duration-200 ${
                                        error ? 'border-red-500 bg-red-500' : 
                                        pin.length > i ? 'border-blue-600 bg-blue-600' : 'border-gray-300 bg-transparent'
                                    }`}
                                />
                            ))}
                        </div>
                        {error && <p className="text-red-500 text-xs font-bold uppercase tracking-wider mb-4 mt-[-1rem]">Incorrect PIN</p>}

                        <div className="grid grid-cols-3 gap-4 w-full">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                <button 
                                    key={num} 
                                    onClick={() => handlePress(num.toString())}
                                    className="h-14 rounded-xl bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-2xl font-semibold text-gray-800 transition-colors outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                    {num}
                                </button>
                            ))}
                            <div className="h-14"></div>
                            <button 
                                onClick={() => handlePress('0')}
                                className="h-14 rounded-xl bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-2xl font-semibold text-gray-800 transition-colors outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                0
                            </button>
                            <button 
                                onClick={handleDelete}
                                className="h-14 rounded-xl bg-gray-50 hover:bg-red-50 active:bg-red-100 text-gray-600 hover:text-red-600 flex items-center justify-center transition-colors outline-none focus:ring-2 focus:ring-red-500"
                            >
                                <Delete className="w-6 h-6" />
                            </button>
                        </div>
                        <p className="mt-8 text-xs text-gray-400">Default PIN is <span className="font-bold">1234</span></p>
                    </div>
                </div>
            );
        }

        // --- INITIAL MOCK DATA ---
        const initialEmployees = [
            { id: 1, name: 'Ninox', dept: 'Kitchen', rate: 450, status: 'Active', caBalance: 0 },
            { id: 2, name: 'NEL2x', dept: 'Kitchen', rate: 500, status: 'Active', caBalance: 1500 },
            { id: 4, name: 'Jhie', dept: 'Kitchen', rate: 450, status: 'Active', caBalance: 0 },
            { id: 5, name: 'Roel', dept: 'Kitchen', rate: 550, status: 'Active', caBalance: 5000 },
            { id: 6, name: 'LIZA', dept: 'Kitchen', rate: 450, status: 'Active', caBalance: 200 },
            { id: 7, name: 'CALOY', dept: 'Kitchen', rate: 600, status: 'Active', caBalance: 0 },
            { id: 9, name: 'JEREY', dept: 'Kitchen', rate: 450, status: 'Active', caBalance: 1000 },
            { id: 12, name: 'CHRIS', dept: 'Kitchen', rate: 500, status: 'Active', caBalance: 0 },
            { id: 13, name: 'DELIA', dept: 'Kitchen', rate: 450, status: 'Active', caBalance: 0 },
            { id: 14, name: 'JEVON', dept: 'Kitchen', rate: 450, status: 'Active', caBalance: 3000 },
            { id: 18, name: 'Claudine LOTA', dept: 'Front', rate: 400, status: 'Active', caBalance: 500 },
            { id: 19, name: 'Raffy Javier', dept: 'Kitchen', rate: 500, status: 'Active', caBalance: 0 },
        ];

        const initialCashAdvances = [
            { id: 101, empId: 2, date: '2026-02-15', amount: 2000, balance: 1500, reason: 'Emergency' },
            { id: 102, empId: 5, date: '2026-02-28', amount: 5000, balance: 5000, reason: 'Tuition' },
            { id: 103, empId: 14, date: '2026-03-05', amount: 3000, balance: 3000, reason: 'Medical' },
        ];

        const defaultRawData = `ID	Name	Dept.	Time	Device ID	
7	CALOY	Kitchen	 03/01/2026     06:39:34	1
18	claudine LOTA	Not Set2	 03/01/2026     09:13:28	1

18	claudine LOTA	Not Set2	 03/01/2026     20:12:19	1
12	CHRIS	Kitchen	 03/01/2026     20:12:54	1
19	RAffy javier	Kitchen	 03/01/2026     20:16:06	1
9	JEREY	Kitchen	 03/01/2026     20:32:11	1
13	DELIA	Kitchen	 03/01/2026     20:35:14	1
2	NEL2x	Kitchen	 03/01/2026     20:35:51	1
7	CALOY	Kitchen	 03/01/2026     20:41:44	1
14	JEVON	Kitchen	 03/01/2026     20:41:47	1
4	Jhie	Kitchen	 03/01/2026     20:41:57	1
1	Ninox	Kitchen	 03/01/2026     20:43:02	1
5	Roel	Kitchen	 03/01/2026     20:43:36`;

        // --- MAIN APP COMPONENT ---
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(true);
            
            // Mobile responsiveness for Sidebar
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 1024) {
                        setSidebarOpen(true);
                    } else {
                        setSidebarOpen(false);
                    }
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleTabSwitch = (tab) => {
                setActiveTab(tab);
                if (window.innerWidth < 1024) {
                    setSidebarOpen(false);
                }
            };

            const [employees, setEmployees] = useState(initialEmployees);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState(initialCashAdvances);
            const [selectedMonth, setSelectedMonth] = useState('2026-03');

            const [showPayCard, setShowPayCard] = useState(null);
            const [showAddEmp, setShowAddEmp] = useState(false);
            
            // Lifted states from sub-render functions to top level
            const [rawInput, setRawInput] = useState(defaultRawData);
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '' });

            // Computed Payroll Data
            const payrollData = useMemo(() => {
                return employees.map(emp => {
                    const empAtt = attendance.filter(a => a.empId === emp.id && a.date.startsWith(selectedMonth));
                    const daysWorked = empAtt.reduce((sum, record) => sum + record.dayEquivalent, 0);
                    
                    const gross = daysWorked * emp.rate;
                    
                    const sss = gross > 0 ? 135 : 0;
                    const philhealth = gross > 0 ? 100 : 0;
                    const pagibig = gross > 0 ? 100 : 0;
                    
                    let caDeduction = 0;
                    if (emp.caBalance > 0 && gross > 0) {
                        caDeduction = Math.min(emp.caBalance, gross * 0.2);
                    }
                    
                    const totalDeductions = sss + philhealth + pagibig + caDeduction;
                    const netSalary = gross - totalDeductions;
                    
                    return {
                        ...emp,
                        daysWorked,
                        gross,
                        sss,
                        philhealth,
                        pagibig,
                        caDeduction,
                        totalDeductions,
                        netSalary,
                        newCaBalance: emp.caBalance - caDeduction
                    };
                });
            }, [employees, attendance, cashAdvances, selectedMonth]);

            // Dashboard Metrics
            const metrics = useMemo(() => {
                const today = '2026-03-01'; 
                const presentToday = attendance.filter(a => a.date === today).length;
                const totalCaBalance = employees.reduce((sum, e) => sum + e.caBalance, 0);
                const negativeBalances = payrollData.filter(p => p.netSalary < 0).length;

                return {
                    totalEmployees: employees.length,
                    presentToday,
                    absentToday: employees.length - presentToday,
                    totalCaBalance,
                    negativeBalances
                };
            }, [employees, attendance, payrollData]);


            // --- PARSER LOGIC ---
            const parseBiometricData = (rawData) => {
                const lines = rawData.trim().split('\n');
                const logsMap = {};

                lines.forEach(line => {
                    const parts = line.split('\t').map(p => p.trim());
                    if (parts.length >= 4 && parts[0] !== 'ID' && parts[0] !== '') {
                        const empId = parseInt(parts[0]);
                        const timeStrRaw = parts[3].replace(/\s+/g, ' '); 
                        const [datePart, timePart] = timeStrRaw.split(' ');
                        
                        if (!datePart || !timePart) return;

                        const [m, d, y] = datePart.split('/');
                        const isoDate = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
                        
                        const key = `${empId}_${isoDate}`;
                        if (!logsMap[key]) {
                            logsMap[key] = { empId, date: isoDate, punches: [] };
                        }
                        logsMap[key].punches.push(timePart);
                    }
                });

                const processed = Object.values(logsMap).map(log => {
                    log.punches.sort();
                    const firstIn = log.punches[0];
                    const lastOut = log.punches[log.punches.length - 1];
                    
                    let hours = 0;
                    let dayEquivalent = 0;
                    let remarks = 'Missing Out';

                    if (log.punches.length > 1 && firstIn !== lastOut) {
                        const t1 = new Date(`1970-01-01T${firstIn}Z`);
                        const t2 = new Date(`1970-01-01T${lastOut}Z`);
                        hours = (t2 - t1) / (1000 * 60 * 60);
                        
                        if (hours >= 7.5) dayEquivalent = 1;
                        else if (hours >= 4) dayEquivalent = 0.5;
                        else dayEquivalent = Number((hours / 8).toFixed(2));
                        
                        remarks = hours >= 7.5 ? 'Complete' : 'Undertime';
                    } else {
                        if (log.empId === 6 || log.empId === 1) {
                            dayEquivalent = 1; 
                            hours = 8;
                            remarks = 'Manual Override (1 Punch)';
                        }
                    }

                    return {
                        id: Math.random().toString(36).substr(2, 9),
                        empId: log.empId,
                        date: log.date,
                        firstIn,
                        lastOut: log.punches.length > 1 ? lastOut : '--:--:--',
                        hours: hours.toFixed(2),
                        dayEquivalent,
                        remarks
                    };
                });

                setAttendance(processed);
                alert(`Successfully processed ${processed.length} attendance records.`);
            };

            const renderDashboard = () => (
                <div className="space-y-6 animate-in fade-in duration-300">
                    <h2 className="text-2xl font-bold text-gray-800">Overview</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard title="Total Employees" value={metrics.totalEmployees} icon={<Users />} color="bg-blue-50 text-blue-700" />
                        <StatCard title="Present Today" value={metrics.presentToday} icon={<CheckCircle2 />} color="bg-green-50 text-green-700" />
                        <StatCard title="Total C.A. Balance" value={`₱${metrics.totalCaBalance.toLocaleString()}`} icon={<Banknote />} color="bg-amber-50 text-amber-700" />
                        <StatCard title="Alerts (Negative Net)" value={metrics.negativeBalances} icon={<AlertCircle />} color="bg-red-50 text-red-700" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="font-bold text-gray-800 mb-4 flex items-center"><Calculator className="w-5 h-5 mr-2"/> Payroll Snapshot ({selectedMonth})</h3>
                            <div className="space-y-4">
                                {payrollData.slice(0, 5).map(p => (
                                    <div key={p.id} className="flex justify-between items-center p-3 hover:bg-gray-50 rounded-lg border border-gray-50">
                                        <div>
                                            <p className="font-semibold text-sm">{p.name}</p>
                                            <p className="text-xs text-gray-500">{p.dept} • {p.daysWorked} days</p>
                                        </div>
                                        <div className="text-right">
                                            <p className={`font-bold ${p.netSalary < 0 ? 'text-red-600' : 'text-green-600'}`}>
                                                ₱{p.netSalary.toLocaleString(undefined, {minimumFractionDigits: 2})}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setActiveTab('payroll')} className="w-full text-sm text-blue-600 hover:text-blue-800 font-medium pt-2">View Full Payroll &rarr;</button>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="font-bold text-gray-800 mb-4 flex items-center"><Clock className="w-5 h-5 mr-2"/> Recent Attendance Issues</h3>
                            <div className="space-y-3">
                                {attendance.filter(a => a.remarks !== 'Complete').slice(0,5).map(a => {
                                    const emp = employees.find(e => e.id === a.empId);
                                    return (
                                        <div key={a.id} className="flex justify-between items-center p-3 bg-red-50 text-red-800 rounded-lg border border-red-100">
                                            <span className="text-sm font-medium">{emp?.name || `ID:${a.empId}`}</span>
                                            <span className="text-xs px-2 py-1 bg-red-100 rounded-full">{a.remarks}</span>
                                        </div>
                                    )
                                })}
                                {attendance.length === 0 && <p className="text-sm text-gray-500 italic">No attendance data loaded. Go to Attendance tab to import.</p>}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderEmployees = () => (
                <div className="animate-in fade-in duration-300">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-xl font-bold text-gray-800">Employee Masterlist</h2>
                        <button onClick={() => setShowAddEmp(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center text-sm font-medium transition-colors shadow-sm">
                            <Plus className="w-4 h-4 mr-2"/> Add Employee
                        </button>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs text-left">
                                <thead className="text-[11px] text-white uppercase bg-blue-900 tracking-wider">
                                    <tr>
                                        <th className="px-3 py-2 rounded-tl-lg">ID</th>
                                        <th className="px-3 py-2">Name</th>
                                        <th className="px-3 py-2">Department</th>
                                        <th className="px-3 py-2 text-right">Daily Rate</th>
                                        <th className="px-3 py-2 text-right">C.A. Balance</th>
                                        <th className="px-3 py-2 text-center">Status</th>
                                        <th className="px-3 py-2 rounded-tr-lg">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {employees.map(emp => (
                                        <tr key={emp.id} className="hover:bg-blue-50 transition-colors">
                                            <td className="px-3 py-1.5 font-medium text-gray-900">#{emp.id}</td>
                                            <td className="px-3 py-1.5 font-bold">{emp.name}</td>
                                            <td className="px-3 py-1.5 text-gray-600">{emp.dept}</td>
                                            <td className="px-3 py-1.5 text-right font-mono tracking-tight text-gray-700">₱{emp.rate.toFixed(2)}</td>
                                            <td className={`px-3 py-1.5 text-right font-mono tracking-tight font-semibold ${emp.caBalance > 0 ? 'text-red-600' : 'text-gray-400'}`}>
                                                ₱{emp.caBalance.toLocaleString(undefined, {minimumFractionDigits: 2})}

                        flex-shrink-0
                    `}>
                        <div className="p-4 flex items-center justify-between border-b border-blue-800">
                            {isSidebarOpen ? (
                                <div className="font-black text-xl tracking-tight flex items-center">
                                    <span className="bg-white text-blue-900 p-1 rounded mr-2"><LayoutDashboard className="w-5 h-5"/></span>
                                    STONEGRILL
                                </div>
                            ) : (
                                <div className="bg-white text-blue-900 p-1 rounded mx-auto"><LayoutDashboard className="w-5 h-5"/></div>
                            )}
                            {isSidebarOpen && <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-white/70 hover:text-white"><X className="w-5 h-5"/></button>}
                        </div>

                        <nav className="flex-1 py-6 space-y-1 overflow-y-auto">
                            <NavItem icon={<LayoutDashboard />} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabSwitch('dashboard')} open={isSidebarOpen} />
                            <NavItem icon={<Users />} label="Employees" active={activeTab === 'employees'} onClick={() => handleTabSwitch('employees')} open={isSidebarOpen} />
                            <NavItem icon={<Clock />} label="Attendance Logs" active={activeTab === 'attendance'} onClick={() => handleTabSwitch('attendance')} open={isSidebarOpen} />
                            <NavItem icon={<Banknote />} label="Cash Advances" active={activeTab === 'ca'} onClick={() => handleTabSwitch('ca')} open={isSidebarOpen} />
                            <NavItem icon={<Calculator />} label="Payroll Summary" active={activeTab === 'payroll'} onClick={() => handleTabSwitch('payroll')} open={isSidebarOpen} />
                            <NavItem icon={<FileSpreadsheet />} label="Reports" active={activeTab === 'reports'} onClick={() => alert('Reports module pending')} open={isSidebarOpen} />
                        </nav>

                        <div className="p-4 border-t border-blue-800">
                            <NavItem icon={<Settings />} label="Settings" active={false} onClick={() => {}} open={isSidebarOpen} />
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        {/* HEADER */}
                        <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-8 shrink-0">
                            <div className="flex items-center">
                                <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="mr-4 text-gray-500 hover:text-gray-800 focus:outline-none">
                                    <Menu className="w-6 h-6" />
                                </button>
                                <h1 className="text-lg font-bold text-gray-800 capitalize">{activeTab.replace('-', ' ')}</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="relative hidden md:block">
                                    <Search className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                                    <input type="text" placeholder="Search employee..." className="pl-9 pr-4 py-1.5 text-sm bg-gray-100 border-transparent rounded-full focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none w-64 transition-all"/>
                                </div>
                                <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-sm">
                                    A
                                </div>
                            </div>
                        </header>

                        {/* CONTENT AREA */}
                        <div className="flex-1 overflow-y-auto p-4 lg:p-6 bg-gray-100">
                            <div className="max-w-7xl mx-auto h-full flex flex-col">
                                {activeTab === 'dashboard' && renderDashboard()}
                                {activeTab === 'employees' && renderEmployees()}
                                {activeTab === 'attendance' && renderAttendance()}
                                {activeTab === 'payroll' && renderPayroll()}
                                {activeTab === 'ca' && renderCA()}
                            </div>
                        </div>
                    </main>

                    {renderModals()}
                </div>
            );
        }

        // Subcomponents
        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button 
                    onClick={onClick}
                    className={`w-full flex items-center px-4 py-3 transition-colors ${active ? 'bg-blue-800 text-white border-r-4 border-blue-400' : 'text-blue-200 hover:bg-blue-800 hover:text-white border-r-4 border-transparent'}`}
                    title={label}
                >
                    <span className="flex-shrink-0">{icon}</span>
                    {open && <span className="ml-3 text-sm font-medium whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition-shadow">
                    <div>
                        <p className="text-sm font-medium text-gray-500 mb-1">{title}</p>
                        <p className="text-3xl font-black text-gray-800">{value}</p>
                    </div>
                    <div className={`p-4 rounded-full ${color}`}>
                        {icon}
                    </div>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
