<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill Payroll - Full Cloud Suite</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs (v11.6.1) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your dedicated Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "stone-grill-v1";

        // Global bridge to React component
        window.fb = { db, auth, appId, signInAnonymously, onAuthStateChanged, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
            #interactive-print-section, #interactive-print-section * { visibility: visible; }
            #interactive-print-section { position: absolute; left: 0; top: 0; width: 100%; border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            .print-hidden { display: none !important; }
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ d, className = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}
                {children}
            </svg>
        );
        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Banknote = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></Icon>;
        const CalendarDays = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;
        const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
        const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="9 11 12 14 22 4"/></Icon>;
        const Edit = (p) => <Icon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;

        // --- PIN SCREEN ---
        function PinScreen({ onUnlock }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            const handlePress = (num) => {
                if (pin.length < 4 && !error) {
                    const next = pin + num;
                    setPin(next);
                    if (next.length === 4) {
                        if (next === '1234') onUnlock();
                        else {
                            setError(true);
                            setTimeout(() => { setPin(''); setError(false); }, 700);
                        }
                    }
                }
            };
            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50 font-sans">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up">
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700"><Lock /></div>
                        <h2 className="text-2xl font-black text-slate-800 mb-8 uppercase tracking-widest">Admin Access</h2>
                        <div className={`flex space-x-6 mb-12 ${error ? 'animate-bounce text-red-500' : ''}`}>
                            {[...Array(4)].map((_, i) => (
                                <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all duration-300 ${pin.length > i ? 'bg-blue-600 border-blue-600' : 'bg-transparent border-gray-300'}`} />
                            ))}
                        </div>
                        <div className="grid grid-cols-3 gap-6 w-full">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9, '', 0, 'del'].map((num, i) => (
                                num === 'del' ? (
                                    <button key={i} onClick={() => setPin(pin.slice(0, -1))} className="h-14 rounded-2xl bg-gray-50 flex items-center justify-center text-red-400 font-bold uppercase text-[10px]">del</button>
                                ) : num === '' ? <div key={i} /> : (
                                    <button key={i} onClick={() => handlePress(num.toString())} className="h-14 rounded-2xl bg-gray-50 text-2xl font-black text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">{num}</button>
                                )
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APPLICATION ---
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [user, setUser] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 1024);

            const [employees, setEmployees] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState([]);
            const [interactivePayrolls, setInteractivePayrolls] = useState([]);

            // UI Control States
            const [selectedMonth, setSelectedMonth] = useState('2026-04');
            const [showAddEmp, setShowAddEmp] = useState(false);
            const [rawInput, setRawInput] = useState('');
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '' });
            const [viewProfile, setViewProfile] = useState(null);
            const [reportDates, setReportDates] = useState({ start: '2026-04-01', end: '2026-04-30' });
            
            // Interactive Payslip State
            const [icEmpId, setIcEmpId] = useState('');
            const [icDateStart, setIcDateStart] = useState('2026-04-01');
            const [icDateEnd, setIcDateEnd] = useState('2026-04-30');
            const [icForm, setIcForm] = useState({ days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0 });

            // Dashboard Filter Search State
            const [dashSearchEmpId, setDashSearchEmpId] = useState('');
            const [dashSearchStart, setDashSearchStart] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10);
            });
            const [dashSearchEnd, setDashSearchEnd] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().slice(0, 10);
            });

            // Form state maps exactly to the Biometric raw values
            const [newEmpForm, setNewEmpForm] = useState({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', contactNumber: '', status: 'active' });
            const [isEditing, setIsEditing] = useState(false);

            // --- NAVIGATION HELPER ---
            const switchTab = (tab) => {
                setActiveTab(tab);
                if (window.innerWidth < 1024) {
                    setSidebarOpen(false);
                }
            };

            // --- FIREBASE SYNC ---
            useEffect(() => {
                const initFirebase = async () => {
                    if (window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        try {
                            await signInAnonymously(auth);
                        } catch (err) { console.error("Auth Link Error:", err); }
                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            if (u) setIsReady(true);
                        });
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, onSnapshot, collection } = window.fb;
                const userPath = (name) => collection(db, 'artifacts', appId, 'users', user.uid, name);

                const unsubEmps = onSnapshot(userPath('employees'), (snap) => {
                    setEmployees(snap.docs.map(d => {
                        const data = d.data();
                        return { 
                            id: d.id, 
                            name: data.name || `${data.firstName || ''} ${data.lastName || ''}`.trim() || d.id,
                            firstName: data.firstName || '',
                            lastName: data.lastName || '',
                            position: data.position || '',
                            rate: data.dailyRate || 0,
                            contactNumber: data.contactNumber || '',
                            status: data.status || 'active',
                            caBalance: data.caBalance || 0
                        };
                    }).sort((a,b)=>a.name.localeCompare(b.name)));
                });
                const unsubAtt = onSnapshot(userPath('attendance'), (snap) => {
                    setAttendance(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubCA = onSnapshot(userPath('cash_advances'), (snap) => {
                    setCashAdvances(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubIP = onSnapshot(userPath('payroll_entries'), (snap) => {
                    setInteractivePayrolls(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => { unsubEmps(); unsubAtt(); unsubCA(); unsubIP(); };
            }, [user]);

            useEffect(() => {
                if (icEmpId && icDateStart && icDateEnd) {
                    const key = `${icEmpId}_${icDateStart}_${icDateEnd}`;
                    const saved = interactivePayrolls.find(p => p.recordKey === key);
                    setIcForm(saved ? saved.data : { days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0 });
                }
            }, [icEmpId, icDateStart, icDateEnd, interactivePayrolls]);

            // --- CALCULATIONS ---
            const payrollSummary = useMemo(() => {
                return employees.map(emp => {
                    const empAtt = attendance.filter(a => a.empId.toString() === emp.id.toString() && a.date.startsWith(selectedMonth));
                    const days = empAtt.reduce((sum, r) => sum + (parseFloat(r.dayEquivalent) || 0), 0);
                    const gross = days * (emp.rate || 0);
                    const caDed = (emp.caBalance > 0 && gross > 0) ? Math.min(emp.caBalance, gross * 0.2) : 0;
                    const net = gross - caDed;
                    return { ...emp, days, gross, caDed, net };
                });
            }, [employees, attendance, selectedMonth]);

            const stats = useMemo(() => {
                const today = new Date().toISOString().slice(0, 10);
                const present = attendance.filter(a => a.date === today).length;
                const totalCA = employees.reduce((sum, e) => sum + (e.caBalance || 0), 0);
                return { count: employees.length, present, totalCA, alerts: payrollSummary.filter(p => p.net < 0).length };
            }, [employees, attendance, payrollSummary]);

            // --- DASHBOARD SEARCH LOGIC ---
            let searchedEmp = null;
            let searchedDays = 0, searchedGross = 0, searchedCaDed = 0, searchedMisc = 0;
            if (dashSearchEmpId) {
                searchedEmp = employees.find(e => e.id.toString() === dashSearchEmpId);
                if (searchedEmp && dashSearchStart && dashSearchEnd) {
                    const att = attendance.filter(a => a.empId.toString() === searchedEmp.id.toString() && a.date >= dashSearchStart && a.date <= dashSearchEnd);
                    searchedDays = att.reduce((sum, r) => sum + (parseFloat(r.dayEquivalent) || 0), 0);
                    searchedGross = searchedDays * (searchedEmp.rate || 0);
                    searchedCaDed = (searchedEmp.caBalance > 0 && searchedGross > 0) ? Math.min(searchedEmp.caBalance, searchedGross * 0.2) : 0;
                    searchedMisc = searchedGross > 0 ? 335 : 0; // Fixed default simulation for visual
                }
            }

            // --- CLOUD HANDLERS ---
            const handleAddStaff = async (e) => {
                e.preventDefault();
                if (!user || !window.fb) return;
                const { db, appId, doc, setDoc, updateDoc } = window.fb;
                const bId = newEmpForm.biometricId.trim();
                if (!bId) return alert("Biometric ID is required.");
                
                try {
                    const newDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'employees', bId);
                    
                    if (isEditing) {
                        await updateDoc(newDocRef, {
                            firstName: newEmpForm.firstName,
                            lastName: newEmpForm.lastName,
                            name: `${newEmpForm.firstName} ${newEmpForm.lastName}`.trim(),
                            position: newEmpForm.position,
                            dailyRate: parseFloat(newEmpForm.dailyRate) || 0,
                            contactNumber: newEmpForm.contactNumber || '',
                            status: newEmpForm.status || 'active'
                        });
                        alert("Profile successfully updated.");
                    } else {
                        await setDoc(newDocRef, {
                            employeeId: bId,
                            firstName: newEmpForm.firstName,
                            lastName: newEmpForm.lastName,
                            name: `${newEmpForm.firstName} ${newEmpForm.lastName}`.trim(),
                            position: newEmpForm.position,
                            dailyRate: parseFloat(newEmpForm.dailyRate) || 0,
                            contactNumber: newEmpForm.contactNumber || '',
                            caBalance: 0,
                            status: newEmpForm.status || 'active',
                            createdAt: Date.now()
                        });
                        alert("New staff member saved.");
                    }

                    setShowAddEmp(false);
                    setIsEditing(false);
                    setNewEmpForm({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', contactNumber: '', status: 'active' });
                } catch (err) { alert("Error: " + err.message); }
            };

            const handleIssueCA = async () => {
                if (!user || !newCa.empId || !newCa.amount) return;
                const { db, appId, addDoc, doc, updateDoc, collection } = window.fb;
                const amt = parseFloat(newCa.amount);
                const emp = employees.find(e => e.id.toString() === newCa.empId.toString());
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'cash_advances'), {
                        empId: newCa.empId, amount: amt, date: new Date().toISOString().slice(0, 10), reason: newCa.reason
                    });
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'employees', newCa.empId), {
                        caBalance: (emp.caBalance || 0) + amt
                    });
                    setNewCa({ empId: '', amount: '', reason: '' });
                    alert("Advance issued successfully.");
                } catch (err) { alert(err.message); }
            };

            const handleProcessLogs = async () => {
                if (!user || !rawInput.trim()) return;
                const { db, appId, addDoc, collection } = window.fb;
                const lines = rawInput.trim().split('\n');
                let count = 0;
                let errCount = 0;
                
                try {
                    for (const line of lines) {
                        const p = line.split(/\t| {2,}/).map(x => x.trim()).filter(Boolean);
                        
                        if (p.length >= 3 && p[0].toUpperCase() !== 'ID') {
                            const dateIndex = p.findIndex(col => col.includes('/'));
                            if (dateIndex === -1) {
                                errCount++;
                                continue;
                            }

                            // Capture exactly what the machine outputted
                            const rawId = p[0];
                            const rawName = p[1];
                            
                            const dateStr = p[dateIndex];
                            let timeRaw = '';
                            let dateRaw = '';

                            if (dateStr.includes(' ')) {
                                const parts = dateStr.replace(/\s+/g, ' ').split(' ');
                                dateRaw = parts[0];
                                timeRaw = parts[1];
                            } else {
                                dateRaw = dateStr;
                                if (p.length > dateIndex + 1 && p[dateIndex + 1].includes(':')) {
                                    timeRaw = p[dateIndex + 1];
                                }
                            }

                            if (!dateRaw || !timeRaw) { errCount++; continue; }
                            const [m, d, y] = dateRaw.split('/');
                            if (!y || !m || !d) { errCount++; continue; }

                            const isoDate = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;

                            // Link directly using the exact biometric ID and save the Biometric Name
                            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'attendance'), {
                                empId: rawId, 
                                empName: rawName, 
                                date: isoDate, 
                                firstIn: timeRaw, 
                                dayEquivalent: 1, 
                                remarks: 'Normalized'
                            });
                            count++;
                        }
                    }
                    setRawInput('');
                    alert("Imported " + count + " records to the cloud. " + (errCount > 0 ? "(Skipped " + errCount + " lines)" : ""));
                } catch (err) {
                    alert("Error parsing logs: " + err.message);
                }
            };

            const handleSavePayslip = async () => {
                if (!user || !icEmpId) return;
                const { db, appId, doc, setDoc } = window.fb;
                const key = `${icEmpId}_${icDateStart}_${icDateEnd}`;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'payroll_entries', key), {
                        recordKey: key, empId: icEmpId, startDate: icDateStart, endDate: icDateEnd, data: icForm, updatedAt: Date.now()
                    });
                    alert("Payslip saved to cloud database.");
                } catch (err) { alert(err.message); }
            };

            const handleExportBackup = () => {
                const data = { employees, attendance, cashAdvances, interactivePayrolls };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `stonegrill_backup_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
            };

            const handleEditClick = () => {
                setNewEmpForm({
                    biometricId: viewProfile.id,

                                                    <tbody className="divide-y divide-gray-50">
                                                        {cashAdvances.length === 0 ? <tr><td colSpan="3" className="p-16 text-center text-slate-300 italic">No advances on cloud ledger.</td></tr> :
                                                            cashAdvances.sort((a,b)=>b.date.localeCompare(a.date)).map(ca => (
                                                            <tr key={ca.id} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="p-4 text-slate-400 font-mono text-xs">{ca.date}</td>
                                                                <td className="p-4 font-black uppercase tracking-tighter text-slate-700">{employees.find(e => e.id.toString() === ca.empId.toString())?.name || ca.empId}</td>
                                                                <td className="p-4 text-right font-black text-red-600 font-mono">₱{formatMoney(ca.amount)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'payroll' && (
                                    <div className="bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
                                        <div className="p-6 border-b flex justify-between items-center bg-blue-900 text-white">
                                            <h2 className="font-black uppercase tracking-widest flex items-center gap-3"><Calculator className="w-6 h-6"/> Payroll Sheet</h2>
                                            <div className="flex gap-4">
                                                <select className="border rounded-xl px-4 py-2 text-sm bg-white text-blue-900 font-black outline-none" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
                                                    <option value="2026-04">April 2026</option>
                                                    <option value="2026-03">March 2026</option>
                                                </select>
                                                <button onClick={() => window.print()} className="bg-white text-blue-900 hover:bg-blue-50 px-6 py-2 rounded-xl text-xs font-black uppercase shadow-lg transition-all tracking-widest">PRINT</button>
                                            </div>
                                        </div>
                                        <div className="overflow-x-auto custom-scrollbar">
                                            <table className="w-full text-left whitespace-nowrap text-xs">
                                                <thead className="text-[10px] text-white uppercase bg-blue-950 font-black tracking-widest">
                                                    <tr>
                                                        <th className="p-4 border border-blue-900">Member</th>
                                                        <th className="p-4 border border-blue-900 text-center">Days</th>
                                                        <th className="p-4 border border-blue-900 text-right bg-blue-900">Gross</th>
                                                        <th className="p-4 border border-blue-900 text-right">CA Ded</th>
                                                        <th className="p-4 border border-blue-900 text-right bg-emerald-900 font-bold">Net Salary</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {payrollSummary.map(row => (
                                                        <tr key={row.id} className="hover:bg-amber-50/30 transition-colors">
                                                            <td className="p-4 border font-black text-slate-800 uppercase tracking-tighter">{row.name}</td>
                                                            <td className="p-4 border text-center font-black font-mono">{row.days}</td>
                                                            <td className="p-4 border text-right font-black font-mono bg-slate-50/50">₱{formatMoney(row.gross)}</td>
                                                            <td className="p-4 border text-right text-red-600 font-black font-mono">-{formatMoney(row.caDed)}</td>
                                                            <td className={`p-4 border text-right font-black text-sm font-mono ${row.net < 0 ? 'text-white bg-rose-600' : 'text-emerald-700 bg-emerald-50'}`}>₱{formatMoney(row.net)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'summary' && (
                                    <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden flex flex-col min-h-[500px]">
                                        <div className="p-6 border-b bg-slate-900 text-white flex justify-between items-center">
                                            <h2 className="font-black uppercase tracking-widest flex items-center gap-2"><CalendarDays className="w-5 h-5"/> Yearly Overview</h2>
                                            <button onClick={handleExportBackup} className="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-xs font-black uppercase flex items-center gap-2 transition-all"><Download className="w-4 h-4"/> Backup</button>
                                        </div>
                                        <div className="overflow-auto flex-1 custom-scrollbar">
                                            <table className="w-full text-right text-xs border-collapse min-w-max">
                                                <thead className="bg-slate-800 text-white sticky top-0 z-20">
                                                    <tr>
                                                        <th className="p-4 text-left border border-slate-700 sticky left-0 bg-slate-800 font-black uppercase text-[10px] z-30">Staff Name</th>
                                                        {['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'].map(m => <th key={m} className="p-4 border border-slate-700 font-black">{m}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {employees.map(emp => (
                                                        <tr key={emp.id} className="border-b border-gray-100 hover:bg-blue-50/50">
                                                            <td className="p-4 text-left border-r border-gray-100 sticky left-0 bg-white font-black uppercase text-slate-700 z-10">{emp.name}</td>
                                                            {Array.from({length: 12}).map((_, i) => {
                                                                const isCurrent = selectedMonth.endsWith((i+1).toString().padStart(2,'0'));
                                                                return (
                                                                    <td key={i} className={`p-4 font-mono font-bold border-r border-gray-50 ${isCurrent ? 'text-blue-600 bg-blue-50/30' : 'text-slate-300 italic'}`}>
                                                                        {isCurrent ? `₱${formatMoney(payrollSummary.find(p=>p.id===emp.id)?.net)}` : '--'}
                                                                    </td>
                                                                );
                                                            })}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'reports' && (
                                    <div className="flex flex-col h-full space-y-6">
                                        <div className="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 flex flex-wrap gap-6 items-center">
                                            <div className="flex items-center gap-3">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">From</label>
                                                <input type="date" value={reportDates.start} onChange={e => setReportDates({...reportDates, start: e.target.value})} className="p-2 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">To</label>
                                                <input type="date" value={reportDates.end} onChange={e => setReportDates({...reportDates, end: e.target.value})} className="p-2 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                            <button className="bg-blue-900 text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest text-xs flex items-center gap-2 shadow-lg hover:bg-black transition-all ml-auto"><Search className="w-4 h-4"/> Filter Ledger</button>
                                        </div>
                                        <div className="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden flex-1 flex flex-col">
                                            <div className="p-4 bg-gray-50 border-b flex justify-between items-center"><h3 className="font-black text-blue-900 uppercase text-xs tracking-widest">Attendance Logs</h3><button className="text-blue-600 flex items-center text-xs font-black uppercase tracking-widest hover:underline"><Download className="w-4 h-4 mr-2"/> Export CSV</button></div>
                                            <div className="overflow-y-auto flex-1 custom-scrollbar">
                                                <table className="w-full text-xs text-left">
                                                    <thead className="bg-white text-[10px] text-slate-400 uppercase border-b sticky top-0">
                                                        <tr><th className="p-4">Date</th><th className="p-4">Member</th><th className="p-4">Clock-In</th><th className="p-4 text-center">Day Equiv.</th><th className="p-4">Status</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-gray-50">
                                                        {attendance.filter(a => a.date >= reportDates.start && a.date <= reportDates.end).map((a, i) => (
                                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 font-mono text-slate-500">{a.date}</td>
                                                                <td className="p-4 font-black uppercase text-slate-700">{employees.find(e => e.id.toString() === a.empId.toString())?.name || a.empName || a.empId}</td>
                                                                <td className="p-4 text-blue-600 font-black">{a.firstIn}</td>
                                                                <td className="p-4 text-center font-bold text-slate-900">{a.dayEquivalent}</td>
                                                                <td className="p-4"><span className={`px-2 py-1 rounded-full text-[9px] font-black uppercase border ${a.remarks === 'Normalized' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-rose-50 text-rose-700 border-rose-200'}`}>{a.remarks}</span></td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'settings' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                                            <h3 className="font-black text-slate-800 uppercase tracking-widest mb-2">Cloud Backup</h3>
                                            <p className="text-sm text-slate-400 mb-8 font-medium">Download a complete snapshot of your restaurant database for manual archival.</p>
                                            <button onClick={handleExportBackup} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-black transition-all flex items-center justify-center gap-3"><Download /> Download JSON</button>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 flex flex-col justify-center text-center opacity-50 grayscale cursor-not-allowed">
                                            <h3 className="font-black text-slate-800 uppercase tracking-widest mb-2">Cloud Status</h3>
                                            <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Active & Authenticated</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* ADD MODAL */}
                    {showAddEmp && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleAddStaff} className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col animate-in zoom-in-95 duration-200">
                                <div className="p-6 border-b bg-gray-50 flex justify-between items-center"><h3 className="font-black uppercase tracking-widest text-blue-900 text-sm">{isEditing ? 'Edit Profile' : 'Onboard New Member'}</h3><button type="button" onClick={() => { setShowAddEmp(false); setIsEditing(false); setNewEmpForm({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', contactNumber: '', status: 'active' }); }} className="text-gray-400 hover:text-slate-900"><X /></button></div>
                                <div className="p-8 space-y-5">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Biometric ID (e.g. 7)</label>
                                        {!isEditing && <p className="text-[10px] text-red-500 font-bold mb-2">Must EXACTLY match the ID from the machine.</p>}
                                        <input type="text" required disabled={isEditing} placeholder="Machine ID" value={newEmpForm.biometricId || ''} onChange={e => setNewEmpForm({...newEmpForm, biometricId: e.target.value})} className={`w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold ${isEditing ? 'text-slate-400 cursor-not-allowed opacity-70' : 'text-slate-800'}`}/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">First Name</label><input type="text" placeholder="John" required value={newEmpForm.firstName} onChange={e => setNewEmpForm({...newEmpForm, firstName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Last Name</label><input type="text" placeholder="Doe" required value={newEmpForm.lastName} onChange={e => setNewEmpForm({...newEmpForm, lastName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Role</label><input type="text" placeholder="Staff" value={newEmpForm.position} onChange={e => setNewEmpForm({...newEmpForm, position: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 font-bold focus:ring-4 focus:ring-blue-500/10 outline-none"/></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Daily (₱)</label><input type="number" placeholder="500" required value={newEmpForm.dailyRate} onChange={e => setNewEmpForm({...newEmpForm, dailyRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 font-black focus:ring-4 focus:ring-blue-500/10 outline-none"/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Contact Number</label><input type="text" placeholder="+639123456789" value={newEmpForm.contactNumber} onChange={e => setNewEmpForm({...newEmpForm, contactNumber: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Status</label><select value={newEmpForm.status} onChange={e => setNewEmpForm({...newEmpForm, status: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 font-bold focus:ring-4 focus:ring-blue-500/10 outline-none text-slate-800"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all uppercase tracking-widest transform active:scale-[0.98] mt-2">{isEditing ? 'Update Profile' : 'Save to Cloud Ledger'}</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* LEDGER PROFILE MODAL */}
                    {viewProfile && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                                <div className="bg-blue-900 text-white p-6 flex justify-between items-center shrink-0"><h2 className="text-xl font-black uppercase tracking-widest flex items-center gap-3"><Users className="w-6 h-6"/> Staff Cloud Ledger</h2><button onClick={() => setViewProfile(null)} className="p-2 hover:bg-white/10 rounded-xl transition-colors"><X/></button></div>
                                <div className="overflow-y-auto p-8 flex-1 space-y-8 custom-scrollbar">
                                    <div className="flex justify-between border-b border-slate-100 pb-6 items-start">
                                        <div>
                                            <h3 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">{viewProfile.name}</h3>
                                            <p className="text-xs text-slate-400 uppercase font-black tracking-widest mt-3">{viewProfile.position || 'Restaurant Staff'} (ID: {viewProfile.id})</p>
                                            <button onClick={handleEditClick} className="mt-4 bg-slate-100 hover:bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-2"><Edit className="w-3.5 h-3.5"/> Edit Profile</button>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <span className={`px-4 py-1.5 text-[10px] font-black rounded-full uppercase border shadow-sm ${viewProfile.status === 'inactive' ? 'bg-slate-100 text-slate-500 border-slate-200' : 'bg-emerald-100 text-emerald-800 border-emerald-200'}`}>{viewProfile.status || 'ACTIVE'}</span>
                                            <p className="mt-4 font-black text-blue-600 font-mono text-xl tracking-tighter uppercase">₱{formatMoney(viewProfile.rate)}/DAY</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6 text-center">
                                        <div className="bg-rose-50 p-6 rounded-3xl border border-rose-100 shadow-sm"><p className="text-[10px] font-black text-rose-800 opacity-50 uppercase tracking-widest mb-2">Total C.A. Due</p><p className="text-4xl font-black text-rose-600 font-mono tracking-tighter">₱{formatMoney(viewProfile.caBalance)}</p></div>
                                        <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100 shadow-sm"><p className="text-[10px] font-black text-blue-800 opacity-50 uppercase tracking-widest mb-2">Attendance Count</p><p className="text-4xl font-black text-blue-600 font-mono tracking-tighter">{attendance.filter(a => a.empId.toString() === viewProfile.id.toString()).length}</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SUBCOMPONENTS ---
        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-6 py-4 transition-all duration-300 ${active ? 'bg-blue-800 text-white border-r-8 border-blue-400' : 'text-blue-200/50 hover:bg-blue-800/50 hover:text-white'}`}>
                    <span className={`shrink-0 transition-transform duration-300 ${active ? 'scale-125' : ''}`}>{icon}</span>
                    {open && <span className="ml-4 text-[11px] font-black uppercase tracking-widest whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-3xl border border-gray-100 flex items-center justify-between shadow-sm hover:shadow-xl transition-all group">
                    <div><p className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">{title}</p><p className="text-3xl font-black text-slate-800 tracking-tighter">{value}</p></div>
                    <div className={`p-5 rounded-2xl transition-all group-hover:rotate-12 group-hover:scale-110 shadow-sm ${color}`}>{icon}</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
