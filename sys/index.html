        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "stone-grill-v1";

        window.fb = { db, auth, appId, signInWithEmailAndPassword, signOut, onAuthStateChanged, FacebookAuthProvider, signInWithPopup, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc };
    </script>

<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ d, className = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}
                {children}
            </svg>
        );
        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Banknote = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></Icon>;
        const CalendarDays = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;
        const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
        const Unlock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
        const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
        const Edit = (p) => <Icon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;
        const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;

        // --- FIREBASE LOGIN SCREEN (Protects DB Connection) ---
        function LoginScreen() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError(false);
                setLoading(true);
                try {
                    const { auth, signInWithEmailAndPassword } = window.fb;
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setError(true);
                    setLoading(false);
                }
            };

            const handleFacebookLogin = async () => {
                setError(false);
                setLoading(true);
                try {
                    const { auth, FacebookAuthProvider, signInWithPopup } = window.fb;
                    const provider = new FacebookAuthProvider();
                    await signInWithPopup(auth, provider);
                } catch (err) {
                    console.error("Facebook Login Error:", err);
                    setError(true);
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50 font-sans overflow-y-auto">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up my-auto">
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700"><Lock /></div>
                        <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-widest text-center">System Login</h2>
                        <p className="text-xs text-slate-400 mb-8 text-center font-bold">Connect to Cloud Database</p>
                        
                        <form onSubmit={handleLogin} className="w-full space-y-4 mb-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Email Address</label>
                                <input 
                                    type="email" 
                                    required 
                                    value={email} 
                                    onChange={e => setEmail(e.target.value)} 
                                    className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"
                                />
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Password</label>
                                <input 
                                    type="password" 
                                    required 
                                    value={password} 
                                    onChange={e => setPassword(e.target.value)} 
                                    className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"
                                />
                            </div>
                            {error && <p className="text-red-500 text-xs font-bold uppercase tracking-wider text-center animate-pulse pt-2">Authentication Failed</p>}
                            
                            <button 
                                type="submit" 
                                disabled={loading}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white h-14 rounded-2xl font-black uppercase tracking-widest transition-colors shadow-lg disabled:opacity-50 mt-2"
                            >
                                {loading ? 'Connecting...' : 'Secure Login'}
                            </button>
                        </form>

                        <div className="flex items-center w-full mb-6">
                            <hr className="flex-1 border-slate-200" />
                            <span className="px-3 text-[10px] text-slate-400 font-black uppercase tracking-widest">OR</span>
                            <hr className="flex-1 border-slate-200" />
                        </div>

                        <button 
                            type="button" 
                            onClick={handleFacebookLogin}
                            disabled={loading}
                            className="w-full bg-[#1877F2] hover:bg-[#166FE5] text-white h-14 rounded-2xl font-black uppercase tracking-widest transition-colors shadow-lg disabled:opacity-50 flex items-center justify-center gap-3"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            Facebook Login
                        </button>
                    </div>
                </div>
            );
        }

        // --- ADMIN PIN MODAL (Protects Sensitive Views) ---
        function AdminPinModal({ onUnlock, onClose }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            
            const allowedPins = {
                '2558': 'Admin',
                '1234': 'User'
            };

            const handlePress = (num) => {
                if (pin.length < 4 && !error) {
                    const next = pin + num;
                    setPin(next);
                    if (next.length === 4) {
                        if (allowedPins[next]) { 
                            onUnlock(allowedPins[next]); 
                        } else {
                            setError(true);
                            setTimeout(() => { setPin(''); setError(false); }, 700);
                        }
                    }
                }
            };

            return (
                <div className="fixed inset-0 bg-blue-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 font-sans animate-in fade-in duration-200">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up relative">
                        <button onClick={onClose} className="absolute top-6 right-6 text-gray-400 hover:text-gray-800">
                            <X />
                        </button>
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700">
                            <Unlock />
                        </div>
                        <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-widest">System Unlock</h2>
                        <p className="text-[10px] text-slate-400 mb-8 font-black uppercase tracking-widest text-center">Enter PIN to access extended features</p>
                        
                        <div className={`flex space-x-6 mb-12 ${error ? 'animate-bounce text-red-500' : ''}`}>
                            {[...Array(4)].map((_, i) => (
                                <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all duration-300 ${pin.length > i ? 'bg-blue-600 border-blue-600' : 'bg-transparent border-gray-300'}`} />
                            ))}
                        </div>
                        <div className="grid grid-cols-3 gap-6 w-full">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9, '', 0, 'del'].map((num, i) => (
                                num === 'del' ? (
                                    <button key={i} onClick={() => setPin(pin.slice(0, -1))} className="h-14 rounded-2xl bg-gray-50 flex items-center justify-center text-red-400 font-bold uppercase text-[10px] hover:bg-red-50 transition-colors">del</button>
                                ) : num === '' ? <div key={i} /> : (
                                    <button key={i} onClick={() => handlePress(num.toString())} className="h-14 rounded-2xl bg-gray-50 text-2xl font-black text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">{num}</button>
                                )
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APPLICATION ---
        function App() {
            const [user, setUser] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const [isRestoring, setIsRestoring] = useState(false);
            
            // App RBAC State
            const [userRole, setUserRole] = useState('Staff'); 
            const [showAdminPin, setShowAdminPin] = useState(false);
            const [currentAdminName, setCurrentAdminName] = useState(''); 

            const isAdmin = userRole === 'Admin';
            const isPrivileged = userRole === 'Admin' || userRole === 'User';

            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 1024);

            const [employees, setEmployees] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState([]);
            const [interactivePayrolls, setInteractivePayrolls] = useState([]);
            const [auditLogs, setAuditLogs] = useState([]);

            // DYNAMIC MONTH OPTIONS (Last 12 Months)
            const monthOptions = useMemo(() => {
                const options = [];
                const d = new Date();
                for (let i = 0; i < 12; i++) {
                    const val = d.toISOString().slice(0, 7);
                    const lbl = d.toLocaleString('default', { month: 'long', year: 'numeric' });
                    options.push({ value: val, label: lbl });
                    d.setMonth(d.getMonth() - 1);
                }
                return options;
            }, []);

            // UI Control States
            const [selectedMonth, setSelectedMonth] = useState(() => new Date().toISOString().slice(0, 7));
            const [showAddEmp, setShowAddEmp] = useState(false);
            const [rawInput, setRawInput] = useState('');
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });
            const [viewProfile, setViewProfile] = useState(null);
            
            const defaultDate = new Date();
            const [reportDates, setReportDates] = useState({ 
                start: new Date(defaultDate.getFullYear(), defaultDate.getMonth(), 1).toISOString().slice(0, 10), 
                end: new Date(defaultDate.getFullYear(), defaultDate.getMonth() + 1, 0).toISOString().slice(0, 10) 
            });
            
            // Interactive Payslip State
            const [icEmpId, setIcEmpId] = useState('');
            const [icDateStart, setIcDateStart] = useState(() => new Date(defaultDate.getFullYear(), defaultDate.getMonth(), 1).toISOString().slice(0, 10));
            const [icDateEnd, setIcDateEnd] = useState(() => new Date(defaultDate.getFullYear(), defaultDate.getMonth() + 1, 0).toISOString().slice(0, 10));
            const [icForm, setIcForm] = useState({ days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0 });

            // Dashboard Filter Search State
            const [dashSearchEmpId, setDashSearchEmpId] = useState('');
            const [dashSearchStart, setDashSearchStart] = useState(reportDates.start);
            const [dashSearchEnd, setDashSearchEnd] = useState(reportDates.end);

            // Form state (Added miscRate)
            const [newEmpForm, setNewEmpForm] = useState({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', contactNumber: '', sssNumber: '', sssRate: '', miscRate: '', status: 'active' });
            const [isEditing, setIsEditing] = useState(false);

            // --- NAVIGATION HELPER ---
            const switchTab = (tab) => {
                setActiveTab(tab);
                if (window.innerWidth < 1024) {
                    setSidebarOpen(false);
                }
            };

            // --- FIREBASE SYNC WITH EMAIL AUTH ---
            useEffect(() => {
                const initFirebase = async () => {
                    if (window.fb) {
                        const { auth, onAuthStateChanged } = window.fb;
                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setIsReady(true);
                            if(!u) {
                                setUserRole('Staff');
                                setCurrentAdminName('');
                            }
                        });
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, onSnapshot, collection } = window.fb;
                const userPath = (name) => collection(db, 'artifacts', appId, 'users', user.uid, name);

                const unsubEmps = onSnapshot(userPath('employees'), (snap) => {
                    setEmployees(snap.docs.map(d => {
                        const data = d.data();
                        return { 
                            id: d.id, 
                            name: data.name || `${data.firstName || ''} ${data.lastName || ''}`.trim() || d.id,
                            firstName: data.firstName || '',
                            lastName: data.lastName || '',
                            position: data.position || '',
                            rate: data.dailyRate || 0,
                            contactNumber: data.contactNumber || '',
                            sssNumber: data.sssNumber || '',
                            sssRate: data.sssRate || 0,
                            miscRate: data.miscRate || 0,
                            status: data.status || 'active',
                            caBalance: data.caBalance || 0
                        };
                    }).sort((a,b)=>a.name.localeCompare(b.name)));
                });
                const unsubAtt = onSnapshot(userPath('attendance'), (snap) => {
                    setAttendance(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubCA = onSnapshot(userPath('cash_advances'), (snap) => {
                    setCashAdvances(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubIP = onSnapshot(userPath('payroll_entries'), (snap) => {
                    setInteractivePayrolls(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubLogs = onSnapshot(userPath('audit_logs'), (snap) => {
                    setAuditLogs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => { unsubEmps(); unsubAtt(); unsubCA(); unsubIP(); unsubLogs(); };
            }, [user]);

            // SMART PAYSLIP AUTO-FILLER
            useEffect(() => {
                if (icEmpId && icDateStart && icDateEnd) {
                    const key = `${icEmpId}_${icDateStart}_${icDateEnd}`;
                    const saved = interactivePayrolls.find(p => p.recordKey === key);
                    
                    if (saved) {
                        setIcForm(saved.data);
                    } else {
                        // Smart Auto-Calculation based on live database info
                        const emp = employees.find(e => e.id.toString() === icEmpId.toString());
                        if (emp) {
                            const att = attendance.filter(a => a.empId.toString() === icEmpId.toString() && a.date >= icDateStart && a.date <= icDateEnd);
                            const days = att.reduce((sum, r) => sum + (parseFloat(r.dayEquivalent) || 0), 0);
                            const gross = days * (parseFloat(emp.rate) || 0);
                            const sss = parseFloat(emp.sssRate) || 0;
                            const misc = parseFloat(emp.miscRate) || 0;
                            
                            // Smart CA deduction: max allowable safely
                            const availableForCA = gross - sss - misc;
                            const caDed = availableForCA > 0 ? Math.min(parseFloat(emp.caBalance) || 0, availableForCA) : 0;

                            setIcForm({
                                days_worked: days,
                                bonus: 0,
                                sss: sss,
                                misc_deductions: misc,
                                cash_advance: caDed
                            });
                        }
                    }
                }
            }, [icEmpId, icDateStart, icDateEnd, interactivePayrolls, employees, attendance]);

            // --- SMART CALCULATIONS (EXACT MATH FROM SCREENSHOT) ---
            // Formula: GROSS (AMT) - SSS - MISC - CA DEDUCTION (C.A.) = NET (SALARY)
            const payrollSummary = useMemo(() => {
                return employees.map(emp => {
                    const empAtt = attendance.filter(a => a.empId.toString() === emp.id.toString() && a.date.startsWith(selectedMonth));
                    const days = empAtt.reduce((sum, r) => sum + (parseFloat(r.dayEquivalent) || 0), 0);
                    const gross = days * (parseFloat(emp.rate) || 0);
                    
                    const sss = parseFloat(emp.sssRate) || 0;
                    const misc = parseFloat(emp.miscRate) || 0;
                    
                    const caBalance = parseFloat(emp.caBalance) || 0;
                    const availableForCA = gross - sss - misc;
                    
                    // The 'C.A.' column in the table represents the CA deduction taken *this month* to wipe debt
                    let caDed = 0;
                    if (caBalance > 0 && availableForCA > 0) {
                        caDed = Math.min(caBalance, availableForCA);
                    }

                    const net = gross - sss - misc - caDed;
                    
                    return { 
                        ...emp, 
                        days, 
                        gross,     // -> Mapped to 'AMT' in UI
                        caDed,     // -> Mapped to 'C.A.' in UI
                        sss,       // -> Mapped to 'SSS' in UI
                        misc,      // -> Mapped to 'MISC' in UI 
                        net        // -> Mapped to 'SALARY' in UI
                    };
                });
            }, [employees, attendance, selectedMonth]);

            const stats = useMemo(() => {
                const today = new Date().toISOString().slice(0, 10);
                const present = attendance.filter(a => a.date === today).length;
                const totalCA = employees.reduce((sum, e) => sum + (parseFloat(e.caBalance) || 0), 0);
                return { count: employees.length, present, totalCA, alerts: payrollSummary.filter(p => p.net < 0).length };
            }, [employees, attendance, payrollSummary]);

            // --- DASHBOARD SEARCH LOGIC ---
            let searchedEmp = null;
            let searchedDays = 0, searchedGross = 0, searchedCaDed = 0, searchedMisc = 0;
            if (dashSearchEmpId) {
                searchedEmp = employees.find(e => e.id.toString() === dashSearchEmpId);
                if (searchedEmp && dashSearchStart && dashSearchEnd) {
                    const att = attendance.filter(a => a.empId.toString() === searchedEmp.id.toString() && a.date >= dashSearchStart && a.date <= dashSearchEnd);
                    searchedDays = att.reduce((sum, r) => sum + (parseFloat(r.dayEquivalent) || 0), 0);
                    searchedGross = searchedDays * (parseFloat(searchedEmp.rate) || 0);
                    
                    const sss = parseFloat(searchedEmp.sssRate) || 0;
                    const misc = parseFloat(searchedEmp.miscRate) || 0;
                    const availableForCA = searchedGross - sss - misc;
                    searchedCaDed = availableForCA > 0 ? Math.min(parseFloat(searchedEmp.caBalance) || 0, availableForCA) : 0;
                    searchedMisc = sss + misc; 
                }
            }

            // --- CLOUD HANDLERS ---
            const handleLogout = async () => {

            const logAdminAccess = async (adminName) => {

            const handleAddStaff = async (e) => {

                const { db, appId, doc, setDoc, updateDoc } = window.fb;
                const bId = newEmpForm.biometricId.trim();

                        sssNumber: newEmpForm.sssNumber || '',

                    if (isEditing) {

            };

            const handleIssueCA = async () => {
                if (!user || !isAdmin || !newCa.empId || !newCa.amount || !newCa.date) return;
                const { db, appId, addDoc, doc, updateDoc, collection } = window.fb;
                const amt = parseFloat(newCa.amount);
                const emp = employees.find(e => e.id.toString() === newCa.empId.toString());
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'cash_advances'), {
                        empId: newCa.empId, amount: amt, date: newCa.date, reason: newCa.reason
                    });
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'employees', newCa.empId), {
                        caBalance: (parseFloat(emp.caBalance) || 0) + amt
                    });
                    setNewCa({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });
                    alert("Advance issued successfully.");
                } catch (err) { alert(err.message); }
            };

            // SMART DATA PARSER (Handles Duplicates and Auto-Profile Creation)
            const handleProcessLogs = async () => {
                if (!user || !isAdmin || !rawInput.trim()) return;
                const { db, appId, addDoc, doc, setDoc, collection } = window.fb;
                const lines = rawInput.trim().split('\n');
                let attCount = 0;
                let errCount = 0;
                let newStaffCount = 0;
                const processedIds = new Set();
                const processedAttKeys = new Set(); // To prevent double counting in the same batch
                
                try {
                    for (const line of lines) {
                        const rawLine = line.trim();
                        if (!rawLine) continue;
                        
                        // Flexible splitting: Try tab separation first, fallback to spaces
                        let parts = rawLine.split(/\t+/);
                        if (parts.length < 3) {
                            parts = rawLine.split(/\s+/);
                        }
                        parts = parts.map(x => x.trim()).filter(Boolean);
                        
                        if (parts.length < 2 || ['ID', 'NAME', 'DATE', 'EMP'].includes(parts[0].toUpperCase())) {
                            errCount++;
                            continue;
                        }

                        // Look for a date column (YYYY-MM-DD or MM/DD/YYYY)
                        const dateRegex = /\d{1,4}[\/\-]\d{1,2}[\/\-]\d{1,4}/;
                        const dateIndex = parts.findIndex(col => dateRegex.test(col));
                        
                        let cleanId = '';
                        let rawName = '';
                        let isoDate = null;
                        let timeRaw = '';
                        
                        if (dateIndex > 0) {
                            // Date found: Biometric Log format (ID Name ... Date Time)
                            cleanId = String(parts[0]).replace(/[\/\\]/g, '-');
                            rawName = parts.slice(1, dateIndex).join(' ');
                            const dateStr = parts[dateIndex];
                            
                            if (parts.length > dateIndex + 1 && /\d{1,2}:\d{2}/.test(parts[dateIndex + 1])) {
                                timeRaw = parts[dateIndex + 1];
                            }
                            
                            const dParts = dateStr.split(/[\/\-]/);
                            if (dParts[0].length === 4) {
                                isoDate = `${dParts[0]}-${dParts[1].padStart(2,'0')}-${dParts[2].padStart(2,'0')}`;
                            } else {
                                isoDate = `${dParts[2]}-${dParts[0].padStart(2,'0')}-${dParts[1].padStart(2,'0')}`;
                            }
                        } else {
                            // No date found: List of Names/Payroll format. 
                            if (/^\d+$/.test(parts[0])) {
                                cleanId = parts[0];
                                rawName = parts.slice(1, 3).join(' '); 
                            } else {
                                rawName = parts.slice(0, 2).join(' '); 
                                cleanId = rawName.toLowerCase().replace(/[^a-z0-9]/g, '');
                            }
                        }

                        if (!cleanId || !rawName) {
                            errCount++;
                            continue;
                        }

                        // Auto-sync / create new employee if missing
                        if (!employees.some(e => e.id.toString() === cleanId) && !processedIds.has(cleanId)) {
                            processedIds.add(cleanId);
                            const nameParts = rawName.split(' ');
                            
                            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'employees', cleanId), {
                                employeeId: cleanId,
                                firstName: nameParts[0] || '',
                                lastName: nameParts.slice(1).join(' ') || '',
                                name: rawName,
                                position: 'Imported Profile',
                                dailyRate: 0,
                                contactNumber: '',
                                sssNumber: '',
                                sssRate: 0,
                                miscRate: 0,
                                caBalance: 0,
                                status: 'active',
                                createdAt: Date.now()
                            });
                            newStaffCount++;
                        }

                        // SMART DEDUPLICATION: Don't add if employee already clocked in on this specific date
                        if (isoDate) {
                            const attKey = `${cleanId}_${isoDate}`;
                            const isDuplicateDB = attendance.some(a => a.empId.toString() === cleanId && a.date === isoDate);
                            
                            if (!isDuplicateDB && !processedAttKeys.has(attKey)) {
                                processedAttKeys.add(attKey);
                                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'attendance'), {
                                    empId: cleanId, 
                                    empName: rawName, 
                                    date: isoDate, 
                                    firstIn: timeRaw || '00:00', 
                                    dayEquivalent: 1, 
                                    remarks: 'Normalized'
                                });
                                attCount++;
                            }
                        }
                    }
                    setRawInput('');
                    alert(`Import Complete!\n\nAuto-synced Profiles: ${newStaffCount}\nNew Attendance Days Added: ${attCount}\n${errCount > 0 ? "(Skipped " + errCount + " headers/invalid lines)" : ""}`);
                } catch (err) {
                    alert("Error parsing logs: " + err.message);
                }
            };

            const handleSavePayslip = async () => {
                if (!user || !isAdmin || !icEmpId) return;

                a.download = `stonegrill_backup_${new Date().toISOString().slice(0,10)}.json`;
                a.click();

            // NEW RESTORE BACKUP LOGIC
            const handleImportBackup = (event) => {
                const file = event.target.files[0];
                if (!file || !user || !isAdmin) return;

                setIsRestoring(true);
                const reader = new FileReader();
                
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        const { db, appId, doc, setDoc } = window.fb;

                        let totalRestored = 0;

                        // Helper function to safely inject items into collections based on their original ID
                        const restoreCollection = async (collectionName, items) => {
                            if (!items || !Array.isArray(items)) return;
                            for (const item of items) {
                                const { id, ...rest } = item;
                                if (id) {
                                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, collectionName, id), rest);
                                    totalRestored++;
                                }
                            }
                        };

                        // Process all arrays found in the JSON
                        await restoreCollection('employees', data.employees);
                        await restoreCollection('attendance', data.attendance);
                        await restoreCollection('cash_advances', data.cashAdvances);
                        await restoreCollection('payroll_entries', data.interactivePayrolls);

                        setIsRestoring(false);
                        alert(`Restore Complete!\nSuccessfully imported and recovered ${totalRestored} database records.`);
                    } catch (err) {
                        setIsRestoring(false);
                        alert("Error parsing or restoring backup: " + err.message);
                    }
                };
                
                reader.readAsText(file);
                event.target.value = ''; // reset the input so you can upload the same file again if needed
            };

            const handleEditClick = () => {
                if(!isAdmin) return;
                setNewEmpForm({
                    biometricId: viewProfile.id,
                    firstName: viewProfile.firstName || '',
                    lastName: viewProfile.lastName || '',
                    position: viewProfile.position || '',
                    dailyRate: viewProfile.rate || '',
                    contactNumber: viewProfile.contactNumber || '',
                    sssNumber: viewProfile.sssNumber || '',
                    sssRate: viewProfile.sssRate || '',
                    miscRate: viewProfile.miscRate || '',
                    status: viewProfile.status || 'active'
                });
                setIsEditing(true);
                setViewProfile(null);
                setShowAddEmp(true);
            };

            if (!isReady) return <div className="h-screen bg-blue-900 flex flex-col items-center justify-center text-white"><div className="w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin mb-4" />Checking Cloud Identity...</div>;
            if (!user) return <LoginScreen />;

            // --- SMART CURRENCY FORMATTER (Removes unnecessary .00 decimals automatically) ---
            const formatMoney = (v) => {
                const num = Number(v || 0);
                return num % 1 === 0 
                    ? num.toLocaleString('en-US') 
                    : num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            // Cash Advance List Filtering
            const displayCAs = newCa.empId 
                ? cashAdvances.filter(ca => ca.empId.toString() === newCa.empId.toString()) 
                : cashAdvances;

            return (
                <div className="flex h-screen bg-gray-50 text-gray-900 overflow-hidden relative">
                    
                    {showAdminPin && (
                        <AdminPinModal 
                            onClose={() => setShowAdminPin(false)} 
                            onUnlock={(name) => {
                                setUserRole(name);
                                setCurrentAdminName(name);
                                setShowAdminPin(false);
                                logAdminAccess(name);
                            }} 
                        />
                    )}

                    {/* RESTORE LOADING OVERLAY */}
                    {isRestoring && (
                        <div className="fixed inset-0 bg-blue-950/80 flex items-center justify-center p-4 z-50 font-sans flex-col text-white">
                            <div className="w-16 h-16 border-4 border-white/20 border-t-white rounded-full animate-spin mb-6" />
                            <h2 className="text-2xl font-black uppercase tracking-widest animate-pulse">Restoring Database...</h2>
                            <p className="text-sm font-bold text-blue-300 mt-2">Injecting records safely. Please do not close the window.</p>
                        </div>
                    )}

                    {/* SIDEBAR OVERLAY FOR MOBILE */}
                    {isSidebarOpen && window.innerWidth < 1024 && (
                        <div className="fixed inset-0 bg-black/50 z-30" onClick={() => setSidebarOpen(false)} />
                    )}

                    {/* SIDEBAR */}
                    <aside className={`fixed lg:static inset-y-0 left-0 z-40 bg-blue-900 text-white transition-all duration-300 flex flex-col h-full ${isSidebarOpen ? 'w-64 translate-x-0' : 'w-20 -translate-x-full lg:translate-x-0'} flex-shrink-0 shadow-2xl`}>

                                    <LayoutDashboard />

                                {isSidebarOpen ? 'STONE GRILL' : ''}

                            {isSidebarOpen && window.innerWidth < 1024 && (

                        </div>

                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden w-full">

                                {isPrivileged && <span className="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-200">Access Level: {currentAdminName}</span>}
                                <h1 className="text-lg font-black text-slate-800 uppercase tracking-widest">{activeTab.replace('-', ' ')}</h1>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 lg:p-8 bg-slate-50 custom-scrollbar">
                            <div className="max-w-7xl mx-auto h-full fade-in space-y-6">
                                
                                {activeTab === 'dashboard' && (

                                        <div className={`grid grid-cols-1 ${isPrivileged ? 'md:grid-cols-4' : 'md:grid-cols-2'} gap-6`}>

                                            {isPrivileged && (

                                                    <StatCard title="Payroll Alerts" value={stats.alerts} icon={<AlertCircle />} color="bg-rose-50 text-rose-700" />

                                        </div>

                                        {/* PRIVILEGED ONLY: DASHBOARD QUICK LOOKUP */}
                                        {isPrivileged && (

                                                            <td className="p-4 border text-center font-black font-mono">{row.days > 0 ? row.days : ''}</td>
                                                            <td className="p-4 border text-right text-red-600 font-black font-mono">{row.caDed > 0 ? formatMoney(row.caDed) : ''}</td>
                                                            <td className="p-4 border text-right font-black font-mono bg-slate-50/50">{row.gross > 0 ? formatMoney(row.gross) : ''}</td>
                                                            <td className="p-4 border text-right text-red-600 font-black font-mono">{row.misc > 0 ? formatMoney(row.misc) : ''}</td>
                                                            <td className="p-4 border text-right text-red-600 font-black font-mono">{row.sss > 0 ? formatMoney(row.sss) : ''}</td>
                                                            <td className={`p-4 border text-right font-black text-sm font-mono ${row.net < 0 ? 'text-white bg-rose-600' : 'text-emerald-700 bg-emerald-50'}`}>{row.net > 0 ? formatMoney(row.net) : '--'}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                                <tfoot className="bg-slate-100 font-black text-xs">
                                                    <tr>
                                                        <td colSpan="6" className="p-4 text-right border uppercase tracking-widest text-slate-500">Total Salary</td>
                                                        <td className="p-4 text-right border text-emerald-800 font-mono text-sm">
                                                            {formatMoney(payrollSummary.reduce((sum, row) => sum + row.net, 0))}
                                                        </td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'summary' && (
                                    <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden flex flex-col min-h-[500px]">
                                        <div className="p-6 border-b bg-slate-900 text-white flex justify-between items-center">
                                            <h2 className="font-black uppercase tracking-widest flex items-center gap-2"><CalendarDays className="w-5 h-5"/> Yearly Overview</h2>
                                            <button onClick={handleExportBackup} className="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-xs font-black uppercase flex items-center gap-2 transition-all"><Download className="w-4 h-4"/> Backup</button>
                                        </div>
                                        <div className="overflow-auto flex-1 custom-scrollbar">
                                            <table className="w-full text-right text-xs border-collapse min-w-max">
                                                <thead className="bg-slate-800 text-white sticky top-0 z-20">
                                                    <tr>
                                                        <th className="p-4 text-left border border-slate-700 sticky left-0 bg-slate-800 font-black uppercase text-[10px] z-30">Staff Name</th>
                                                        {['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'].map(m => <th key={m} className="p-4 border border-slate-700 font-black">{m}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {employees.map(emp => (
                                                        <tr key={emp.id} className="border-b border-gray-100 hover:bg-blue-50/50">
                                                            <td className="p-4 text-left border-r border-gray-100 sticky left-0 bg-white font-black uppercase text-slate-700 z-10">{emp.name}</td>
                                                            {Array.from({length: 12}).map((_, i) => {
                                                                const isCurrent = selectedMonth.endsWith((i+1).toString().padStart(2,'0'));
                                                                return (
                                                                    <td key={i} className={`p-4 font-mono font-bold border-r border-gray-50 ${isCurrent ? 'text-blue-600 bg-blue-50/30' : 'text-slate-300 italic'}`}>
                                                                        {isCurrent ? `₱${formatMoney(payrollSummary.find(p=>p.id===emp.id)?.net)}` : '--'}
                                                                    </td>
                                                                );
                                                            })}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'reports' && (
                                    <div className="flex flex-col h-full space-y-6">
                                        <div className="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 flex flex-wrap gap-6 items-center">
                                            <div className="flex items-center gap-3">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">From</label>
                                                <input type="date" value={reportDates.start} onChange={e => setReportDates({...reportDates, start: e.target.value})} className="p-2 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">To</label>
                                                <input type="date" value={reportDates.end} onChange={e => setReportDates({...reportDates, end: e.target.value})} className="p-2 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                            <button className="bg-blue-900 text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest text-xs flex items-center gap-2 shadow-lg hover:bg-black transition-all ml-auto"><Search className="w-4 h-4"/> Filter Ledger</button>
                                        </div>
                                        <div className="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden flex-1 flex flex-col">
                                            <div className="p-4 bg-gray-50 border-b flex justify-between items-center"><h3 className="font-black text-blue-900 uppercase text-xs tracking-widest">Attendance Logs</h3><button className="text-blue-600 flex items-center text-xs font-black uppercase tracking-widest hover:underline"><Download className="w-4 h-4 mr-2"/> Export CSV</button></div>
                                            <div className="overflow-y-auto flex-1 custom-scrollbar">
                                                <table className="w-full text-xs text-left">
                                                    <thead className="bg-white text-[10px] text-slate-400 uppercase border-b sticky top-0">
                                                        <tr><th className="p-4">Date</th><th className="p-4">Member</th><th className="p-4">Clock-In</th><th className="p-4 text-center">Day Equiv.</th><th className="p-4">Status</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-gray-50">
                                                        {attendance.filter(a => a.date >= reportDates.start && a.date <= reportDates.end).map((a, i) => (
                                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 font-mono text-slate-500">{a.date}</td>
                                                                <td className="p-4 font-black uppercase text-slate-700">{employees.find(e => e.id.toString() === a.empId.toString())?.name || a.empName || a.empId}</td>
                                                                <td className="p-4 text-blue-600 font-black">{a.firstIn}</td>
                                                                <td className="p-4 text-center font-bold text-slate-900">{a.dayEquivalent}</td>
                                                                <td className="p-4"><span className={`px-2 py-1 rounded-full text-[9px] font-black uppercase border ${a.remarks === 'Normalized' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-rose-50 text-rose-700 border-rose-200'}`}>{a.remarks}</span></td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'settings' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        
                                        <div className="space-y-6">
                                            {/* Backup Section */}
                                            <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                                                <h3 className="font-black text-slate-800 uppercase tracking-widest mb-2">Cloud Backup</h3>
                                                <p className="text-sm text-slate-400 mb-8 font-medium">Download a complete snapshot of your restaurant database for manual archival.</p>
                                                <button onClick={handleExportBackup} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-black transition-all flex items-center justify-center gap-3"><Download /> Download JSON</button>
                                            </div>

                                            {/* Restore Section */}
                                            <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 animate-slide-up">
                                                <h3 className="font-black text-slate-800 uppercase tracking-widest mb-2">Cloud Restore</h3>
                                                <p className="text-sm text-slate-400 mb-8 font-medium">Upload a previously downloaded JSON backup file to recover your data.</p>
                                                <label className={`w-full ${isAdmin ? 'bg-emerald-600 hover:bg-emerald-700 cursor-pointer' : 'bg-slate-300 cursor-not-allowed'} text-white py-5 rounded-2xl font-black uppercase shadow-xl transition-all flex items-center justify-center gap-3`}>
                                                    <Upload /> {isAdmin ? 'Restore JSON Backup' : 'Admin Required'}
                                                    <input type="file" accept=".json" className="hidden" disabled={!isAdmin} onChange={handleImportBackup} />
                                                </label>
                                            </div>
                                        </div>

                                        {/* Security Audit Logs */}
                                        <div className="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden flex flex-col h-full min-h-[350px] animate-slide-up">
                                            <div className="p-6 bg-slate-900 text-white border-b flex justify-between items-center">
                                                <h3 className="font-black uppercase tracking-widest text-xs">Security Audit Logs</h3>
                                                <span className="text-[10px] font-bold bg-white/20 px-3 py-1 rounded-full">{auditLogs.length} Records</span>
                                            </div>
                                            <div className="overflow-y-auto flex-1 custom-scrollbar p-6">
                                                <div className="space-y-4">
                                                    {auditLogs.length === 0 ? (
                                                        <p className="text-center text-slate-400 italic mt-10 text-sm">No admin logins recorded yet.</p>
                                                    ) : (
                                                        auditLogs.sort((a,b) => b.timestamp - a.timestamp).map(log => (
                                                            <div key={log.id} className="flex justify-between items-center text-sm border-b border-gray-100 pb-3">
                                                                <div>
                                                                    <p className="font-black text-slate-800 uppercase tracking-tight">{log.adminName}</p>
                                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{log.action}</p>
                                                                </div>
                                                                <div className="text-right text-[10px] text-slate-500 font-mono font-bold">
                                                                    {new Date(log.timestamp).toLocaleDateString()}<br/>
                                                                    {new Date(log.timestamp).toLocaleTimeString()}
                                                                </div>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* ADD MODAL */}
                    {showAddEmp && isAdmin && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleAddStaff} className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col animate-in zoom-in-95 duration-200">
                                <div className="p-6 border-b bg-gray-50 flex justify-between items-center"><h3 className="font-black uppercase tracking-widest text-blue-900 text-sm">{isEditing ? 'Edit Profile' : 'Onboard New Member'}</h3><button type="button" onClick={() => { setShowAddEmp(false); setIsEditing(false); setNewEmpForm({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', contactNumber: '', sssNumber: '', sssRate: '', miscRate: '', status: 'active' }); }} className="text-gray-400 hover:text-slate-900"><X /></button></div>
                                <div className="p-8 space-y-5">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Biometric ID (e.g. 7)</label>
                                        {!isEditing && <p className="text-[10px] text-red-500 font-bold mb-2">Must EXACTLY match the ID from the machine.</p>}
                                        <input type="text" required disabled={isEditing} placeholder="Machine ID" value={newEmpForm.biometricId || ''} onChange={e => setNewEmpForm({...newEmpForm, biometricId: e.target.value})} className={`w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold ${isEditing ? 'text-slate-400 cursor-not-allowed opacity-70' : 'text-slate-800'}`}/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">First Name</label><input type="text" placeholder="John" required value={newEmpForm.firstName} onChange={e => setNewEmpForm({...newEmpForm, firstName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Last Name</label><input type="text" placeholder="Doe" required value={newEmpForm.lastName} onChange={e => setNewEmpForm({...newEmpForm, lastName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Role</label><input type="text" placeholder="Staff" value={newEmpForm.position} onChange={e => setNewEmpForm({...newEmpForm, position: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 font-bold focus:ring-4 focus:ring-blue-500/10 outline-none"/></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Daily (₱)</label><input type="number" placeholder="500" required value={newEmpForm.dailyRate} onChange={e => setNewEmpForm({...newEmpForm, dailyRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 font-black focus:ring-4 focus:ring-blue-500/10 outline-none"/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Contact Number</label><input type="text" placeholder="+639123456789" value={newEmpForm.contactNumber} onChange={e => setNewEmpForm({...newEmpForm, contactNumber: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Status</label><select value={newEmpForm.status} onChange={e => setNewEmpForm({...newEmpForm, status: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 font-bold focus:ring-4 focus:ring-blue-500/10 outline-none text-slate-800"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">SSS Deduction (₱)</label><input type="number" placeholder="135.00" value={newEmpForm.sssRate} onChange={e => setNewEmpForm({...newEmpForm, sssRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Misc Deduction (₱)</label><input type="number" placeholder="0.00" value={newEmpForm.miscRate} onChange={e => setNewEmpForm({...newEmpForm, miscRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all uppercase tracking-widest transform active:scale-[0.98] mt-2">{isEditing ? 'Update Profile' : 'Save to Cloud Ledger'}</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* LEDGER PROFILE MODAL (Admin/User View) */}
                    {viewProfile && isPrivileged && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                                <div className="bg-blue-900 text-white p-6 flex justify-between items-center shrink-0"><h2 className="text-xl font-black uppercase tracking-widest flex items-center gap-3"><Users className="w-6 h-6"/> Staff Cloud Ledger</h2><button onClick={() => setViewProfile(null)} className="p-2 hover:bg-white/10 rounded-xl transition-colors"><X/></button></div>
                                <div className="overflow-y-auto p-8 flex-1 space-y-8 custom-scrollbar">
                                    <div className="flex justify-between border-b border-slate-100 pb-6 items-start">
                                        <div>
                                            <h3 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">{viewProfile.name}</h3>
                                            <p className="text-xs text-slate-400 uppercase font-black tracking-widest mt-3">{viewProfile.position || 'Restaurant Staff'} (ID: {viewProfile.id})</p>
                                            <div className="flex gap-2 mt-3 flex-wrap">
                                                {viewProfile.contactNumber && <span className="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-[10px] font-black tracking-widest uppercase">📞 {viewProfile.contactNumber}</span>}
                                                {viewProfile.sssRate > 0 && <span className="px-3 py-1 bg-blue-50 text-blue-700 rounded-lg text-[10px] font-black tracking-widest uppercase">SSS: ₱{formatMoney(viewProfile.sssRate)}</span>}
                                                {viewProfile.miscRate > 0 && <span className="px-3 py-1 bg-amber-50 text-amber-700 rounded-lg text-[10px] font-black tracking-widest uppercase">MISC: ₱{formatMoney(viewProfile.miscRate)}</span>}
                                            </div>
                                            {isAdmin && <button onClick={handleEditClick} className="mt-4 bg-slate-100 hover:bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-2"><Edit className="w-3.5 h-3.5"/> Edit Profile</button>}
                                        </div>
                                        <div className="text-right shrink-0">
                                            <span className={`px-4 py-1.5 text-[10px] font-black rounded-full uppercase border shadow-sm ${viewProfile.status === 'inactive' ? 'bg-slate-100 text-slate-500 border-slate-200' : 'bg-emerald-100 text-emerald-800 border-emerald-200'}`}>{viewProfile.status || 'ACTIVE'}</span>
                                            <p className="mt-4 font-black text-blue-600 font-mono text-xl tracking-tighter uppercase">₱{formatMoney(viewProfile.rate)}/DAY</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6 text-center">
                                        <div className="bg-rose-50 p-6 rounded-3xl border border-rose-100 shadow-sm"><p className="text-[10px] font-black text-rose-800 opacity-50 uppercase tracking-widest mb-2">Total C.A. Due</p><p className="text-4xl font-black text-rose-600 font-mono tracking-tighter">₱{formatMoney(viewProfile.caBalance)}</p></div>
                                        <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100 shadow-sm"><p className="text-[10px] font-black text-blue-800 opacity-50 uppercase tracking-widest mb-2">Attendance Count</p><p className="text-4xl font-black text-blue-600 font-mono tracking-tighter">{attendance.filter(a => a.empId.toString() === viewProfile.id.toString()).length}</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SUBCOMPONENTS ---
        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-6 py-4 transition-all duration-300 ${active ? 'bg-blue-800 text-white border-r-8 border-blue-400' : 'text-blue-200/50 hover:bg-blue-800/50 hover:text-white'}`}>
                    <span className={`shrink-0 transition-transform duration-300 ${active ? 'scale-125' : ''}`}>{icon}</span>
                    {open && <span className="ml-4 text-[11px] font-black uppercase tracking-widest whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-3xl border border-gray-100 flex items-center justify-between shadow-sm hover:shadow-xl transition-all group">
                    <div><p className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">{title}</p><p className="text-3xl font-black text-slate-800 tracking-tighter">{value}</p></div>
                    <div className={`p-5 rounded-2xl transition-all group-hover:rotate-12 group-hover:scale-110 shadow-sm ${color}`}>{icon}</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
