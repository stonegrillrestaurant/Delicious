<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill Payroll</title>
    <link rel="icon" type="image/png" href="/sys/icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        window.fb = { db: getFirestore(app), auth: getAuth(app), appId: "stone-grill-v1", signInWithEmailAndPassword, signOut, onAuthStateChanged, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, updateDoc };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print { body * { visibility: hidden; } #print-section, #print-section * { visibility: visible; } #interactive-print-section, #interactive-print-section * { visibility: visible; } .print-hidden { display: none !important; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const normalizeId = (id) => id ? String(id).trim().toLowerCase() : '';
        const formatMoney = (v) => { const n = Number(v||0); return isNaN(n)? "0" : Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 }); };

        // Simple SVG Icons
        const I = ({ d }) => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
        const icnDash = "M3 3h7v9H3z M14 3h7v5h-7z M14 12h7v9h-7z M3 16h7v5H3z";
        const icnUsers = "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z";
        const icnClock = "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 6v6l4 2";
        const icnMoney = "M2 6h20v12H2z M12 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4z M6 12h.01 M18 12h.01";
        const icnCalc = "M4 2h16v20H4z M8 6h8 M16 14v4 M8 10h.01 M12 10h.01 M16 10h.01 M8 14h.01 M12 14h.01 M8 18h.01 M12 18h.01";
        const icnDoc = "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8";
        const icnCal = "M3 4h18v18H3z M16 2v4 M8 2v4 M3 10h18";
        const icnSet = "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z";
        const icnOut = "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9";
        const icnX = "M18 6L6 18 M6 6l12 12";

        function Login() {
            const [loading, setLoading] = useState(false);
            const login = async (e) => {
                e.preventDefault(); setLoading(true);
                try { await window.fb.signInWithEmailAndPassword(window.fb.auth, e.target.email.value, e.target.pass.value); } 
                catch(e) { alert("Invalid login."); setLoading(false); }
            };
            return (
                <div className="h-screen flex items-center justify-center bg-blue-950 p-4">
                    <form onSubmit={login} className="bg-white p-10 rounded-3xl w-full max-w-sm text-center animate-slide-up shadow-2xl">
                        <h2 className="text-2xl font-black mb-6 uppercase tracking-widest text-slate-800">Stone Grill</h2>
                        <input name="email" type="email" placeholder="Admin Email" required className="w-full border p-4 rounded-xl mb-4 bg-slate-50 font-bold outline-none"/>
                        <input name="pass" type="password" placeholder="Password" required className="w-full border p-4 rounded-xl mb-6 bg-slate-50 font-bold outline-none"/>
                        <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg">Login</button>
                    </form>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('dashboard');
            const [isNavOpen, setNavOpen] = useState(window.innerWidth > 1024);
            
            const [employees, setEmployees] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState([]);
            
            const [selectedMonth, setSelectedMonth] = useState(() => new Date().toISOString().slice(0, 7));
            const [viewProfile, setViewProfile] = useState(null);
            const [showAddStaff, setShowAddStaff] = useState(false);
            
            // Forms
            const [rawLogs, setRawLogs] = useState('');
            const [caForm, setCaForm] = useState({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10), type: 'advance' });
            const [empForm, setEmpForm] = useState({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', sssRate: '', miscRate: '' });
            const [psForm, setPsForm] = useState({ empId: '', start: '', end: '', days: 0, bonus: 0, sss: 0, misc: 0, ca: 0 });

            useEffect(() => { window.fb.onAuthStateChanged(window.fb.auth, u => setUser(u)); }, []);

            useEffect(() => {
                if (!user) return;
                const { db, appId, onSnapshot, collection } = window.fb;
                const p = (n) => collection(db, 'artifacts', appId, 'users', user.uid, n);
                
                onSnapshot(p('employees'), s => setEmployees(s.docs.map(d => ({ id: d.id, ...d.data(), name: `${d.data().firstName||''} ${d.data().lastName||''}`.trim() || d.id }))));
                onSnapshot(p('attendance'), s => setAttendance(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                onSnapshot(p('cash_advances'), s => setCashAdvances(s.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [user]);

            const summary = useMemo(() => {
                return employees.map(emp => {
                    const att = attendance.filter(a => normalizeId(a.empId) === normalizeId(emp.id) && (a.date || '').startsWith(selectedMonth));
                    let days = 0; new Set(att.map(a => a.date)).forEach(d => days += Math.min(Math.max(...att.filter(a=>a.date===d).map(r=>parseFloat(r.dayEquivalent)||0)), 1));
                    const monthCA = cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(emp.id) && (ca.date || '').startsWith(selectedMonth)).reduce((s, c) => s + (parseFloat(c.amount)||0), 0);
                    const gross = days * (parseFloat(emp.dailyRate || emp.rate) || 0);
                    const net = gross - monthCA - (parseFloat(emp.sssRate)||0) - (parseFloat(emp.miscRate)||0);
                    return { ...emp, days, gross, net, monthCA, caBal: parseFloat(emp.caBalance)||0 };
                });
            }, [employees, attendance, cashAdvances, selectedMonth]);

            const monthOpts = useMemo(() => Array.from({length: 12}, (_, i) => {
                const d = new Date(); d.setMonth(d.getMonth() - i);
                return { v: d.toISOString().slice(0,7), l: d.toLocaleString('default', {month:'long', year:'numeric'}) };
            }), []);

            // Handlers
            const saveStaff = async (e) => {
                e.preventDefault();
                const id = normalizeId(empForm.biometricId);
                await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', id), { ...empForm, dailyRate: parseFloat(empForm.dailyRate), sssRate: parseFloat(empForm.sssRate)||0, miscRate: parseFloat(empForm.miscRate)||0 }, {merge:true});
                setShowAddStaff(false); setEmpForm({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', sssRate: '', miscRate: '' });
            };

            const delStaff = async (id) => {
                if(confirm("Permanently delete?")) { await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', normalizeId(id))); setViewProfile(null); }
            };

            const processLogs = async () => {
                if(!rawLogs.trim()) return;
                const lines = rawLogs.trim().split('\n'); let count = 0; const map = {};
                for (const line of lines) {
                    const cols = line.split(/\t+| {2,}/).filter(Boolean); if(cols.length < 3) continue;
                    const dM = line.match(/(\d{2}\/\d{2}\/\d{4})/); const tM = line.match(/(\d{2}:\d{2}:\d{2})/);
                    if(!dM || !tM) continue;
                    const iso = `${dM[1].split('/')[2]}-${dM[1].split('/')[0].padStart(2,'0')}-${dM[1].split('/')[1].padStart(2,'0')}`;
                    const key = `${normalizeId(cols[0])}_${iso}`; 
                    if(!map[key]) map[key] = { id: normalizeId(cols[0]), name: cols[1], date: iso, punches: [] };
                    map[key].punches.push(tM[1].substring(0,5));
                }
                for (const k in map) {
                    const s = map[k].punches.sort();
                    await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'attendance', k), { empId: map[k].id, empName: map[k].name, date: map[k].date, firstIn: s[0], lastOut: s.length>1?s[s.length-1]:'00:00', dayEquivalent: s.length>1?1:0.5 }, {merge:true});
                    count++;
                }
                setRawLogs(''); alert(`Saved ${count} attendance records.`);
            };

            const issueCA = async () => {
                if(!caForm.empId) return;
                const amt = caForm.type === 'payment' ? -Math.abs(parseFloat(caForm.amount)||0) : Math.abs(parseFloat(caForm.amount)||0);
                const emp = employees.find(e => normalizeId(e.id) === normalizeId(caForm.empId));
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'cash_advances'), { empId: caForm.empId, amount: amt, reason: caForm.reason, date: caForm.date, type: caForm.type });
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', normalizeId(caForm.empId)), { caBalance: (parseFloat(emp.caBalance)||0) + amt });
                setCaForm({...caForm, amount: '', reason: ''});
            };

            const delCA = async (id, empId, amt) => {
                if(confirm("Reverse transaction?")) {
                    await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'cash_advances', id));
                    const emp = employees.find(e => normalizeId(e.id) === normalizeId(empId));
                    if(emp) await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', normalizeId(empId)), { caBalance: (parseFloat(emp.caBalance)||0) - amt });
                }
            };

            const NavBtn = ({ id, lbl, icn }) => (
                <button onClick={() => setTab(id)} className={`w-full flex items-center px-6 py-4 transition-all ${tab===id ? 'bg-blue-700 border-l-4 border-white' : 'hover:bg-blue-800 border-l-4 border-transparent'}`}>
                    <I d={icn}/>{isNavOpen && <span className="ml-4 text-xs font-black uppercase tracking-widest">{lbl}</span>}
                </button>
            );

            if (!user) return <Login />;

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className={`bg-blue-900 text-white flex flex-col transition-all print-hidden ${isNavOpen ? 'w-64' : 'w-20'}`}>
                        <div className="h-16 flex items-center justify-between px-6 border-b border-blue-800">
                            <span className="font-black text-xl tracking-widest">SG</span>
                            {isNavOpen && <button onClick={()=>setNavOpen(false)} className="text-blue-300 hover:text-white"><I d={icnX}/></button>}
                        </div>
                        <div className="flex-1 py-4 space-y-1 overflow-y-auto">
                            <NavBtn id="dashboard" lbl="Dashboard" icn={icnDash}/>
                            <NavBtn id="master" lbl="Masterlist" icn={icnUsers}/>
                            <NavBtn id="att" lbl="Attendance" icn={icnClock}/>
                            <NavBtn id="ca" lbl="Cash Advance" icn={icnMoney}/>
                            <NavBtn id="payslip" lbl="Payslips" icn={icnDoc}/>
                            <NavBtn id="payroll" lbl="Payroll List" icn={icnCalc}/>
                            <NavBtn id="summary" lbl="Yearly Sum" icn={icnCal}/>
                            <NavBtn id="settings" lbl="Settings" icn={icnSet}/>
                        </div>
                        <button onClick={() => window.fb.signOut(window.fb.auth)} className="p-6 flex items-center text-rose-300 hover:text-rose-100 border-t border-blue-800"><I d={icnOut}/>{isNavOpen && <span className="ml-4 font-bold text-xs uppercase">Logout</span>}</button>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50">
                        <header className="h-16 bg-white border-b px-6 flex items-center gap-4 shrink-0 print-hidden">
                            {!isNavOpen && <button onClick={()=>setNavOpen(true)} className="text-slate-500"><I d="M4 6h16M4 12h16M4 18h16"/></button>}
                            <h1 className="font-black uppercase tracking-widest text-slate-800">{tab}</h1>
                        </header>
                        
                        <div className="flex-1 p-6 lg:p-10 overflow-y-auto custom-scrollbar" id="print-section">
                            <div className="max-w-7xl mx-auto">
                                
                                {tab === 'dashboard' && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-slide-up">
                                        <div className="bg-white p-6 rounded-3xl shadow-sm border text-center"><div className="bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4"><I d={icnUsers}/></div><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Active Staff</p><p className="text-3xl font-black">{employees.length}</p></div>
                                        <div className="bg-white p-6 rounded-3xl shadow-sm border text-center"><div className="bg-emerald-50 text-emerald-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4"><I d={icnClock}/></div><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Clocked In Today</p><p className="text-3xl font-black">{new Set(attendance.filter(a=>a.date===new Date().toISOString().slice(0,10)).map(a=>a.empId)).size}</p></div>
                                        <div className="bg-white p-6 rounded-3xl shadow-sm border text-center"><div className="bg-rose-50 text-rose-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4"><I d={icnMoney}/></div><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Total Outstanding CA</p><p className="text-3xl font-black">₱{formatMoney(employees.reduce((s,e)=>s+(parseFloat(e.caBalance)||0),0))}</p></div>
                                    </div>
                                )}

                                {tab === 'master' && (
                                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden animate-slide-up border">
                                        <div className="p-6 bg-slate-800 text-white flex justify-between items-center">
                                            <h2 className="font-black uppercase tracking-widest text-xs">Employee Directory</h2>
                                            <div className="flex gap-3">
                                                <select className="bg-white/10 text-white border-none rounded-lg px-3 py-1 text-xs font-bold outline-none" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>{monthOpts.map(o=><option key={o.v} value={o.v} className="text-black">{o.l}</option>)}</select>
                                                <button onClick={()=>setShowAddStaff(true)} className="bg-blue-500 text-white px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">Add Staff</button>
                                            </div>
                                        </div>
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-50 uppercase text-[10px] font-black text-slate-400 border-b"><tr><th className="p-4">Name</th><th className="p-4 text-center">Days</th><th className="p-4 text-right">CA (Mo)</th><th className="p-4 text-right">Lifetime Debt</th><th className="p-4 text-right">Net Salary</th></tr></thead>
                                            <tbody className="divide-y">
                                                {summary.map(row => (
                                                    <tr key={row.id} className="hover:bg-blue-50 cursor-pointer transition-colors" onClick={() => setViewProfile(row)}>
                                                        <td className="p-4 font-black uppercase text-slate-800">{row.name}</td>
                                                        <td className="p-4 text-center font-bold text-slate-500">{row.days}</td>
                                                        <td className="p-4 text-right font-black text-amber-500">{row.monthCA>0 ? `₱${formatMoney(row.monthCA)}` : '-'}</td>
                                                        <td className="p-4 text-right font-black text-rose-600">{row.caBal!==0 ? `₱${formatMoney(row.caBal)}` : '-'}</td>
                                                        <td className={`p-4 text-right font-black ${row.net < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{row.net<0?'-':''}₱{formatMoney(row.net)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {tab === 'att' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 h-full animate-slide-up">
                                        <div className="bg-white p-8 rounded-3xl shadow-xl flex flex-col border">
                                            <h3 className="font-black text-blue-900 uppercase mb-2 tracking-widest">Biometric Import</h3>
                                            <p className="text-xs text-slate-400 mb-6 font-bold">Paste raw tab data from machine.</p>
                                            <textarea className="w-full flex-1 p-4 text-xs font-mono border rounded-2xl mb-4 outline-none bg-slate-50 custom-scrollbar" placeholder="ID	Name	Time..." value={rawLogs} onChange={e=>setRawLogs(e.target.value)} />
                                            <button onClick={processLogs} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg hover:bg-blue-700 active:scale-95 transition-all">Sync Database</button>
                                        </div>
                                        <div className="bg-white rounded-3xl border shadow-xl flex flex-col overflow-hidden">
                                            <div className="p-4 bg-slate-50 border-b font-black text-xs uppercase tracking-widest text-slate-400">Live Logs</div>
                                            <div className="overflow-y-auto flex-1 custom-scrollbar max-h-[500px]">
                                                <table className="w-full text-xs text-left">
                                                    <tbody className="divide-y">
                                                        {attendance.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0, 100).map((a,i)=>(
                                                            <tr key={i} className="hover:bg-slate-50"><td className="p-4 font-mono text-slate-400">{a.date}</td><td className="p-4 font-black uppercase text-slate-700">{a.empName || a.empId}</td><td className="p-4 text-right font-black text-blue-600">{a.firstIn} - {a.lastOut}</td></tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {tab === 'ca' && (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-slide-up">
                                        <div className="bg-white p-8 rounded-3xl shadow-xl space-y-4 border h-max">
                                            <h2 className="font-black text-blue-900 uppercase tracking-widest mb-6">Issue C.A.</h2>
                                            <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
                                                <button onClick={()=>setCaForm({...caForm, type:'advance'})} className={`flex-1 py-3 text-[10px] font-black rounded-lg uppercase ${caForm.type==='advance'?'bg-white shadow text-blue-900':'text-slate-400'}`}>Advance</button>
                                                <button onClick={()=>setCaForm({...caForm, type:'payment'})} className={`flex-1 py-3 text-[10px] font-black rounded-lg uppercase ${caForm.type==='payment'?'bg-white shadow text-emerald-600':'text-slate-400'}`}>Payment</button>
                                            </div>
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Staff</label><select className="w-full p-3 border rounded-xl font-black bg-slate-50 outline-none" value={caForm.empId} onChange={e=>setCaForm({...caForm, empId: e.target.value})}><option value="">Select Member</option>{employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>
                                            {caForm.empId && <div className="bg-rose-50 p-4 rounded-xl text-center"><p className="text-[10px] font-black text-rose-800 opacity-50 uppercase">Current Debt</p><p className="text-2xl font-black text-rose-600 font-mono">₱{formatMoney(employees.find(e=>normalizeId(e.id)===normalizeId(caForm.empId))?.caBalance)}</p></div>}
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Date</label><input type="date" className="w-full p-3 border rounded-xl font-bold bg-slate-50 outline-none" value={caForm.date} onChange={e=>setCaForm({...caForm, date: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Amount</label><input type="number" placeholder="0.00" className="w-full p-3 border rounded-xl font-black bg-slate-50 outline-none" value={caForm.amount} onChange={e=>setCaForm({...caForm, amount: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Note</label><input type="text" placeholder="Reason..." className="w-full p-3 border rounded-xl font-bold bg-slate-50 outline-none" value={caForm.reason} onChange={e=>setCaForm({...caForm, reason: e.target.value})} /></div>

                                                <thead className="bg-slate-100 font-black uppercase text-[9px] text-slate-400 sticky top-0"><tr><th className="p-3">Date</th><th className="p-3">Note</th><th className="p-3 text-right">Amount</th><th className="p-3 text-center">Delete</th></tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(viewProfile.id)).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(ca => (
                                                        <tr key={ca.id} className="hover:bg-slate-50">
                                                            <td className="p-3 font-mono text-slate-500">{ca.date}</td>
                                                            <td className="p-3 italic text-slate-600">{ca.reason || '--'}</td>
                                                            <td className={`p-3 text-right font-black font-mono ${ca.amount < 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{ca.amount < 0 ? '-' : '+'}₱{formatMoney(ca.amount)}</td>
                                                            <td className="p-3 text-center"><button onClick={() => delCA(ca.id, ca.empId, ca.amount)} className="text-rose-400 hover:text-rose-600 bg-rose-50 p-1.5 rounded-lg"><I d={icnX}/></button></td>
                                                        </tr>
                                                    ))}
                                                    {cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(viewProfile.id)).length === 0 && <tr><td colSpan="4" className="p-6 text-center text-slate-400 italic">No transactions recorded.</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
