        /* This pushes your content down so it doesn't hide under the header */
        body { margin: 0; padding-top: 80px; font-family: sans-serif; }

        /* A basic container for your article content */
        .content { padding: 20px; max-width: 800px; margin: auto; }

        /* THE IMAGE INJECTION (Targets the header shell) */
        .ref-header-shell {
            /* 1st: Remove the default purple/glass background */
            background: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;

            /* 2nd: Add your new image background */
            background-image: url('path/to/your/image_0.png') !important;
            
            /* 3rd: Make the image cover the whole bar and center it */
            background-size: cover !important;
            background-position: center bottom !important; 
            
            /* 4th: Optional - Ensure the text is readable (e.g., white text) */
            color: #ffffff !important; 
        }

        /* Adjust button colors to make them stand out against the new image */
        .ref-ham, .ref-pill {
            background-color: rgba(255, 255, 255, 0.2) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
            color: #ffffff !important;
        }
        .ref-pill:hover, .ref-ham:hover {
            background-color: rgba(255, 255, 255, 0.4) !important;
        }
    </style>
