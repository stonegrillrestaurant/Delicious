<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonegrill HR & Payroll Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. CORE LOGIC & MATH ENGINE ---

        // Employees Database Mock
        const mockEmployees = [
            { id: "7", name: "CALOY", rate: 500 },
            { id: "18", name: "Claudine LOTA", rate: 450 },
            { id: "19", name: "RAffy javier", rate: 450 },
            { id: "2", name: "NEL2x", rate: 400 },
            { id: "4", name: "Jhie", rate: 400 },
            { id: "5", name: "Roel", rate: 600 }
        ];

        // Parser for messy biometric data
        function parseBiometricData(rawData) {
            // Clean up the string, handling weird line breaks and tabs
            const cleanString = rawData.replace(/\n/g, ' ').replace(/\t/g, ' ');
            
            // Regex to find dates (MM/DD/YYYY) and times (HH:MM:SS)
            const logPattern = /([a-zA-Z0-9]+)\s+([a-zA-Z0-9\s]+?)\s+(Kitchen|Not Set2|.*?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2}:\d{2})\s+(\d+)/g;
            
            const attendanceMap = {};
            let match;

            // Since the raw data was very messy, we'll extract the core logs we can find
            while ((match = logPattern.exec(cleanString)) !== null) {
                const id = match[1];
                const name = match[2].trim();
                const date = match[4];
                const time = match[5];
                
                const key = `${id}-${date}`;
                if (!attendanceMap[key]) {
                    attendanceMap[key] = { employeeId: id, name: name, date: date, logs: [] };
                }
                attendanceMap[key].logs.push(new Date(`${date} ${time}`));
            }

            // Calculate hours accurately
            return Object.values(attendanceMap).map(record => {
                record.logs.sort((a, b) => a - b);
                const firstIn = record.logs[0];
                const lastOut = record.logs.length > 1 ? record.logs[record.logs.length - 1] : null;
                
                let totalHours = 0;
                let dayEquivalent = 0;

                if (lastOut) {
                    totalHours = (lastOut - firstIn) / (1000 * 60 * 60);
                    // Assume 8 hours = 1 full day. Max 1 day per shift unless OT is enabled.
                    dayEquivalent = Math.min(totalHours / 8, 1); 
                } else {
                    // Default to 1 day if they forgot to log out, for demo purposes (requires admin manual fix normally)
                    dayEquivalent = 1; 
                }

                return {
                    employeeId: record.employeeId,
                    name: record.name,
                    date: record.date,
                    dayEquivalent: dayEquivalent
                };
            });
        }

        // --- 2. REACT COMPONENTS ---

        const MonthlySummaryTable = () => {
            // Simulating computed payroll for the month
            const payrollData = mockEmployees.map(emp => {
                const daysWorked = (Math.random() * 5 + 10).toFixed(2); // Mock 10-15 days
                const gross = daysWorked * emp.rate;
                const caDed = Math.random() > 0.5 ? 500 : 0; // Random Cash Advance deduction
                const misc = 200; // SSS/Philhealth
                const net = gross - caDed - misc;
                
                // Force a negative balance example for demonstration
                const finalNet = emp.name === "Jhie" ? -150.00 : net; 

                return {
                    name: emp.name,
                    daysWorked: daysWorked,
                    rate: emp.rate,
                    gross: gross,
                    caDed: emp.name === "Jhie" ? 2000 : caDed,
                    misc: misc,
                    net: finalNet
                };
            });

            return (
                <div className="bg-white rounded-lg shadow-md overflow-hidden border border-gray-200">
                    <div className="flex justify-between items-center p-4 bg-gray-50 border-b">
                        <h2 className="text-lg font-bold text-gray-800">Payroll Summary Spreadsheet</h2>
                        <select className="border border-gray-300 p-2 rounded text-sm outline-none bg-white font-medium">
                            <option>March 01 - 15, 2026</option>
                        </select>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="text-xs text-white uppercase bg-blue-900">
                                <tr>
                                    <th className="px-6 py-3 border-r border-blue-800">Employee Name</th>
                                    <th className="px-4 py-3 text-center border-r border-blue-800">Days</th>
                                    <th className="px-4 py-3 text-right border-r border-blue-800">Daily Rate</th>
                                    <th className="px-4 py-3 text-right border-r border-blue-800 bg-blue-800">Gross</th>
                                    <th className="px-4 py-3 text-right border-r border-blue-800">C.A. Ded.</th>
                                    <th className="px-4 py-3 text-right border-r border-blue-800">SSS/Misc</th>
                                    <th className="px-4 py-3 text-right bg-blue-950 font-bold">Net Salary</th>
                                </tr>
                            </thead>
                            <tbody>
                                {payrollData.map((row, idx) => (
                                    <tr key={idx} className="border-b hover:bg-yellow-50 transition-colors">
                                        <td className="px-6 py-3 font-medium text-gray-900 border-r border-gray-200">{row.name}</td>
                                        <td className="px-4 py-3 text-center border-r border-gray-200">{row.daysWorked}</td>
                                        <td className="px-4 py-3 text-right border-r border-gray-200">₱{row.rate.toFixed(2)}</td>
                                        <td className="px-4 py-3 text-right border-r border-gray-200 font-semibold text-green-700">₱{row.gross.toFixed(2)}</td>
                                        <td className="px-4 py-3 text-right border-r border-gray-200 text-red-600">- ₱{row.caDed.toFixed(2)}</td>
                                        <td className="px-4 py-3 text-right border-r border-gray-200 text-red-600">- ₱{row.misc.toFixed(2)}</td>
                                        <td className={`px-4 py-3 text-right font-bold ${row.net < 0 ? 'bg-red-100 text-red-700' : 'bg-gray-50 text-gray-900'}`}>
                                            ₱{row.net.toFixed(2)}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const BiometricImporter = () => {
            const [rawData, setRawData] = React.useState("");
            const [parsedLogs, setParsedLogs] = React.useState([]);

            const handleParse = () => {
                const results = parseBiometricData(rawData);
                setParsedLogs(results);
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-white p-4 rounded-lg shadow-md border border-gray-200">
                        <h3 className="font-bold text-gray-800 mb-2">Paste Raw Biometric Data</h3>
                        <p className="text-xs text-gray-500 mb-4">Paste the messy text export from your machine here. The system will auto-detect days worked.</p>
                        <textarea 
                            className="w-full h-64 p-2 border border-gray-300 rounded text-sm font-mono bg-gray-50"
                            placeholder="7 CALOY Kitchen 03/01/2026 06:39:34 1..."
                            value={rawData}
                            onChange={(e) => setRawData(e.target.value)}
                        ></textarea>
                        <button 
                            onClick={handleParse}
                            className="mt-4 w-full bg-blue-900 text-white font-bold py-2 px-4 rounded hover:bg-blue-800 transition"
                        >
                            Clean & Process Data
                        </button>
                    </div>

                    <div className="bg-white p-4 rounded-lg shadow-md border border-gray-200 overflow-auto h-full max-h-[400px]">
                        <h3 className="font-bold text-gray-800 mb-2">Normalized Output</h3>
                        {parsedLogs.length === 0 ? (
                            <div className="text-gray-400 text-sm text-center mt-10 italic">No data processed yet.</div>
                        ) : (
                            <table className="w-full text-sm text-left border">
                                <thead className="bg-gray-100 border-b">
                                    <tr>
                                        <th className="p-2">ID</th>
                                        <th className="p-2">Date</th>
                                        <th className="p-2 text-center">Days Earned</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {parsedLogs.map((log, i) => (
                                        <tr key={i} className="border-b">
                                            <td className="p-2 font-medium">{log.employeeId}</td>
                                            <td className="p-2">{log.date}</td>
                                            <td className="p-2 text-center font-bold text-green-700">{log.dayEquivalent.toFixed(2)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>
            );
        };

        const PayrollCardDemo = () => {
            // Negative balance demo state
            const demoEmployee = {
                name: "Claudine LOTA",
                days: 12.5,
                rate: 450,
                gross: 5625.00,
                caDed: 6000.00, // Massive deduction causes negative net
                misc: 200.00,
                netSalary: -575.00
            };

            const isNegative = demoEmployee.netSalary < 0;

            return (
                <div className="flex justify-center">
                    <div className="w-[400px] border border-gray-300 bg-white shadow-xl rounded-lg overflow-hidden font-sans">
                        <div className="bg-blue-900 text-white p-4 text-center">
                            <h2 className="text-xl font-bold uppercase tracking-wider">PAYSLIP SUMMARY</h2>
                            <p className="text-sm text-blue-200">Cutoff: March 01 - 15, 2026</p>
                        </div>
                        
                        <div className="p-6 space-y-5">
                            <div className="flex justify-between border-b pb-2">
                                <span className="font-semibold text-gray-600">Employee:</span>
                                <span className="font-bold text-gray-900">{demoEmployee.name}</span>
                            </div>
                            
                            <div>
                                <h4 className="text-xs font-bold text-gray-400 uppercase mb-2">Earnings</h4>
                                <div className="flex justify-between text-sm">
                                    <span>Basic Pay ({demoEmployee.days} days @ ₱{demoEmployee.rate})</span>
                                    <span className="font-medium text-gray-800">₱{demoEmployee.gross.toFixed(2)}</span>
                                </div>
                            </div>

                            <div>
                                <h4 className="text-xs font-bold text-gray-400 uppercase mb-2">Deductions</h4>
                                <div className="flex justify-between text-sm text-red-600 mb-1">
                                    <span>Cash Advance Installment</span>
                                    <span>- ₱{demoEmployee.caDed.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-sm text-red-600">
                                    <span>SSS / Misc</span>
                                    <span>- ₱{demoEmployee.misc.toFixed(2)}</span>
                                </div>
                            </div>

                            <div className={`mt-4 p-4 rounded-md flex justify-between items-center text-xl font-bold border ${isNegative ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-800'}`}>
                                <span>NET SALARY</span>
                                <span>₱{demoEmployee.netSalary.toFixed(2)}</span>
                            </div>
                            
                            {isNegative && (
                                <div className="bg-red-100 text-red-800 p-2 rounded text-xs text-center font-bold">
                                    ⚠️ Negative Balance. Will carry over to next cutoff.
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 3. MAIN APP LAYOUT ---

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('summary');

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-blue-900 text-white shadow-md sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">🥩</span>
                                <h1 className="text-xl font-bold tracking-wide">STONEGRILL APP</h1>
                            </div>
                            <div className="text-sm font-medium text-blue-200">
                                Admin Dashboard
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
                        
                        {/* Navigation Tabs */}
                        <div className="flex gap-2 mb-6 border-b border-gray-300 pb-2 overflow-x-auto">
                            <button onClick={() => setActiveTab('summary')} className={`px-4 py-2 font-bold rounded-t-lg transition ${activeTab === 'summary' ? 'bg-blue-900 text-white' : 'text-gray-500 hover:bg-gray-200'}`}>Monthly Summary</button>
                            <button onClick={() => setActiveTab('import')} className={`px-4 py-2 font-bold rounded-t-lg transition ${activeTab === 'import' ? 'bg-blue-900 text-white' : 'text-gray-500 hover:bg-gray-200'}`}>Biometric Import</button>
                            <button onClick={() => setActiveTab('payslip')} className={`px-4 py-2 font-bold rounded-t-lg transition ${activeTab === 'payslip' ? 'bg-blue-900 text-white' : 'text-gray-500 hover:bg-gray-200'}`}>Payslip Card Demo</button>
                        </div>

                        {/* Tab Content */}
                        <div className="animate-fade-in">
                            {activeTab === 'summary' && (
                                <div>
                                    <p className="text-gray-600 mb-4 text-sm">Overview of earnings and deductions. Negative balances are highlighted in red automatically.</p>
                                    <MonthlySummaryTable />
                                </div>
                            )}
                            
                            {activeTab === 'import' && (
                                <div>
                                    <p className="text-gray-600 mb-4 text-sm">Paste raw `.txt` or `.csv` data from the biometric scanner. The system calculates exact day equivalents.</p>
                                    <BiometricImporter />
                                </div>
                            )}

                            {activeTab === 'payslip' && (
                                <div>
                                    <p className="text-gray-600 mb-4 text-sm text-center">Printable modal view for individual employees.</p>
                                    <PayrollCardDemo />
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
