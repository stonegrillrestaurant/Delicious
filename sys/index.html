<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stone Grill Payroll - Smart Cloud Suite</title>
    <link rel="icon" type="image/png" href="/sys/icon.png">
    <link rel="apple-touch-icon" href="/sys/icon.png">
    <link rel="manifest" href="/sys/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Switched to v10.14.1 because v11 dropped classic compat support -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #interactive-print-section, #interactive-print-section * { visibility: visible; }
            #interactive-print-section { position: absolute; left: 0; top: 0; width: 100%; border: none !important; margin: 0 !important; padding: 0 !important; }
            .pos-receipt-active #print-section { visibility: hidden; display: none !important; }
            #pos-receipt-print, #pos-receipt-print * { visibility: visible; }
            #pos-receipt-print { position: absolute; left: 0; top: 0; width: 58mm !important; margin: 0; padding: 0; font-family: monospace; color: black; display: block !important; }
            .print-hidden { display: none !important; }
        }
        #pos-receipt-print { display: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
    <div id="root">
        <div style="height: 100vh; width: 100vw; background-color: #172554; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="width: 50px; height: 50px; border: 4px solid #1e3a8a; border-top: 4px solid #ffffff; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="color: white; font-family: sans-serif; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-top: 20px;">System Starting...</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>

    <script type="text/babel">
        // --- 1. SETUP CLASSIC FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();

        // Bridge setup so the rest of your app doesn't need to change
        window.fb = { 
            db, 
            auth, 
            appId: "stone-grill-v1",
            signInWithPopup: (a, p) => a.signInWithPopup(p), 
            GoogleAuthProvider: firebase.auth.GoogleAuthProvider, 
            FacebookAuthProvider: firebase.auth.FacebookAuthProvider, 
            signInWithEmailAndPassword: (a, e, p) => a.signInWithEmailAndPassword(e, p), 
            signOut: (a) => a.signOut(), 
            onAuthStateChanged: (a, cb) => a.onAuthStateChanged(cb), 
            collection: (dbRef, ...paths) => {
                let r = dbRef;
                for(let i=0; i<paths.length; i++) r = (i % 2 === 0) ? r.collection(paths[i]) : r.doc(paths[i]);
                return r;
            }, 
            doc: (dbRef, ...paths) => {
                let r = dbRef;
                for(let i=0; i<paths.length; i++) r = (i % 2 === 0) ? r.collection(paths[i]) : r.doc(paths[i]);
                return r;
            }, 
            setDoc: (ref, data, opts) => ref.set(data, opts || {}), 
            addDoc: (ref, data) => ref.add(data), 
            onSnapshot: (ref, cb, err) => ref.onSnapshot(cb, err), 
            deleteDoc: (ref) => ref.delete(), 
            updateDoc: (ref, data) => ref.update(data) 
        };

        const { useState, useMemo, useEffect } = React;

        const normId = (id) => {
            if (!id) return '';
            const strId = String(id).trim();
            return /^\d+$/.test(strId) ? parseInt(strId, 10).toString() : strId.toLowerCase();
        };

        const clnDt = (dStr) => {
            if (!dStr) return '';
            let s = String(dStr).trim().substring(0, 10);
            if (s.includes('/')) {
                const parts = s.split('/');
                if (parts.length === 3 && parts[2].length === 4) {
                    return `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
                }
            }
            return s;
        };

        const moKey = (date) => {
            if (!date) return '';
            const parsed = new Date(date);
            if (Number.isNaN(parsed.getTime())) return '';
            return parsed.toISOString().slice(0, 7);
        };

        const fmtDt = (dateStr) => {
            if (!dateStr) return '';
            const parsed = new Date(dateStr);
            if (Number.isNaN(parsed.getTime())) return dateStr;
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[parsed.getMonth()]}-${parsed.getDate()}`;
        };

        const fmt = (v) => {
            const num = Number(v || 0); if (isNaN(num)) return "0";
            return Math.abs(num).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        };

        const calcHrs = (start, end) => {
            if (!start || !end || end === '00:00') return 0;
            const [h1, m1] = start.split(':').map(Number);
            const [h2, m2] = end.split(':').map(Number);
            let diffMinutes = (h2 * 60 + m2) - (h1 * 60 + m1);
            if (diffMinutes < 0) diffMinutes += 1440; 
            return diffMinutes / 60;
        };

        const Icon = ({ d, c = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={c}>
                {d && <path d={d} />}{children}
            </svg>
        );

        const IcDash = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const IcUsers = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></Icon>;
        const IcClock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const IcBank = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></Icon>;
        const IcCalc = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/></Icon>;
        const IcFile = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></Icon>;
        const IcCal = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></Icon>;
        const IcSet = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></Icon>;
        const IcOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
        const IcX = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const IcMenu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const IcPrint = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
        const IcSearch = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const IcUser = (p) => <Icon {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const IcHist = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
        const IcDol = (p) => <Icon {...p}><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Icon>;

        const Load = () => (
            <div className="fixed inset-0 bg-blue-950 flex flex-col items-center justify-center text-white z-50">
                <div className="w-16 h-16 border-4 border-t-white border-blue-800 rounded-full animate-spin mb-6"></div>
                <h2 className="text-xl font-black uppercase tracking-widest animate-pulse">System Initializing</h2>
                <p className="text-xs text-blue-400 mt-2 font-bold uppercase tracking-widest">Connecting to Cloud Server...</p>
            </div>
        );

        function PayslipWidget({ emp, selMo, moOpts, setSelMo, cas, payrolls, onClose, onEdit, onDelEmp, onDelLed }) {
            const [tab, setTab] = useState('payslip');
            const moLbl = moOpts.find(m => m.value === selMo)?.label || selMo;
            const bP = emp.days * (parseFloat(emp.dailyRate || emp.rate) || 0);
            const saved = payrolls.find(p => normId(p.empId) === normId(emp.id) && (p.month === selMo || moKey(p.startDate) === selMo));
            const bA = emp.bonusAmount || 0;

            const earns = [
                { id: 1, l: `Basic Pay (${emp.days} Days)`, a: bP },
                { id: 2, l: "Bonus / Incentives", a: bA }
            ];

            const deds = [
                ...(emp.monthlyCA > 0 ? [{ id: 1, l: "C.A. Deduction", a: emp.monthlyCA }] : []),
                ...((parseFloat(emp.sssRate) || 0) > 0 ? [{ id: 2, l: "SSS Contribution", a: parseFloat(emp.sssRate) }] : []),
                ...((parseFloat(emp.miscRate) || 0) > 0 ? [{ id: 3, l: "Misc / Uniform", a: parseFloat(emp.miscRate) }] : [])
            ];

            const tEarn = earns.reduce((s, i) => s + i.a, 0);
            const tDed = deds.reduce((s, i) => s + i.a, 0);
            const net = tEarn - tDed;

            const led = cas
                .filter(c => normId(c.empId) === normId(emp.id))
                .map((c, i) => ({ id: c.id || i, date: c.date, type: c.amount < 0 ? "C.A. Payment" : "Cash Advance", amount: c.amount, status: "Logged", note: c.reason || '' }));

            if (bA > 0 && saved) {
                led.push({ id: 'bonus-' + saved.recordKey, date: saved.endDate || selMo, type: "Incentive Credited", amount: Math.abs(bA), status: "Processed", note: "Archived Payroll Bonus", isBonus: true });
            }
            led.sort((a,b) => (b.date || '').localeCompare(a.date || ''));

            const R = ({l, a, red}) => <div className="flex justify-between items-center text-sm"><span className="text-gray-600 font-medium">{l}</span><span className={`font-bold ${red?'text-red-500':'text-gray-800'}`}>{red?'- ':''}₱{fmt(a)}</span></div>;

            return (
                <div className="w-full max-w-lg mx-auto bg-gray-50 flex flex-col relative shadow-2xl overflow-hidden rounded-[2.5rem] border animate-slide-up">
                    <div className="bg-[#1b3382] text-white px-6 pt-10 pb-6 rounded-b-[2rem] shadow-md z-10 shrink-0">
                        <div className="flex justify-between items-center mb-6"><div className="flex items-center gap-3"><IcUser className="w-6 h-6 text-white/80"/><h1 className="text-lg font-bold tracking-widest uppercase mt-1">Payslip Details</h1></div>{onClose&&<button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full"><IcX/></button>}</div>
                        <div className="flex justify-between items-end gap-2"><div className="flex-1"><h2 className="text-2xl font-black truncate">{emp.name}</h2><p className="text-blue-200 text-xs font-medium uppercase mt-1">{emp.position} • {emp.id}</p></div><select className="bg-white/10 border border-white/20 text-white rounded-xl px-3 py-2 text-xs font-bold shadow-sm outline-none" value={selMo} onChange={e=>setSelMo(e.target.value)}>{moOpts.map(o=><option className="text-black" key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                    </div>
                    <div className="flex px-6 pt-4 pb-2 gap-4 shrink-0"><button onClick={()=>setTab('payslip')} className={`flex-1 py-3 text-xs font-bold uppercase rounded-2xl flex items-center justify-center gap-2 ${tab==='payslip'?'bg-white shadow text-[#1b3382]':'text-gray-400'}`}><IcFile className="w-4 h-4"/> Breakdown</button><button onClick={()=>setTab('ledger')} className={`flex-1 py-3 text-xs font-bold uppercase rounded-2xl flex items-center justify-center gap-2 ${tab==='ledger'?'bg-white shadow text-[#1b3382]':'text-gray-400'}`}><IcHist className="w-4 h-4"/> Ledger</button></div>
                    <div className="flex-1 overflow-y-auto px-6 pb-8 space-y-6 custom-scrollbar max-h-[60vh]">
                        {tab==='payslip' ? (
                            <div className="space-y-6 mt-2">
                                <div className="bg-white p-5 rounded-[1.5rem] shadow-sm border flex justify-between"><div><p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Pay Period</p><p className="text-xs font-bold text-gray-800 uppercase">{moLbl}</p></div><div className="text-right"><p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Rate / Day</p><p className="text-xs font-bold text-gray-800">₱{fmt(emp.dailyRate||emp.rate)}</p></div></div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border"><h3 className="text-xs font-black text-gray-400 tracking-[0.2em] uppercase mb-4 text-center">Gross Earnings</h3><div className="space-y-3 mb-4">{earns.map(e=><R key={e.id} l={e.l} a={e.a}/>)}</div><div className="pt-4 border-t border-dashed flex justify-between items-center"><span className="text-xs font-black text-gray-800 uppercase">Total Gross</span><span className="text-lg font-black text-[#2563eb]">₱{fmt(tEarn)}</span></div></div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border"><h3 className="text-xs font-black text-gray-400 tracking-[0.2em] uppercase mb-4 text-center">Deductions</h3><div className="space-y-3 mb-4">{deds.map(e=><R key={e.id} l={e.l} a={e.a} red/>)}{deds.length===0&&<p className="text-xs text-center text-gray-400 italic">None</p>}</div><div className="pt-4 border-t border-dashed flex justify-between items-center"><span className="text-xs font-black text-gray-800 uppercase">Total Deductions</span><span className="text-lg font-black text-red-500">- ₱{fmt(tDed)}</span></div></div>
                                <div className="p-8 text-center bg-slate-100 rounded-[2rem] border shadow-sm"><p className="text-[10px] font-black text-blue-900/50 uppercase tracking-[0.2em] mb-2">Overall Lifetime Balance</p><p className={`text-5xl font-black tracking-tighter ${emp.caBalance<0?'text-red-500':'text-[#1b3382]'}`}>{emp.caBalance<0?'-':''}₱{fmt(Math.abs(emp.caBalance))}</p><p className="text-[9px] font-bold text-gray-400 mt-4 uppercase">Days Worked: {emp.lifetimeDays||0}</p></div>
                                <div className="p-6 text-center border-t border-dashed relative">{saved&&<span className="absolute -top-3 left-1/2 -translate-x-1/2 text-[9px] font-black uppercase text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border">Archived</span>}<p className="text-[10px] font-bold text-gray-400 uppercase tracking-[0.15em] mb-2">{moLbl} Net Salary</p><p className={`text-3xl font-bold tracking-tight ${net<0?'text-red-500':'text-gray-800'}`}>{net<0?'-':''}₱{fmt(Math.abs(net))}</p>{saved&&<div className="mt-5 pt-4 flex justify-center gap-8 bg-white p-4 rounded-2xl shadow-sm border"><div className="flex flex-col items-center"><span className="text-[9px] font-black uppercase text-gray-400 mb-1">Disbursed</span><span className="text-emerald-600 font-black">₱{fmt(saved.data?.salary_pay)}</span></div><div className="flex flex-col items-center"><span className="text-[9px] font-black uppercase text-gray-400 mb-1">Carryover</span><span className={`font-black ${saved.data?.carryover<0?'text-red-500':'text-blue-600'}`}>{saved.data?.carryover<0?'-':''}₱{fmt(Math.abs(saved.data?.carryover))}</span></div></div>}</div>
                                {(onEdit||onDelEmp)&&<div className="flex gap-3 print-hidden">{onEdit&&<button onClick={()=>onEdit(emp)} className="flex-1 py-3 bg-white border text-blue-600 rounded-xl font-bold text-xs uppercase shadow-sm">Edit</button>}{onDelEmp&&<button onClick={()=>onDelEmp(emp.id, emp.name)} className="flex-1 py-3 bg-white border text-rose-600 rounded-xl font-bold text-xs uppercase shadow-sm">Delete</button>}</div>}
                            </div>
                        ) : (
                            <div className="space-y-4 mt-2">
                                <div className="flex justify-between items-center mb-6"><h3 className="text-[10px] font-black text-gray-400 uppercase">Cloud Ledger</h3><span className="text-[#1b3382] text-[10px] font-bold bg-blue-100 px-3 py-1 rounded-full">{led.length} Records</span></div>
                                {led.map(tx=><div key={tx.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border flex items-center gap-4"><div className={`p-3 rounded-xl shrink-0 ${tx.amount<0||tx.isBonus?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'}`}><IcDol className="w-5 h-5"/></div><div className="flex-1 min-w-0"><p className="font-bold text-sm truncate">{tx.type}</p><p className="text-[10px] text-gray-400">{fmtDt(tx.date)}</p>{tx.note&&<p className="text-[10px] text-gray-500 italic truncate">"{tx.note}"</p>}</div><div className="text-right shrink-0"><p className={`font-black text-sm ${tx.amount<0||tx.isBonus?'text-emerald-600':'text-red-500'}`}>{tx.amount<0||tx.isBonus?'+':'-'}₱{fmt(Math.abs(tx.amount))}</p>{onDelLed&&<button onClick={()=>{if(window.confirm('Delete entry?'))onDelLed(tx);}} className="text-[10px] text-rose-500 mt-2">Delete</button>}</div></div>)}
                                {led.length===0&&<div className="text-center py-10 bg-white rounded-3xl border-dashed border"><IcHist className="w-10 h-10 mx-auto text-gray-300 mb-2"/><p className="text-xs text-gray-400 font-bold uppercase">No Transactions</p></div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const Nav = ({i, l, a, onClick, o}) => <button onClick={onClick} className={`w-full flex items-center px-6 py-3.5 transition-all ${a?'bg-[#386df2] text-white border-l-4 border-white shadow-lg':'text-blue-200 hover:bg-blue-800/50 hover:text-white border-l-4 border-transparent'}`}><span className="shrink-0">{i}</span>{o&&<span className="ml-4 text-[11px] font-black uppercase tracking-widest">{l}</span>}</button>;
        const SC = ({t, v, i, c}) => <div className="bg-white p-6 rounded-3xl shadow-xl flex items-center gap-6"><div className={`p-4 rounded-2xl ${c}`}>{i}</div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{t}</p><p className="text-3xl font-black text-slate-800 tracking-tighter">{v}</p></div></div>;
        const FI = ({l, v, set, req, type="text", dis, c="text-slate-900", children}) => <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">{l}</label>{type === 'select' ? <select required={req} disabled={dis} value={v} onChange={e=>set(e.target.value)} className={`w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold ${c}`}>{children}</select> : <input type={type} required={req} disabled={dis} value={v} onChange={e=>set(e.target.value)} className={`w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold ${c}`}/>}</div>;
        const PR = ({l, v, red, bold, top}) => <div className={`flex justify-between text-xs ${red?'text-rose-600':(bold?'text-slate-900':'text-slate-600')} ${bold?'font-black uppercase':'font-semibold'} ${top?'pt-3 border-t border-slate-200':''}`}><span>{l}</span><span>{red?'- ₱':(bold?'₱':'')}{fmt(v)}</span></div>;
        
        function LoginScreen() {
            const [load, setLoad] = useState(false), [showE, setShowE] = useState(false), [e, setE] = useState(''), [p, setP] = useState('');
            const lgG = async () => { setLoad(true); try{ await window.fb.signInWithPopup(window.fb.auth, new window.fb.GoogleAuthProvider()); }catch(er){alert(er.message); setLoad(false);} };
            const lgF = async () => { setLoad(true); const pv = new window.fb.FacebookAuthProvider(); pv.addScope('email'); try{ await window.fb.signInWithPopup(window.fb.auth, pv); }catch(er){alert(er.message); setLoad(false);} };
            const lgM = async (ev) => { ev.preventDefault(); setLoad(true); try{ await window.fb.signInWithEmailAndPassword(window.fb.auth, e, p); }catch(er){alert("Login Failed."); setLoad(false);} };

            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up">
                        <img src="/sys/icon.png" className="w-20 h-20 mb-6" onError={x=>x.target.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}/>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8"><div className="bg-white p-8 rounded-3xl shadow-xl h-max space-y-4"><h2 className="font-black text-blue-900 uppercase">Issue Entry</h2><div className="flex bg-slate-100 p-1 rounded-xl"><button onClick={()=>setCaT('advance')} className={`flex-1 py-2 text-[10px] font-black rounded-lg ${caT==='advance'?'bg-white shadow text-blue-900':'text-slate-400'}`}>ADVANCE</button><button onClick={()=>setCaT('payment')} className={`flex-1 py-2 text-[10px] font-black rounded-lg ${caT==='payment'?'bg-white shadow text-emerald-600':'text-slate-400'}`}>PAYMENT</button></div>
                                <select className="w-full p-3 border rounded-xl font-black bg-slate-50 outline-none" value={nCa.empId} onChange={e=>setNCa({...nCa, empId: e.target.value})}><option value="">Select Member</option>{emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select>
                                {nCa.empId && (()=>{const e=sum.find(x=>normId(x.id)===normId(nCa.empId)); return <div className="bg-slate-50 border p-4 rounded-xl text-center"><p className="text-[10px] uppercase mb-1">Lifetime Balance</p><p className={`text-2xl ${e?.caBalance<0?'text-red-500':''}`}>{e?.caBalance<0?'-':''}₱{fmt(Math.abs(e?.caBalance))}</p></div>;})()}<input type="date" className="w-full p-3 border rounded-xl font-bold bg-slate-50 outline-none" value={nCa.date} onChange={e=>setNCa({...nCa, date: e.target.value})} /><input type="number" placeholder="Amount" className="w-full p-3 border rounded-xl font-black bg-slate-50 outline-none" value={nCa.amount} onChange={e=>setNCa({...nCa, amount: e.target.value})} /><input type="text" placeholder="Note" className="w-full p-3 border rounded-xl font-bold bg-slate-50 outline-none" value={nCa.reason} onChange={e=>setNCa({...nCa, reason: e.target.value})} /><button onClick={issCa} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">Commit</button></div>
                                <div className="md:col-span-2 bg-white rounded-3xl border shadow-xl"><div className="p-5 bg-gray-50 border-b font-black text-blue-900 uppercase text-[10px]">Cloud Ledger</div><div className="max-h-[600px] overflow-y-auto custom-scrollbar"><table className="w-full text-xs text-left"><thead className="bg-white border-b text-[9px] font-black text-slate-400 uppercase sticky top-0"><tr><th className="p-4">Date</th><th className="p-4">Name</th><th className="p-4 text-right">Value</th><th className="p-4 text-center">Action</th></tr></thead><tbody className="divide-y">{cas.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(c=><tr key={c.id} className="hover:bg-slate-50"><td className="p-4 font-mono text-slate-400">{fmtDt(c.date)}</td><td className="p-4 font-black uppercase">{emps.find(e=>normId(e.id)===normId(c.empId))?.name||c.empId} <span className="italic text-slate-400 font-normal ml-2">{c.reason}</span></td><td className={`p-4 text-right font-black ${c.amount<0?'text-emerald-600':'text-red-500'}`}>{c.amount<0?'+':'-'}₱{fmt(Math.abs(c.amount))}</td><td className="p-4 text-center"><button onClick={()=>handleDeleteCA(c.id)} className="text-rose-400"><IcX c="w-3 h-3"/></button></td></tr>)}</tbody></table></div></div></div></div>}

                                {isA && tab==='print' && <div className="bg-white w-full p-4 lg:p-8 animate-slide-up"><div className="flex justify-between items-center mb-8 print-hidden"><div className="flex gap-4 items-center"><h2 className="text-2xl font-black uppercase">Payroll</h2><select className="border-2 rounded-xl px-4 py-2 font-bold" value={selMo} onChange={e=>setSelMo(e.target.value)}>{moOpts.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div><button onClick={()=>window.print()} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-black uppercase"><IcPrint c="inline w-4 h-4 mr-2"/>Print</button></div><div className="overflow-x-auto"><table className="w-full text-left text-sm min-w-[800px]"><thead><tr className="border-t-4 border-red-600 border-b-2 border-gray-900"><th className="py-3 px-2 font-bold uppercase text-xs">Name</th><th className="py-3 px-2 font-bold uppercase text-xs text-center">Rate</th><th className="py-3 px-2 font-bold uppercase text-xs text-center">Days</th><th className="py-3 px-2 font-bold uppercase text-xs text-right text-red-600">CA.</th><th className="py-3 px-2 font-black uppercase text-xs text-right">Salary</th><th className="py-3 px-2 font-bold uppercase text-xs text-center">Signature</th></tr></thead><tbody className="divide-y">{sum.map(r=><tr key={r.id}><td className="py-3 px-2 font-bold uppercase">{r.name}</td><td className="py-3 px-2 text-center font-mono">{fmt(r.dailyRate||r.rate)}</td><td className="py-3 px-2 text-center font-bold">{r.days}</td><td className="py-3 px-2 text-right text-red-500 font-bold font-mono">{r.monthlyCA>0?`-₱${fmt(r.monthlyCA)}`:''}</td><td className={`py-3 px-2 text-right font-black font-mono text-base ${r.net<0?'text-red-500':''}`}>{r.net<0?'-':''}{fmt(Math.abs(r.net))}</td><td className="py-3 px-2"><div className="w-full border-b border-dashed border-gray-400 h-8"></div></td></tr>)}</tbody><tfoot><tr className="border-t-2 border-gray-900 font-black text-lg"><td colSpan="4" className="py-5 px-2 text-right uppercase">TOTAL:</td><td className={`py-5 px-2 text-right font-mono ${sum.reduce((s,r)=>s+r.net,0)<0?'text-red-500':''}`}>{sum.reduce((s,r)=>s+r.net,0)<0?'-':''}₱{fmt(Math.abs(sum.reduce((s,r)=>s+r.net,0)))}</td><td></td></tr></tfoot></table></div></div>}

                                {isA && tab==='sum' && <div className="bg-white rounded-3xl shadow-xl border overflow-hidden flex flex-col min-h-[500px]"><div className="p-6 border-b bg-slate-900 text-white"><h2 className="font-black uppercase flex items-center gap-2"><IcCal/> Yearly Overview</h2></div><div className="overflow-auto flex-1 custom-scrollbar"><table className="w-full text-right text-xs min-w-max"><thead className="bg-slate-800 text-white sticky top-0 z-20"><tr><th className="p-4 text-left border border-slate-700 sticky left-0 bg-slate-800 font-black uppercase text-[10px] z-30">Staff</th>{['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'].map(m=><th key={m} className="p-4 border border-slate-700">{m}</th>)}</tr></thead><tbody>{emps.map(e=><tr key={e.id} className="border-b hover:bg-blue-50/50"><td className="p-4 text-left border-r sticky left-0 bg-white font-black uppercase z-10">{e.name}</td>{Array.from({length:12}).map((_,i)=>{const isC=selMo.endsWith((i+1).toString().padStart(2,'0')), n=sum.find(p=>p.id===e.id)?.net; return <td key={i} className={`p-4 font-mono font-bold border-r ${isC?(n<0?'text-red-500 bg-red-50':'text-blue-600 bg-blue-50/30'):'text-slate-300 italic'}`}>{isC?`${n<0?'-':''}₱${fmt(Math.abs(n||0))}`:'--'}</td>;})}</tr>)}</tbody></table></div></div>}

                                {isA && tab==='set' && <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md mx-auto mt-10 text-center"><h3 className="font-black text-2xl uppercase mb-2">Cloud Database</h3><p className="text-slate-400 mb-8 font-bold text-xs">Backup or Restore environment.</p><div className="space-y-4"><button onClick={exportDb} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Download Backup</button><label className="flex w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg cursor-pointer justify-center">Upload Restore JSON<input type="file" accept=".json" className="hidden" onChange={importDb}/></label></div></div>}
                            </div>
                        </div>

                        {rcpt && <div id="pos-receipt-print" className="bg-white"><div className="text-center mb-2"><h2 className="text-base font-black m-0">STONE GRILL</h2><p className="text-[10px] m-0">Cash Advance Voucher</p></div><div className="border-b border-dashed border-black my-2"></div><p className="text-[10px] my-1"><strong>Date:</strong> {new Date(rcpt.dateApproved||rcpt.dateRequested).toLocaleString()}</p><p className="text-[10px] my-1"><strong>Name:</strong> {rcpt.empName.toUpperCase()}</p><div className="border-b border-dashed border-black my-2"></div><div className="text-center my-4"><p className="text-[10px] m-0 mb-1">AMOUNT APPROVED</p><h1 className="text-xl font-black m-0">PHP {fmt(rcpt.amount)}</h1></div><div className="border-b border-dashed border-black my-2"></div><p className="text-[9px] text-center my-4 uppercase">*** SYSTEM GENERATED ***<br/>Admin Verified</p><div className="mt-8"><p className="text-[10px] text-center border-t border-black pt-1 w-11/12 mx-auto">Cashier Signature</p></div></div>}
                    </main>

                    {add && isA && <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-[60] flex items-center justify-center p-4"><form onSubmit={subEmp} className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 space-y-4 animate-in zoom-in-95"><div className="flex justify-between mb-2"><h3 className="font-black uppercase tracking-widest text-blue-900">{edit?'Edit Staff':'Add Staff'}</h3><button type="button" onClick={()=>{setAdd(false);setEdit(false);}} className="text-slate-400"><IcX/></button></div><FI l="Biometric ID" v={f.biometricId} set={v=>setF({...f,biometricId:v})} dis={edit} req/><FI l="Registered Email" type="email" v={f.staffEmail} set={v=>setF({...f,staffEmail:v})} c="text-blue-600"/><div className="grid grid-cols-2 gap-4"><FI l="First Name" v={f.firstName} set={v=>setF({...f,firstName:v})} req/><FI l="Last Name" v={f.lastName} set={v=>setF({...f,lastName:v})} req/></div><div className="grid grid-cols-2 gap-4"><FI l="Role" v={f.position} set={v=>setF({...f,position:v})}/><FI l="Daily Rate" type="number" v={f.dailyRate} set={v=>setF({...f,dailyRate:v})} req c="text-blue-600"/></div><div className="grid grid-cols-2 gap-4"><FI l="Contact Num" v={f.contactNumber} set={v=>setF({...f,contactNumber:v})}/><FI l="SSS Number" v={f.sssNumber} set={v=>setF({...f,sssNumber:v})}/></div><div className="grid grid-cols-2 gap-4"><FI l="SSS Ded." type="number" v={f.sssRate} set={v=>setF({...f,sssRate:v})} c="text-rose-600"/><FI l="Misc Ded." type="number" v={f.miscRate} set={v=>setF({...f,miscRate:v})} c="text-rose-600"/></div><button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase mt-4">Save to Cloud</button></form></div>}

                    {vProf && isA && <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-[50] flex items-center justify-center p-4"><PayslipWidget emp={sum.find(e=>normId(e.id)===normId(vProf.id))||vProf} selMo={selMo} moOpts={moOpts} setSelMo={setSelMo} cas={cas} payrolls={payrolls} onClose={()=>setVProf(null)} onEdit={editEmp} onDelEmp={delEmp} onDelLed={delLedg}/></div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
