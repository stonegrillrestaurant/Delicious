<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill Payroll - Full Cloud Suite</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, 
            FacebookAuthProvider, signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, collection, doc, setDoc, addDoc, getDocs, 
            onSnapshot, query, deleteDoc, updateDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "stone-grill-v1";

        window.fb = { 
            db, auth, appId, signInWithEmailAndPassword, signOut, onAuthStateChanged, 
            FacebookAuthProvider, signInWithPopup, collection, doc, setDoc, 
            addDoc, getDocs, onSnapshot, query, deleteDoc, updateDoc 
        };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print {
            body * { visibility: hidden; }
            #interactive-print-section, #interactive-print-section * { visibility: visible; }
            #interactive-print-section { 
                position: absolute; left: 0; top: 0; width: 100%; border: none !important; 
                box-shadow: none !important; margin: 0 !important; padding: 0 !important; 
            }
            .print-hidden { display: none !important; }
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ d, className = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" 
                 stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" 
                 strokeLinejoin="round" className={className}>
                {d && <path d={d} />}
                {children}
            </svg>
        );
        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Banknote = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></Icon>;
        const CalendarDays = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;
        const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
        const Unlock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
        const Database = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></Icon>;
        const Edit = (p) => <Icon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;

        // --- AUTH SCREENS ---
        function LoginScreen() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError(false);
                setLoading(true);
                try {
                    await window.fb.signInWithEmailAndPassword(window.fb.auth, email, password);
                } catch (err) {
                    setError(true);
                    setLoading(false);
                }
            };

            const handleFacebookLogin = async () => {
                setError(false);
                setLoading(true);
                try {
                    const provider = new window.fb.FacebookAuthProvider();
                    await window.fb.signInWithPopup(window.fb.auth, provider);
                } catch (err) {
                    setError(true);
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50 font-sans overflow-y-auto">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up my-auto">
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700"><Lock /></div>
                        <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-widest text-center">System Login</h2>
                        <p className="text-xs text-slate-400 mb-8 text-center font-bold uppercase tracking-widest leading-relaxed">
                            Authorized Admin Access Only
                        </p>
                        
                        <form onSubmit={handleLogin} className="w-full space-y-4 mb-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Email</label>
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} 
                                       className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800" />
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Password</label>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} 
                                       className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800" />
                            </div>
                            {error && <p className="text-red-500 text-[10px] font-black uppercase text-center animate-pulse pt-2">Authentication Failed</p>}
                            <button type="submit" disabled={loading} 
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white h-14 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg disabled:opacity-50 mt-2">
                                {loading ? 'Validating...' : 'Secure Login'}
                            </button>
                        </form>

                        <div className="flex items-center w-full mb-6">
                            <hr className="flex-1 border-slate-200"/>
                            <span className="px-3 text-[10px] text-slate-400 font-black uppercase">OR</span>
                            <hr className="flex-1 border-slate-200"/>
                        </div>
                        
                        <button type="button" onClick={handleFacebookLogin} disabled={loading} 
                                className="w-full bg-[#1877F2] hover:bg-[#166FE5] text-white h-14 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg disabled:opacity-50 flex items-center justify-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            Login with Facebook
                        </button>
                    </div>
                </div>
            );
        }

        // --- ADMIN PIN MODAL ---
        function AdminPinModal({ onUnlock, onClose }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            
            // Edit your PINs here:
            const allowedPins = { 
                '1234': 'Main Admin', 
                '2558': 'Owner', 
                '8888': 'Shift Lead' 
            };
            
            const handlePress = (num) => {
                if (pin.length < 4 && !error) {
                    const next = pin + num;
                    setPin(next);
                    if (next.length === 4) {
                        if (allowedPins[next]) onUnlock(allowedPins[next]);
                        else { 
                            setError(true); 
                            setTimeout(() => { setPin(''); setError(false); }, 700); 
                        }
                    }
                }
            };

            return (
                <div className="fixed inset-0 bg-blue-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-in fade-in duration-200">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up relative">
                        <button onClick={onClose} className="absolute top-6 right-6 text-gray-400 hover:text-gray-800"><X/></button>
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700"><Unlock /></div>
                        <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-widest">Admin Reveal</h2>
                        <p className="text-[10px] text-slate-400 mb-10 font-black uppercase tracking-widest">Enter code to view financial data</p>
                        
                        <div className={`flex space-x-6 mb-12 ${error ? 'animate-bounce text-red-500' : ''}`}>
                            {[...Array(4)].map((_, i) => (
                                <div key={i} className={`w-5 h-5 rounded-full border-2 transition-all duration-300 ${pin.length > i ? 'bg-blue-600 border-blue-600' : 'bg-transparent border-gray-300'}`} />
                            ))}
                        </div>
                        <div className="grid grid-cols-3 gap-6 w-full">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9, '', 0, 'del'].map((num, i) => (
                                num === 'del' ? 
                                <button key={i} onClick={() => setPin(pin.slice(0, -1))} className="h-14 rounded-2xl bg-gray-50 flex items-center justify-center text-red-400 font-bold uppercase text-[10px]">del</button>
                                : num === '' ? <div key={i} /> 
                                : <button key={i} onClick={() => handlePress(num.toString())} className="h-14 rounded-2xl bg-gray-50 text-2xl font-black text-slate-700 active:bg-blue-50 transition-colors">{num}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP COMPONENT ---
        function App() {
            const [user, setUser] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminPin, setShowAdminPin] = useState(false);
            const [currentAdminName, setCurrentAdminName] = useState('');
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 1024);
            
            const [employees, setEmployees] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState([]);
            const [auditLogs, setAuditLogs] = useState([]);
            const [interactivePayrolls, setInteractivePayrolls] = useState([]);

            // UI Control States
            const [selectedMonth, setSelectedMonth] = useState('2026-04');
            const [showAddEmp, setShowAddEmp] = useState(false);
            const [rawInput, setRawInput] = useState('');
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });
            const [viewProfile, setViewProfile] = useState(null);
            const [reportDates, setReportDates] = useState({ start: '2026-04-01', end: '2026-04-30' });
            
            // Interactive Payslip State
            const [icEmpId, setIcEmpId] = useState('');
            const [icDateStart, setIcDateStart] = useState('2026-04-01');
            const [icDateEnd, setIcDateEnd] = useState('2026-04-30');
            const [icForm, setIcForm] = useState({ days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0 });

            // Dashboard Filter Search State
            const [dashSearchEmpId, setDashSearchEmpId] = useState('');
            const [dashSearchStart, setDashSearchStart] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10);
            });
            const [dashSearchEnd, setDashSearchEnd] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().slice(0, 10);
            });

            // Migration Tool state
            const [oldUidInput, setOldUidInput] = useState('');
            const [isMigrating, setIsMigrating] = useState(false);

            // Form states
            const [newEmpForm, setNewEmpForm] = useState({ 
                biometricId: '', firstName: '', lastName: '', position: '', 
                dailyRate: '', contactNumber: '', sssNumber: '', sssRate: '', status: 'active' 
            });
            const [isEditing, setIsEditing] = useState(false);

            // Firebase Initialization Listener
            useEffect(() => {
                const unsub = window.fb.onAuthStateChanged(window.fb.auth, (u) => { 
                    setUser(u); 
                    setIsReady(true); 
                    if(!u) { 
                        setIsAdmin(false); 
                        setCurrentAdminName(''); 
                    }
                });
                return () => unsub();
            }, []);

            // Data Sync Listener
            useEffect(() => {
                if (!user) return;
                const path = (n) => window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, n);
                
                const uEmps = window.fb.onSnapshot(path('employees'), s => setEmployees(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const uAtt = window.fb.onSnapshot(path('attendance'), s => setAttendance(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const uCA = window.fb.onSnapshot(path('cash_advances'), s => setCashAdvances(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const uLogs = window.fb.onSnapshot(path('audit_logs'), s => setAuditLogs(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const uIP = window.fb.onSnapshot(path('payroll_entries'), s => setInteractivePayrolls(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                return () => { uEmps(); uAtt(); uCA(); uLogs(); uIP(); };
            }, [user]);

            useEffect(() => {
                if (icEmpId && icDateStart && icDateEnd) {
                    const key = `${icEmpId}_${icDateStart}_${icDateEnd}`;
                    const saved = interactivePayrolls.find(p => p.recordKey === key);
                    setIcForm(saved ? saved.data : { days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0 });
                }
            }, [icEmpId, icDateStart, icDateEnd, interactivePayrolls]);

            // Payroll Calculation Logic
            const payrollSummary = useMemo(() => {
                const [year, month] = selectedMonth.split('-');
                const today = new Date();
                let daysToCount = new Date(year, month, 0).getDate();
                
                // Count only up to today if viewing the current ongoing month
                if (today.getFullYear() === parseInt(year, 10) && (today.getMonth() + 1) === parseInt(month, 10)) {
                    daysToCount = today.getDate();
                } else if (today.getFullYear() < parseInt(year, 10) || (today.getFullYear() === parseInt(year, 10) && (today.getMonth() + 1) < parseInt(month, 10))) {
                    daysToCount = 0; // Future months have 0 days to count
                }

                return employees.map(emp => {
                    const empAtt = attendance.filter(a => a.empId.toString() === emp.id.toString() && a.date.startsWith(selectedMonth));
                    const days = empAtt.reduce((sum, r) => sum + (parseFloat(r.dayEquivalent) || 0), 0);
                    const absent = Math.max(0, daysToCount - days);
                    
                    const gross = days * (parseFloat(emp.rate) || 0);
                    const sss = gross > 0 ? (parseFloat(emp.sssRate) || 0) : 0;
                    const caBalance = parseFloat(emp.caBalance) || 0;
                    const caDed = (caBalance > 0 && gross > 0) ? Math.min(caBalance, gross * 0.2) : 0;
                    const net = gross - sss - caDed;
                    
                    return { ...emp, days, absent, gross, caDed, net };
                });
            }, [employees, attendance, selectedMonth]);

            const stats = useMemo(() => {
                const today = new Date().toISOString().slice(0, 10);
                const present = attendance.filter(a => a.date === today).length;
                const totalCA = employees.reduce((sum, e) => sum + (parseFloat(e.caBalance) || 0), 0);
                return { count: employees.length, present, totalCA, alerts: payrollSummary.filter(p => p.net < 0).length };
            }, [employees, attendance, payrollSummary]);

            // --- DASHBOARD SEARCH LOGIC ---
            let searchedEmp = null;
            let searchedDays = 0, searchedGross = 0, searchedCaDed = 0, searchedMisc = 0;
            if (dashSearchEmpId) {
                searchedEmp = employees.find(e => e.id.toString() === dashSearchEmpId);
                if (searchedEmp && dashSearchStart && dashSearchEnd) {
                    const att = attendance.filter(a => a.empId.toString() === searchedEmp.id.toString() && a.date >= dashSearchStart && a.date <= dashSearchEnd);
                    searchedDays = att.reduce((sum, r) => sum + (parseFloat(r.dayEquivalent) || 0), 0);
                    searchedGross = searchedDays * (parseFloat(searchedEmp.rate) || 0);
                    searchedCaDed = (parseFloat(searchedEmp.caBalance) > 0 && searchedGross > 0) ? Math.min(parseFloat(searchedEmp.caBalance), searchedGross * 0.2) : 0;
                    searchedMisc = searchedGross > 0 ? (parseFloat(searchedEmp.sssRate) || 0) + 200 : 0; 
                }
            }

            // SMART REGEX PARSER for Biometric Logs
            const handleProcessLogs = async () => {
                if (!user || !isAdmin || !rawInput.trim()) return;
                const { db, appId, setDoc, doc } = window.fb;
                const lines = rawInput.trim().split('\n');
                let count = 0;
                let errCount = 0;
                
                try {
                    for (let line of lines) {
                        line = line.trim();
                        // Skip completely empty lines or Header labels
                        if (!line || line.toUpperCase().startsWith('ID') || line.toUpperCase().startsWith('NO')) continue;

                        // 1. Find Date (e.g., 4/15/2026, 04-15-26)
                        const dateMatch = line.match(/(\d{1,2}[\/-]\d{1,2}[\/-]\d{2,4})/);
                        if (!dateMatch) { errCount++; continue; }
                        
                        const dateStr = dateMatch[1];
                        const dateIndex = line.indexOf(dateStr);
                        
                        // 2. Find Biometric ID (the first number in the string)
                        const idMatch = line.match(/^(\d+)/);
                        if (!idMatch) { errCount++; continue; }
                        const rawId = idMatch[1];
                        
                        // 3. Find Name (It sits between the ID and the Date)
                        const idEnd = idMatch[0].length;
                        let rawName = line.substring(idEnd, dateIndex).trim();
                        // Strip out extra columns if there are random tabs or massive spaces
                        rawName = rawName.split(/\t| {2,}/)[0].trim();
                        if (!rawName) rawName = 'Unknown Staff';
                        
                        // 4. Find Time (It sits after the Date)
                        const afterDate = line.substring(dateIndex + dateStr.length).trim();
                        const timeMatch = afterDate.match(/(\d{1,2}:\d{2}(?::\d{2})?(?:\s*[AP]M)?)/i);
                        let timeRaw = timeMatch ? timeMatch[1] : '08:00';
                        
                        // 5. Standardize Date to YYYY-MM-DD for Database
                        let [m, d, y] = dateStr.split(/[\/-]/);
                        if (y.length === 2) y = '20' + y;
                        const isoDate = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;

                        // Prevent Duplicates: Create a unique ID using employee ID and Date
                        const uniqueRecordId = `${rawId}_${isoDate}`;
                        const recordRef = doc(db, 'artifacts', appId, 'users', user.uid, 'attendance', uniqueRecordId);

                        await setDoc(recordRef, {
                            empId: rawId, 
                            empName: rawName, 
                            date: isoDate, 
                            firstIn: timeRaw, 
                            dayEquivalent: 1, 
                            remarks: 'Normalized'
                        }, { merge: true }); // merge true so it overwrites safely instead of duplicating
                        
                        count++;
                    }
                    setRawInput('');
                    alert(`Success: Processed ${count} records.\n(Existing records for the same day were updated to prevent duplicates).\nSkipped: ${errCount} lines.`);
                } catch (err) {

                                               className={`w-full border p-3 rounded-2xl bg-slate-50 font-bold focus:ring-4 focus:ring-blue-500/10 outline-none ${isEditing ? 'opacity-50 cursor-not-allowed' : ''}`} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">First Name</label>
                                            <input type="text" required value={newEmpForm.firstName} onChange={e => setNewEmpForm({...newEmpForm, firstName: e.target.value})} 
                                                   className="w-full border p-3 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Last Name</label>
                                            <input type="text" required value={newEmpForm.lastName} onChange={e => setNewEmpForm({...newEmpForm, lastName: e.target.value})} 
                                                   className="w-full border p-3 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Role</label>
                                            <input type="text" value={newEmpForm.position} onChange={e => setNewEmpForm({...newEmpForm, position: e.target.value})} 
                                                   className="w-full border p-3 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Daily Rate (₱)</label>
                                            <input type="number" required value={newEmpForm.dailyRate} onChange={e => setNewEmpForm({...newEmpForm, dailyRate: e.target.value})} 
                                                   className="w-full border p-3 rounded-2xl font-black focus:ring-4 focus:ring-blue-500/10 outline-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Contact Number</label>
                                            <input type="text" value={newEmpForm.contactNumber} onChange={e => setNewEmpForm({...newEmpForm, contactNumber: e.target.value})} 
                                                   className="w-full border p-3 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Status</label>
                                            <select value={newEmpForm.status} onChange={e => setNewEmpForm({...newEmpForm, status: e.target.value})} 
                                                    className="w-full border p-3 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold">
                                                <option value="active">Active</option>
                                                <option value="inactive">Inactive</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">SSS Number</label>
                                            <input type="text" value={newEmpForm.sssNumber} onChange={e => setNewEmpForm({...newEmpForm, sssNumber: e.target.value})} 
                                                   className="w-full border p-3 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">SSS Deduction (₱)</label>
                                            <input type="number" value={newEmpForm.sssRate} onChange={e => setNewEmpForm({...newEmpForm, sssRate: e.target.value})} 
                                                   className="w-full border p-3 rounded-2xl font-black focus:ring-4 focus:ring-blue-500/10 outline-none" />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black uppercase tracking-widest mt-4">
                                        {isEditing ? 'Update Profile' : 'Save to Cloud'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* LEDGER PROFILE MODAL */}
                    {viewProfile && isAdmin && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                                <div className="bg-blue-900 text-white p-6 flex justify-between items-center shrink-0"><h2 className="text-xl font-black uppercase tracking-widest flex items-center gap-3"><Users className="w-6 h-6"/> Staff Cloud Ledger</h2><button onClick={() => setViewProfile(null)} className="p-2 hover:bg-white/10 rounded-xl transition-colors"><X/></button></div>
                                <div className="overflow-y-auto p-8 flex-1 space-y-8 custom-scrollbar">
                                    <div className="flex justify-between border-b border-slate-100 pb-6 items-start">
                                        <div>
                                            <h3 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">{viewProfile.name}</h3>
                                            <p className="text-xs text-slate-400 uppercase font-black tracking-widest mt-3">{viewProfile.position || 'Restaurant Staff'} (ID: {viewProfile.id})</p>
                                            <div className="flex gap-2 mt-3 flex-wrap">
                                                {viewProfile.contactNumber && <span className="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-[10px] font-black tracking-widest uppercase">📞 {viewProfile.contactNumber}</span>}
                                                {viewProfile.sssNumber && <span className="px-3 py-1 bg-blue-50 text-blue-700 rounded-lg text-[10px] font-black tracking-widest uppercase">SSS: {viewProfile.sssNumber} (₱{formatMoney(viewProfile.sssRate)})</span>}
                                            </div>
                                            <button onClick={handleEditClick} className="mt-4 bg-slate-100 hover:bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-2"><Edit className="w-3.5 h-3.5"/> Edit Profile</button>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <span className={`px-4 py-1.5 text-[10px] font-black rounded-full uppercase border shadow-sm ${viewProfile.status === 'inactive' ? 'bg-slate-100 text-slate-500 border-slate-200' : 'bg-emerald-100 text-emerald-800 border-emerald-200'}`}>{viewProfile.status || 'ACTIVE'}</span>
                                            <p className="mt-4 font-black text-blue-600 font-mono text-xl tracking-tighter uppercase">₱{formatMoney(viewProfile.rate)}/DAY</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6 text-center">
                                        <div className="bg-rose-50 p-6 rounded-3xl border border-rose-100 shadow-sm"><p className="text-[10px] font-black text-rose-800 opacity-50 uppercase tracking-widest mb-2">Total C.A. Due</p><p className="text-4xl font-black text-rose-600 font-mono tracking-tighter">₱{formatMoney(viewProfile.caBalance)}</p></div>
                                        <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100 shadow-sm"><p className="text-[10px] font-black text-blue-800 opacity-50 uppercase tracking-widest mb-2">Attendance Count</p><p className="text-4xl font-black text-blue-600 font-mono tracking-tighter">{attendance.filter(a => a.empId.toString() === viewProfile.id.toString()).length}</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-6 py-4 transition-all ${active ? 'bg-blue-800 text-white border-r-8 border-blue-400' : 'text-blue-200/40 hover:bg-blue-800/50 hover:text-white'}`}>
                    <span className="shrink-0">{icon}</span>
                    {open && <span className="ml-4 text-[10px] font-black uppercase tracking-widest">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-3xl border shadow-sm flex items-center justify-between group hover:border-blue-200 transition-all">
                    <div>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{title}</p>
                        <p className="text-3xl font-black group-hover:text-blue-600 transition-colors">{value}</p>
                    </div>
                    <div className={`p-4 rounded-2xl ${color}`}>{icon}</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
