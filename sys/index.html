<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill Payroll - Smart Cloud Suite</title>
    
    <link rel="icon" type="image/png" href="/sys/icon.png">
    <link rel="apple-touch-icon" href="/sys/icon.png">

    <link rel="manifest" href="/sys/manifest.json">
    <meta name="theme-color" content="#7a2e13">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, FacebookAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "stone-grill-v1";

        window.fb = { db, auth, appId, signInWithEmailAndPassword, signOut, onAuthStateChanged, FacebookAuthProvider, signInWithPopup, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; margin: 0; padding: 0;}
            #interactive-print-section, #interactive-print-section * { visibility: visible; }
            #interactive-print-section { position: absolute; left: 0; top: 0; width: 100%; border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }

            .payroll-print-container { padding: 0 !important; border: none !important; box-shadow: none !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const normalizeId = (id) => {
            if (id === undefined || id === null) return '';
            const strId = String(id).trim();
            if (/^\d+$/.test(strId)) return parseInt(strId, 10).toString();
            return strId.toLowerCase();
        };

        const Icon = ({ d, className = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}
                {children}
            </svg>
        );
        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Banknote = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></Icon>;
        const CalendarDays = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;
        const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
        const Unlock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
        const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
        const Edit = (p) => <Icon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;
        const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;

        function LoginScreen() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError(false); setLoading(true);
                try {
                    const { auth, signInWithEmailAndPassword } = window.fb;
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) { setError(true); setLoading(false); }
            };

            const handleFacebookLogin = async () => {
                setError(false); setLoading(true);
                try {
                    const { auth, FacebookAuthProvider, signInWithPopup } = window.fb;
                    const provider = new FacebookAuthProvider();
                    await signInWithPopup(auth, provider);
                } catch (err) { setError(true); setLoading(false); }
            };

            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50 font-sans overflow-y-auto">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up my-auto">
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700"><Lock /></div>
                        <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-widest text-center">System Login</h2>
                        <p className="text-xs text-slate-400 mb-8 text-center font-bold">Connect to Cloud Database</p>
                        <form onSubmit={handleLogin} className="w-full space-y-4 mb-6">
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Email Address</label><input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Password</label><input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full border p-3 rounded-2xl bg-slate-50 focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-800"/></div>
                            {error && <p className="text-red-500 text-xs font-bold uppercase tracking-wider text-center animate-pulse pt-2">Authentication Failed</p>}
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white h-14 rounded-2xl font-black uppercase tracking-widest transition-colors shadow-lg disabled:opacity-50 mt-2">{loading ? 'Connecting...' : 'Secure Login'}</button>
                        </form>
                        <div className="flex items-center w-full mb-6"><hr className="flex-1 border-slate-200" /><span className="px-3 text-[10px] text-slate-400 font-black uppercase tracking-widest">OR</span><hr className="flex-1 border-slate-200" /></div>
                        <button type="button" onClick={handleFacebookLogin} disabled={loading} className="w-full bg-[#1877F2] hover:bg-[#166FE5] text-white h-14 rounded-2xl font-black uppercase tracking-widest transition-colors shadow-lg disabled:opacity-50 flex items-center justify-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook Login
                        </button>
                    </div>
                </div>
            );
        }

        function AdminPinModal({ onUnlock, onClose }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            const allowedPins = { '2558': 'Admin', '1234': 'User' };

            const handlePress = (num) => {
                if (pin.length < 4 && !error) {
                    const next = pin + num; setPin(next);
                    if (next.length === 4) {
                        if (allowedPins[next]) onUnlock(allowedPins[next]); 
                        else { setError(true); setTimeout(() => { setPin(''); setError(false); }, 700); }
                    }
                }
            };

            return (
                <div className="fixed inset-0 bg-blue-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 font-sans animate-in fade-in duration-200">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up relative">
                        <button onClick={onClose} className="absolute top-6 right-6 text-gray-400 hover:text-gray-800"><X /></button>
                        <div className="bg-blue-100 p-4 rounded-full mb-6 text-blue-700"><Unlock /></div>
                        <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-widest">System Unlock</h2>
                        <p className="text-[10px] text-slate-400 mb-8 font-black uppercase tracking-widest text-center">Enter PIN to access extended features</p>
                        <div className={`flex space-x-6 mb-12 ${error ? 'animate-bounce text-red-500' : ''}`}>
                            {[...Array(4)].map((_, i) => <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all duration-300 ${pin.length > i ? 'bg-blue-600 border-blue-600' : 'bg-transparent border-gray-300'}`} />)}
                        </div>
                        <div className="grid grid-cols-3 gap-6 w-full">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9, '', 0, 'del'].map((num, i) => (
                                num === 'del' ? <button key={i} onClick={() => setPin(pin.slice(0, -1))} className="h-14 rounded-2xl bg-gray-50 flex items-center justify-center text-red-400 font-bold uppercase text-[10px] hover:bg-red-50 transition-colors">del</button>
                                : num === '' ? <div key={i} /> 
                                : <button key={i} onClick={() => handlePress(num.toString())} className="h-14 rounded-2xl bg-gray-50 text-2xl font-black text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">{num}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-6 py-3.5 transition-all duration-300 ${active ? 'bg-[#386df2] text-white border-l-4 border-white shadow-lg' : 'text-blue-200 hover:bg-blue-800/50 hover:text-white border-l-4 border-transparent'}`}>
                    <span className="shrink-0">{icon}</span>{open && <span className="ml-4 text-[11px] font-black uppercase tracking-widest whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl flex items-center gap-6 animate-slide-up hover:shadow-2xl transition-all transform hover:-translate-y-1">
                    <div className={`p-4 rounded-2xl ${color}`}>{icon}</div>
                    <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{title}</p><p className="text-3xl font-black text-slate-800 tracking-tighter">{value}</p></div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const [isRestoring, setIsRestoring] = useState(false);
            const [userRole, setUserRole] = useState('Staff'); 
            const [showAdminPin, setShowAdminPin] = useState(false);
            const [currentAdminName, setCurrentAdminName] = useState(''); 

            const isAdmin = userRole === 'Admin';
            const isPrivileged = userRole === 'Admin' || userRole === 'User';

            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 1024);

            const [employees, setEmployees] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState([]);
            const [interactivePayrolls, setInteractivePayrolls] = useState([]);
            const [auditLogs, setAuditLogs] = useState([]);

            const monthOptions = useMemo(() => {
                const options = []; const d = new Date();
                for (let i = 0; i < 12; i++) {
                    options.push({ value: d.toISOString().slice(0, 7), label: d.toLocaleString('default', { month: 'long', year: 'numeric' }) });
                    d.setMonth(d.getMonth() - 1);
                }
                return options;
            }, []);

            const [selectedMonth, setSelectedMonth] = useState(() => new Date().toISOString().slice(0, 7));
            const [showAddEmp, setShowAddEmp] = useState(false);
            const [rawInput, setRawInput] = useState('');
            
            const [caType, setCaType] = useState('advance');
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });
            const [viewProfile, setViewProfile] = useState(null);
            
            const defaultDate = new Date();
            const [reportDates, setReportDates] = useState({ 
                start: new Date(defaultDate.getFullYear(), defaultDate.getMonth(), 1).toISOString().slice(0, 10), 
                end: new Date(defaultDate.getFullYear(), defaultDate.getMonth() + 1, 0).toISOString().slice(0, 10) 
            });
            
            const [icEmpId, setIcEmpId] = useState('');
            const [icDateStart, setIcDateStart] = useState(() => new Date(defaultDate.getFullYear(), defaultDate.getMonth(), 1).toISOString().slice(0, 10));
            const [icDateEnd, setIcDateEnd] = useState(() => new Date(defaultDate.getFullYear(), defaultDate.getMonth() + 1, 0).toISOString().slice(0, 10));
            const [icForm, setIcForm] = useState({ days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0 });

            const [dashSearchEmpId, setDashSearchEmpId] = useState('');
            const [dashSearchStart, setDashSearchStart] = useState(reportDates.start);
            const [dashSearchEnd, setDashSearchEnd] = useState(reportDates.end);
            const [newEmpForm, setNewEmpForm] = useState({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', contactNumber: '', sssNumber: '', sssRate: '', miscRate: '', status: 'active' });
            const [isEditing, setIsEditing] = useState(false);

            const switchTab = (tab) => { setActiveTab(tab); if (window.innerWidth < 1024) setSidebarOpen(false); };

            useEffect(() => {
                let isMounted = true;
                const checkFb = setInterval(() => {
                    if (window.fb && window.fb.auth && isMounted) {
                        clearInterval(checkFb);
                        window.fb.onAuthStateChanged(window.fb.auth, (u) => {
                            if(isMounted) { setUser(u); setIsReady(true); if(!u) { setUserRole('Staff'); setCurrentAdminName(''); } }
                        });
                    }
                }, 100);
                return () => { isMounted = false; clearInterval(checkFb); };
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, onSnapshot, collection } = window.fb;
                const userPath = (name) => collection(db, 'artifacts', appId, 'users', user.uid, name);

                const unsubEmps = onSnapshot(userPath('employees'), (snap) => {
                    setEmployees(snap.docs.map(d => {
                        const data = d.data();
                        return { id: d.id, name: data.name || `${data.firstName || ''} ${data.lastName || ''}`.trim() || d.id, firstName: data.firstName || '', lastName: data.lastName || '', position: data.position || '', rate: data.dailyRate || 0, contactNumber: data.contactNumber || '', sssNumber: data.sssNumber || '', sssRate: data.sssRate || 0, miscRate: data.miscRate || 0, status: data.status || 'active', caBalance: data.caBalance || 0 };
                    }).sort((a,b)=> (a.name || '').localeCompare(b.name || '')));
                });
                const unsubAtt = onSnapshot(userPath('attendance'), (snap) => setAttendance(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubCA = onSnapshot(userPath('cash_advances'), (snap) => setCashAdvances(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubIP = onSnapshot(userPath('payroll_entries'), (snap) => setInteractivePayrolls(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubLogs = onSnapshot(userPath('audit_logs'), (snap) => setAuditLogs(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                return () => { unsubEmps(); unsubAtt(); unsubCA(); unsubIP(); unsubLogs(); };
            }, [user]);

            // --- REWRITTEN SUMMARY MATH (No Aggressive Lifetime Deductions) ---
            const payrollSummary = useMemo(() => {
                return employees.map(emp => {
                    const empAtt = attendance.filter(a => normalizeId(a.empId) === normalizeId(emp.id) && (a.date || '').startsWith(selectedMonth));
                    const uniqueDates = new Set(empAtt.map(a => a.date));
                    let days = 0;
                    uniqueDates.forEach(date => {
                        const dayRecords = empAtt.filter(a => a.date === date);
                        const maxDay = Math.max(...dayRecords.map(r => parseFloat(r.dayEquivalent) || 0));
                        days += Math.min(maxDay, 1);
                    });

                    // ONLY calculate cash advances made this specific month
                    const empCAsThisMonth = cashAdvances.filter(ca => 
                        normalizeId(ca.empId) === normalizeId(emp.id) && 
                        (ca.date || '').startsWith(selectedMonth)
                    );
                    const monthlyCA = empCAsThisMonth.reduce((sum, ca) => sum + (parseFloat(ca.amount) || 0), 0);

                    const gross = days * (parseFloat(emp.rate) || 0);
                    const sss = parseFloat(emp.sssRate) || 0;
                    const misc = parseFloat(emp.miscRate) || 0;
                    const caBalance = parseFloat(emp.caBalance) || 0; // Lifetime Debt
                    
                    // Net Salary only subtracts THIS MONTH's CA and fixed deductions.
                    const net = gross - monthlyCA - sss - misc;
                    
                    return { ...emp, days, gross, sss, misc, net, caBalance, monthlyCA };
                });

                                                                <td className="p-3 font-mono text-slate-500">{ca.date}</td>
                                                                <td className="p-3 font-black uppercase tracking-widest text-[9px] text-slate-600">{ca.type === 'payment' ? 'Payment' : 'Advance'}</td>
                                                                <td className="p-3 text-slate-500 italic max-w-[120px] truncate">{ca.reason || '--'}</td>
                                                                <td className={`p-3 text-right font-black font-mono ${ca.amount < 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                                    {ca.amount < 0 ? '-' : '+'}₱{formatMoney(Math.abs(ca.amount || 0))}
                                                                </td>
                                                                {isAdmin && (
                                                                    <td className="p-3 text-center">
                                                                        <button onClick={() => handleDeleteCA(ca.id, ca.empId, ca.amount)} className="p-1.5 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors"><X className="w-3 h-3"/></button>
                                                                    </td>
                                                                )}
                                                            </tr>
                                                        ))}
                                                    {cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(viewProfile.id)).length === 0 && (
                                                        <tr><td colSpan={isAdmin ? "5" : "4"} className="p-6 text-center text-slate-400 italic">No transactions on record. To sync this with the ₱{formatMoney(viewProfile.caBalance)} balance, please add a manual entry in the Cash Advance tab.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        );
                    })()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
