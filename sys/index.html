<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stone Grill Payroll - Smart Cloud Suite</title>
    
    <link rel="icon" type="image/png" href="/sys/icon.png">
    <link rel="apple-touch-icon" href="/sys/icon.png">
    <link rel="manifest" href="/sys/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "stone-grill-v1";

        window.fb = { db, auth, appId, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, signInWithEmailAndPassword, signOut, onAuthStateChanged, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #interactive-print-section, #interactive-print-section * { visibility: visible; }
            #interactive-print-section { position: absolute; left: 0; top: 0; width: 100%; border: none !important; margin: 0 !important; padding: 0 !important; }
            
            .pos-receipt-active #print-section { visibility: hidden; display: none !important; }
            #pos-receipt-print, #pos-receipt-print * { visibility: visible; }
            #pos-receipt-print { position: absolute; left: 0; top: 0; width: 58mm !important; margin: 0; padding: 0; font-family: monospace; color: black; display: block !important; }
            
            .print-hidden { display: none !important; }
            .payroll-print-container { padding: 0 !important; border: none !important; box-shadow: none !important; }
        }
        #pos-receipt-print { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const normalizeId = (id) => {
            if (!id) return '';
            const strId = String(id).trim();
            return /^\d+$/.test(strId) ? parseInt(strId, 10).toString() : strId.toLowerCase();
        };

        const cleanDate = (dStr) => {
            if (!dStr) return '';
            let s = String(dStr).trim().substring(0, 10);
            if (s.includes('/')) {
                const parts = s.split('/');
                if (parts.length === 3 && parts[2].length === 4) {
                    return `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
                }
            }
            return s;
        };

        const getMonthKey = (date) => {
            if (!date) return '';
            const parsed = new Date(date);
            if (Number.isNaN(parsed.getTime())) return '';
            return parsed.toISOString().slice(0, 7);
        };

        const formatMoney = (v) => {
            const num = Number(v || 0); if (isNaN(num)) return "0";
            return Math.abs(num).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        };

        const calculateHoursWorked = (start, end) => {
            if (!start || !end || end === '00:00') return 0;
            const [h1, m1] = start.split(':').map(Number);
            const [h2, m2] = end.split(':').map(Number);
            let diffMinutes = (h2 * 60 + m2) - (h1 * 60 + m1);
            if (diffMinutes < 0) diffMinutes += 1440; 
            return diffMinutes / 60;
        };

        const Icon = ({ d, className = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}{children}
            </svg>
        );
        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Banknote = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></Icon>;
        const CalendarDays = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></Icon>;
        const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        
        const UserIcon = (p) => <Icon {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
        const HistoryIcon = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
        const DollarSign = (p) => <Icon {...p}><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;

        // --- DIGITAL PAYSLIP WIDGET COMPONENT ---
        function PayslipWidget({ emp, selectedMonth, monthOptions, setSelectedMonth, cashAdvances, interactivePayrolls, onClose, onEdit, onDelete }) {
            const [activeTab, setActiveTab] = useState('payslip');
            const monthLabel = monthOptions.find(m => m.value === selectedMonth)?.label || selectedMonth;
            const basicPay = emp.days * (parseFloat(emp.dailyRate || emp.rate) || 0);
            
            const savedPayroll = interactivePayrolls.find(p => normalizeId(p.empId) === normalizeId(emp.id) && (p.month === selectedMonth || getMonthKey(p.startDate) === selectedMonth));
            const bonusAmount = emp.bonusAmount || 0;

            const earnings = [
                { id: 1, label: `Basic Pay (${emp.days} Days)`, amount: basicPay },
                { id: 2, label: "Bonus / Incentives", amount: bonusAmount }
            ];

            const deductions = [
                ...(emp.monthlyCA > 0 ? [{ id: 1, label: "C.A. Deduction", amount: emp.monthlyCA }] : []),
                ...((parseFloat(emp.sssRate) || 0) > 0 ? [{ id: 2, label: "SSS Contribution", amount: parseFloat(emp.sssRate) }] : []),
                ...((parseFloat(emp.miscRate) || 0) > 0 ? [{ id: 3, label: "Misc / Uniform", amount: parseFloat(emp.miscRate) }] : [])
            ];

            const totalEarnings = earnings.reduce((sum, item) => sum + item.amount, 0);
            const totalDeductions = deductions.reduce((sum, item) => sum + item.amount, 0);
            const netPay = totalEarnings - totalDeductions;

            const ledger = cashAdvances
                .filter(ca => normalizeId(ca.empId) === normalizeId(emp.id))
                .sort((a,b)=>(b.date||'').localeCompare(a.date||''))
                .map((ca, idx) => ({
                    id: ca.id || idx,
                    date: ca.date,
                    type: ca.amount < 0 ? "C.A. Payment" : "Cash Advance",
                    amount: ca.amount,
                    status: "Logged",
                    note: ca.reason || ''
                }));

            if (bonusAmount > 0 && savedPayroll) {
                ledger.push({
                    id: 'bonus-' + savedPayroll.recordKey,
                    date: savedPayroll.endDate || selectedMonth,
                    type: "Incentive Credited",
                    amount: Math.abs(bonusAmount), 
                    status: "Processed",
                    note: "Archived Payroll Bonus",
                    isBonus: true
                });
                ledger.sort((a,b) => b.date.localeCompare(a.date));
            }

            return (
                <div className="w-full max-w-lg mx-auto bg-gray-50 flex flex-col relative shadow-2xl overflow-hidden rounded-[2.5rem] border border-gray-200 animate-slide-up">
                    <div className="bg-[#1b3382] text-white px-6 pt-10 pb-6 rounded-b-[2rem] shadow-md z-10 relative shrink-0">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-3">
                                <UserIcon className="w-6 h-6 text-white/80" />
                                <h1 className="text-lg font-bold tracking-widest uppercase mt-1">Payslip Details</h1>
                            </div>
                            {onClose && (
                                <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full transition-colors">
                                    <X className="w-6 h-6" />
                                </button>
                            )}
                        </div>
                        <div className="flex justify-between items-end gap-2">
                            <div className="flex-1">
                                <h2 className="text-2xl font-black tracking-wide leading-tight truncate">{emp.name}</h2>
                                <p className="text-blue-200 text-xs font-medium tracking-wider uppercase mt-1">{emp.position} • {emp.id}</p>
                            </div>
                            <select 
                                className="bg-white/10 border border-white/20 text-white rounded-xl px-3 py-2 text-xs outline-none font-bold backdrop-blur-sm shadow-sm"
                                value={selectedMonth}
                                onChange={e => setSelectedMonth(e.target.value)}
                            >
                                {monthOptions.map(opt => <option className="text-slate-800" key={opt.value} value={opt.value}>{opt.label}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="flex px-6 pt-4 pb-2 gap-4 shrink-0 bg-gray-50 z-0">
                        <button onClick={() => setActiveTab('payslip')} className={`flex-1 py-3 text-xs font-bold tracking-widest uppercase rounded-2xl flex items-center justify-center gap-2 transition-all ${activeTab === 'payslip' ? 'bg-white shadow-md text-[#1b3382] border border-gray-100' : 'text-gray-400 hover:bg-gray-200'}`}><FileText className="w-4 h-4" /> Breakdown</button>
                        <button onClick={() => setActiveTab('transactions')} className={`flex-1 py-3 text-xs font-bold tracking-widest uppercase rounded-2xl flex items-center justify-center gap-2 transition-all ${activeTab === 'transactions' ? 'bg-white shadow-md text-[#1b3382] border border-gray-100' : 'text-gray-400 hover:bg-gray-200'}`}><HistoryIcon className="w-4 h-4" /> Ledger</button>
                    </div>

                    <div className="flex-1 overflow-y-auto px-6 pb-8 space-y-6 custom-scrollbar max-h-[60vh]">
                        {activeTab === 'payslip' ? (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300 mt-2">
                                <div className="bg-white p-5 rounded-[1.5rem] shadow-sm border border-gray-100 flex justify-between items-center">
                                    <div><p className="text-[10px] font-bold text-gray-400 tracking-wider uppercase mb-1">Pay Period</p><p className="text-xs font-bold text-gray-800 uppercase">{monthLabel}</p></div>
                                    <div className="text-right"><p className="text-[10px] font-bold text-gray-400 tracking-wider uppercase mb-1">Rate / Day</p><p className="text-xs font-bold text-gray-800">₱{formatMoney(emp.dailyRate || emp.rate)}</p></div>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                    <h3 className="text-xs font-black text-gray-400 tracking-[0.2em] uppercase mb-4 text-center">Gross Earnings</h3>
                                    <div className="space-y-3 mb-4">
                                        {earnings.map(item => <div key={item.id} className="flex justify-between items-center text-sm"><span className="text-gray-600 font-medium">{item.label}</span><span className="font-bold text-gray-800">₱{formatMoney(item.amount)}</span></div>)}
                                    </div>
                                    <div className="pt-4 border-t border-dashed border-gray-200 flex justify-between items-center"><span className="text-xs font-black tracking-wider text-gray-800 uppercase">Total Gross</span><span className="text-lg font-black text-[#2563eb]">₱{formatMoney(totalEarnings)}</span></div>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                    <h3 className="text-xs font-black text-gray-400 tracking-[0.2em] uppercase mb-4 text-center">Deductions</h3>
                                    <div className="space-y-3 mb-4">
                                        {deductions.map(item => <div key={item.id} className="flex justify-between items-center text-sm"><span className="text-gray-600 font-medium">{item.label}</span><span className="font-bold text-red-500">- ₱{formatMoney(item.amount)}</span></div>)}
                                        {deductions.length === 0 && <p className="text-xs text-center text-gray-400 italic">No deductions this period.</p>}
                                    </div>
                                    <div className="pt-4 border-t border-dashed border-gray-200 flex justify-between items-center"><span className="text-xs font-black tracking-wider text-gray-800 uppercase">Total Deductions</span><span className="text-lg font-black text-red-500">- ₱{formatMoney(totalDeductions)}</span></div>
                                </div>
                                
                                {/* ENHANCED NET PAY DISPLAY WITH ARCHIVE DATA */}
                                <div className="p-6 text-center transform hover:scale-[1.02] transition-transform relative">
                                    {savedPayroll && <span className="absolute top-0 right-4 text-[9px] font-black uppercase tracking-widest text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-200 shadow-sm">Archived</span>}
                                    <p className="text-[10px] font-bold text-gray-400 tracking-[0.15em] uppercase mb-2">Net Salary (Take Home)</p>
                                    <p className={`text-4xl font-bold tracking-tight ${netPay < 0 ? 'text-red-500' : 'text-gray-800'}`}>{netPay < 0 ? '-' : ''}₱{formatMoney(Math.abs(netPay))}</p>
                                    
                                    {savedPayroll && (
                                        <div className="mt-6 pt-4 border-t border-dashed border-gray-200 flex justify-center gap-8 text-xs font-bold text-gray-500">
                                            <span className="flex flex-col items-center">
                                                <span className="text-[9px] font-black uppercase tracking-widest text-gray-400 mb-1">Disbursed</span>
                                                <span className="text-emerald-600 text-base font-black font-mono">₱{formatMoney(parseFloat(savedPayroll.data?.salary_pay)||0)}</span>
                                            </span>
                                            <span className="flex flex-col items-center">
                                                <span className="text-[9px] font-black uppercase tracking-widest text-gray-400 mb-1">Carryover</span>
                                                <span className={`${parseFloat(savedPayroll.data?.carryover) < 0 ? 'text-red-500' : 'text-blue-600'} text-base font-black font-mono`}>{parseFloat(savedPayroll.data?.carryover) < 0 ? '-' : ''}₱{formatMoney(Math.abs(parseFloat(savedPayroll.data?.carryover)||0))}</span>
                                            </span>
                                        </div>
                                    )}
                                </div>

                                <div className="p-6 border-t border-gray-200 text-center">
                                    <p className="text-[10px] font-normal text-gray-500 tracking-[0.15em] uppercase mb-2">Lifetime Balance</p>
                                    <p className={`text-3xl font-normal tracking-tight ${emp.caBalance < 0 ? 'text-red-500' : 'text-gray-700'}`}>{emp.caBalance < 0 ? '-' : ''}₱{formatMoney(Math.abs(emp.caBalance))}</p>
                                </div>
                                {(onEdit || onDelete) && (
                                    <div className="flex gap-3 mt-4 print-hidden">
                                        {onEdit && <button onClick={() => onEdit(emp)} className="flex-1 py-3 bg-white border border-blue-200 text-blue-600 rounded-xl font-bold text-xs tracking-wider uppercase hover:bg-blue-50 transition-colors shadow-sm">Edit Profile</button>}
                                        {onDelete && <button onClick={() => onDelete(emp.id, emp.name)} className="flex-1 py-3 bg-white border border-rose-200 text-rose-600 rounded-xl font-bold text-xs tracking-wider uppercase hover:bg-rose-50 transition-colors shadow-sm">Delete</button>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-300 mt-2">
                                <div className="flex justify-between items-center mb-6 px-2"><h3 className="text-[10px] font-black text-gray-400 tracking-[0.2em] uppercase">Cloud Ledger</h3><span className="text-[#1b3382] text-[10px] font-bold flex items-center bg-blue-100 px-3 py-1 rounded-full">{ledger.length} Records</span></div>
                                {ledger.map(tx => (
                                    <div key={tx.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border border-gray-100 flex items-center gap-4">
                                        <div className={`p-3 rounded-xl shrink-0 ${tx.amount < 0 || tx.isBonus ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}><DollarSign className="w-5 h-5" /></div>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold text-gray-800 text-sm truncate">{tx.type}</p>
                                            <div className="flex flex-col mt-1"><p className="text-[10px] text-gray-400 font-medium">{new Date(tx.date).toLocaleDateString()} • {tx.status}</p>{tx.note && <p className="text-[10px] text-gray-500 italic truncate mt-0.5">"{tx.note}"</p>}</div>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <p className={`font-black tracking-wide text-sm ${tx.amount < 0 || tx.isBonus ? 'text-emerald-600' : 'text-red-500'}`}>{(tx.amount < 0 || tx.isBonus) ? '+' : '-'}₱{formatMoney(Math.abs(tx.amount))}</p>
                                            {onDelete && <div className="mt-2"><button type="button" onClick={() => { if (!window.confirm('Delete this ledger entry?')) return; onDelete(tx); }} className="text-[10px] text-rose-500 hover:text-rose-700">Delete</button></div>}
                                        </div>
                                    </div>
                                ))}
                                {ledger.length === 0 && <div className="text-center py-10 bg-white rounded-3xl border border-dashed border-gray-200"><HistoryIcon className="w-10 h-10 mx-auto text-gray-300 mb-2" /><p className="text-xs text-gray-400 font-bold uppercase tracking-widest">No Transactions Found</p></div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-6 py-3.5 transition-all duration-300 ${active ? 'bg-[#386df2] text-white border-l-4 border-white shadow-lg' : 'text-blue-200 hover:bg-blue-800/50 hover:text-white border-l-4 border-transparent'}`}>
                    <span className="shrink-0">{icon}</span>{open && <span className="ml-4 text-[11px] font-black uppercase tracking-widest whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl flex items-center gap-6 animate-slide-up hover:shadow-2xl transition-all">
                    <div className={`p-4 rounded-2xl ${color}`}>{icon}</div>
                    <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{title}</p><p className="text-3xl font-black text-slate-800 tracking-tighter">{value}</p></div>
                </div>
            );
        }

        function LoginScreen() {
            const [loading, setLoading] = useState(false);
            const [showEmailLogin, setShowEmailLogin] = useState(false);
            const [emailInput, setEmailInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');

            const handleGoogleLogin = async () => { setLoading(true); try { await window.fb.signInWithPopup(window.fb.auth, new window.fb.GoogleAuthProvider()); } catch (err) { alert("Error: " + err.message); setLoading(false); } };
            const handleFacebookLogin = async () => { setLoading(true); const p = new window.fb.FacebookAuthProvider(); p.addScope('email'); try { await window.fb.signInWithPopup(window.fb.auth, p); } catch (err) { alert("Error: " + err.message); setLoading(false); } };
            const handleEmailSubmit = async (e) => { e.preventDefault(); setLoading(true); try { await window.fb.signInWithEmailAndPassword(window.fb.auth, emailInput, passwordInput); } catch (err) { alert("Login failed."); setLoading(false); } };

            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up">

                    const lifetimeBonuses = interactivePayrolls
                        .filter(p => normalizeId(p.empId) === normalizeId(emp.id))

                    return { ...emp, days, gross, net, monthlyCA, caBalance: lifetimeCaBalance, bonusAmount };

                    const rCA = cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(emp.id) && getMonthKey(ca.date) === dashSearchMonth).reduce((s,c)=>s+Math.abs(parseFloat(c.amount)||0), 0);

                        const rangeCA = cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(icEmpId) && getMonthKey(ca.date) === icMonth).reduce((s,c)=>s+Math.abs(parseFloat(c.amount)||0), 0);
                        const saved = interactivePayrolls.find(p => normalizeId(p.empId) === normalizeId(icEmpId) && (p.month === icMonth || getMonthKey(p.startDate) === icMonth));
                        const prevMonth = (() => { const [y,m] = icMonth.split('-').map(Number); const d = new Date(y, m - 1, 1); d.setMonth(d.getMonth() - 1); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; })();
                        const prevSaved = interactivePayrolls.find(p => normalizeId(p.empId) === normalizeId(icEmpId) && (p.month === prevMonth || getMonthKey(p.startDate) === prevMonth));

                        const baseForm = saved ? ({ ...saved.data, salary_pay: parseFloat(saved.data?.salary_pay) || 0, carryover, days_worked: calcDays, cash_advance: rangeCA }) : { days_worked: calcDays, bonus: bonus, deduction: 0, deduction_description: '', salary_pay: 0, sss: parseFloat(emp.sssRate) || 0, misc_deductions: parseFloat(emp.miscRate) || 0, cash_advance: rangeCA, carryover };
                        setIcForm(baseForm); setIcLedgerEntries(saved ? (saved.data?.ledger || []) : []);
                    }
                }
            }, [icEmpId, icMonth, employees, attendance, cashAdvances, interactivePayrolls]);

            const handleStaffSubmitCARequest = async (e) => {

            const handleProcessLogs = async () => {
                if (!isAdmin || !rawInput.trim()) return;
                const lines = rawInput.trim().split('\n'); let count = 0; const map = {};
                for (const line of lines) {
                    const cols = line.split(/\t+| {2,}/).filter(Boolean); if (cols.length < 3) continue;
                    const id = normalizeId(cols[0]); const name = cols[1];
                    const dM = line.match(/(\d{1,4}[\/\-]\d{1,2}[\/\-]\d{1,4})/); 
                    const tM = line.match(/(\d{1,2}:\d{2}(:\d{2})?)/);
                    if (!dM || !tM) continue;
                    let iso = ''; const dStr = dM[1];
                    if (dStr.includes('/')) {
                        const parts = dStr.split('/');
                        if (parts[2].length === 4) { iso = `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`; }
                        else if (parts[0].length === 4) { iso = `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`; }
                    } else if (dStr.includes('-')) {
                        const parts = dStr.split('-');
                        if (parts[0].length === 4) { iso = `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`; }
                        else if (parts[2].length === 4) { iso = `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`; }
                    }
                    if (!iso) continue;
                    const timeStr = tM[1].substring(0,5);
                    const key = `${id}_${iso}`; 
                    if (!map[key]) map[key] = { id, name, date: iso, p: [] };
                    map[key].p.push(timeStr);
                }
                for (const k in map) {
                    const r = map[k]; const s = r.p.sort();

            const handleExportBackup = () => {

            };

            const handleImportBackup = (event) => {
                const file = event.target.files[0]; if (!file || !user || !isAdmin) return;
                setIsRestoring(true); const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result); 
                        const restoreCollection = async (colName, items) => {
                            if (!items || !Array.isArray(items)) return;
                            for (const item of items) { const { id, ...rest } = item; if (id) await window.fb.setDoc(getVaultDoc(colName, id), rest, { merge: true }); }

                        await restoreCollection('employees', data.employees); await restoreCollection('attendance', data.attendance); await restoreCollection('cash_advances', data.cashAdvances || data.cash_advances); await restoreCollection('payroll_entries', data.interactivePayrolls); await restoreCollection('ca_requests', data.caRequests);
                        alert(`Restore Complete!`);
                    } catch (err) { alert("Restore Error: " + err.message); }
                    setIsRestoring(false);
                };
                reader.readAsText(file); event.target.value = '';

            if (!isReady) return null;

                                <div style={{ borderBottom: '1px dashed black', margin: '10px 0' }}></div>
                                <p style={{ fontSize: '10px', margin: '2px 0' }}><strong>Date:</strong> {new Date(receiptToPrint.dateApproved || receiptToPrint.dateRequested).toLocaleString()}</p>
                                <p style={{ fontSize: '10px', margin: '2px 0' }}><strong>Name:</strong> {receiptToPrint.empName.toUpperCase()}</p>
                                <div style={{ borderBottom: '1px dashed black', margin: '10px 0' }}></div>
                                <div style={{ textAlign: 'center', margin: '15px 0' }}>
                                    <p style={{ fontSize: '10px', margin: '0 0 5px 0' }}>AMOUNT APPROVED</p>
                                    <h1 style={{ fontSize: '20px', fontWeight: '900', margin: '0' }}>PHP {formatMoney(receiptToPrint.amount)}</h1>
                                </div>
                                <div style={{ borderBottom: '1px dashed black', margin: '10px 0' }}></div>
                                <p style={{ fontSize: '9px', textAlign: 'center', margin: '15px 0', textTransform: 'uppercase' }}>*** SYSTEM GENERATED ***<br/>Admin Verified & Deducted</p>
                                <div style={{ marginTop: '30px' }}><p style={{ fontSize: '10px', textAlign: 'center', borderTop: '1px solid black', paddingTop: '5px', width: '90%', margin: '0 auto' }}>Cashier Signature</p></div>
                                <div style={{ paddingBottom: '30px' }}></div>
                            </div>
                        )}
                    </main>

                    {showAddStaff && isAdmin && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-[60] flex items-center justify-center p-4">
                            <form onSubmit={handleAddStaffSubmit} className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 space-y-5 animate-in zoom-in-95">
                                <div className="flex justify-between items-center mb-2"><h3 className="font-black uppercase tracking-widest text-blue-900">{isEditing ? 'Edit Staff Profile' : 'Add Staff'}</h3><button type="button" onClick={()=>{setShowAddStaff(false); setIsEditing(false);}} className="text-slate-400"><X/></button></div>
                                
                                <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Biometric ID</label><input type="text" required value={newEmpForm.biometricId} disabled={isEditing} onChange={e=>setNewEmpForm({...newEmpForm, biometricId: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black disabled:opacity-50"/></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Registered Email (Google/Facebook/Direct)</label><input type="email" placeholder="staff@gmail.com" value={newEmpForm.staffEmail} onChange={e=>setNewEmpForm({...newEmpForm, staffEmail: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold text-blue-600"/></div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">First Name</label><input type="text" required value={newEmpForm.firstName} onChange={e=>setNewEmpForm({...newEmpForm, firstName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Last Name</label><input type="text" required value={newEmpForm.lastName} onChange={e=>setNewEmpForm({...newEmpForm, lastName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Role</label><input type="text" value={newEmpForm.position} onChange={e=>setNewEmpForm({...newEmpForm, position: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Daily Rate</label><input type="number" required value={newEmpForm.dailyRate} onChange={e=>setNewEmpForm({...newEmpForm, dailyRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black text-blue-600"/></div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Contact Number</label><input type="text" placeholder="09XX..." value={newEmpForm.contactNumber} onChange={e=>setNewEmpForm({...newEmpForm, contactNumber: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">SSS Number</label><input type="text" placeholder="XX-XXXXXXX-X" value={newEmpForm.sssNumber} onChange={e=>setNewEmpForm({...newEmpForm, sssNumber: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">SSS Ded.</label><input type="number" value={newEmpForm.sssRate} onChange={e=>setNewEmpForm({...newEmpForm, sssRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black text-rose-600"/></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Misc Ded.</label><input type="number" value={newEmpForm.miscRate} onChange={e=>setNewEmpForm({...newEmpForm, miscRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black text-rose-600"/></div>
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl mt-4">Save to Cloud</button>
                            </form>
                        </div>
                    )}

                    {/* DYNAMIC MASTERLIST POPUP FIX */}
                    {viewProfile && isAdmin && (() => {
                        const activeEmpData = payrollSummary.find(e => normalizeId(e.id) === normalizeId(viewProfile.id)) || viewProfile;
                        return (
                            <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-[50] flex items-center justify-center p-4">
                                <PayslipWidget 
                                    emp={activeEmpData} 
                                    selectedMonth={selectedMonth} 
                                    monthOptions={monthOptions} 
                                    setSelectedMonth={setSelectedMonth} 
                                    cashAdvances={cashAdvances} 
                                    interactivePayrolls={interactivePayrolls} 
                                    onClose={() => setViewProfile(null)} 
                                    onEdit={handleEditProfile} 
                                    onDelete={handleDeleteEmployee} 
                                />
                            </div>
                        );
                    })()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
