```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill Payroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-black tracking-widest uppercase">Connecting to Stone Grill App...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Config extracted from your screenshot
        const existingConfig = {
            apiKey: "AIzaSyDX60KrMdfnzml4LA8SE4PDF",
            authDomain: "stone-grill-app.firebaseapp.com",
            projectId: "stone-grill-app",
            storageBucket: "stone-grill-app.firebasestorage.app",
            messagingSenderId: "724825019953",
            appId: "1:724825019953:web:11f3a85e658",
            measurementId: "G-HL5M5HE1BC"
        };

        const firebaseConfig = (window.__firebase_config && window.__firebase_config !== "{}") ? JSON.parse(window.__firebase_config) : existingConfig;
        const appId = window.__app_id || 'stone-grill-payroll-system';
        const ADMIN_PIN = "1234";

        let state = {
            isUnlocked: false,
            isConnected: false,
            employees: {},
            attendance: [],
            selectedEmpId: "",
            dateRange: {
                start: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0],
                end: new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).toISOString().split('T')[0]
            },
            activeTab: 'summary',
            error: null
        };

        let db, auth;

        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        state.isConnected = true;
                        sync();
                    } else {
                        signInAnonymously(auth);
                    }
                    render();
                });
            } catch (e) {
                state.error = "Cloud connection failed. Please check Firestore is enabled.";
                render();
            }
        }

        function sync() {
            // Using Rule 1: /artifacts/{appId}/public/data/employees
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'employees'), (snap) => {
                if (snap.exists()) state.employees = snap.data();
                render();
            }, (err) => console.error("Firestore Error:", err));

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'attendance'), (snap) => {
                if (snap.exists()) state.attendance = snap.data().records || [];
                render();
            });
        }

        window.checkPin = () => {
            const val = document.getElementById('pinInput').value;
            if (val === ADMIN_PIN) { state.isUnlocked = true; render(); }
            else { document.getElementById('pinInput').value = ''; alert("Access Denied"); }
        };

        window.updateStaff = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = fd.get('id');
            const data = { 
                ...state.employees, 
                [id]: { 
                    name: fd.get('name'), 
                    rate: parseFloat(fd.get('rate')), 
                    deduct: parseFloat(fd.get('deduct')) || 0 
                } 
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees'), data);
            e.target.reset();
        };

        window.importLogs = async (text) => {
            if (!text.trim()) return;
            const lines = text.split('\n').filter(l => l.includes('\t'));
            const logs = {};
            
            lines.forEach(line => {
                const parts = line.split('\t').map(p => p.trim());
                if (parts.length < 4) return;
                const id = parts[0];
                const rawTime = parts[3]; 
                const [dPart, tPart] = rawTime.split(/\s+/).filter(x => x);
                if(!dPart) return;
                const [m, d, y] = dPart.split('/');
                const isoDate = `${y}-${m}-${d}`;
                const key = `${id}_${isoDate}`;
                if (!logs[key]) logs[key] = { empId: id, date: isoDate, times: [] };
                logs[key].times.push(tPart);
            });

            let combined = [...state.attendance];
            Object.values(logs).forEach(day => {
                day.times.sort();
                const record = { 
                    empId: day.empId, 
                    date: day.date, 
                    in: day.times[0], 
                    out: day.times.length > 1 ? day.times[day.times.length-1] : null 
                };
                const idx = combined.findIndex(r => r.empId === day.empId && r.date === day.date);
                if (idx > -1) combined[idx] = record; else combined.push(record);
            });

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance'), { records: combined });
            alert("Attendance synced to Stone Grill project.");
        };

        function render() {
            const root = document.getElementById('root');
            if (state.error) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center p-6 text-center"><div class="bg-white p-8 rounded-3xl shadow-xl border-t-4 border-red-500 max-w-sm"><h2 class="font-black text-red-600 mb-2">Sync Error</h2><p class="text-xs text-slate-500">${state.error}</p></div></div>`;
                return;
            }
            if (!state.isUnlocked) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center bg-slate-900 p-6"><div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-sm text-center"><div class="w-16 h-16 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white font-black text-3xl">S</div><h1 class="text-2xl font-black mb-8 leading-tight">STONE GRILL<br><span class="text-slate-400 text-sm">PAYROLL ADMIN</span></h1><input type="password" id="pinInput" placeholder="ENTER PIN" class="w-full text-center text-3xl p-4 bg-slate-50 border-2 rounded-2xl mb-4 outline-none focus:border-blue-600 font-mono tracking-widest"><button onclick="checkPin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-95 transition">UNLOCK SYSTEM</button></div></div>`;
                return;
            }

            root.innerHTML = `
                <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 flex justify-between items-center no-print">
                    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white text-[10px] font-black italic">SG</div><span class="font-black tracking-tighter uppercase text-sm">Stone Grill <span class="text-blue-600">Payroll</span></span></div>
                    <div class="flex items-center gap-3">
                        <span class="text-[9px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-black uppercase">
                            ● Connected: stone-grill-app
                        </span>
                        <button onclick="location.reload()" class="text-[9px] font-bold text-slate-400">LOGOUT</button>
                    </div>
                </nav>

                <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8 no-print">
                    <div class="space-y-6">
                        <div class="bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm">
                            <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Update Staff Record</h3>
                            <form onsubmit="updateStaff(event)" class="space-y-3">
                                <div class="grid grid-cols-3 gap-2">
                                    <input name="id" placeholder="BIO ID" class="p-3 bg-slate-50 rounded-xl text-sm border-none font-bold focus:ring-2 ring-blue-100" required>
                                    <input name="name" placeholder="FULL NAME" class="col-span-2 p-3 bg-slate-50 rounded-xl text-sm border-none font-bold focus:ring-2 ring-blue-100" required>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <input name="rate" placeholder="DAILY RATE" class="p-3 bg-slate-50 rounded-xl text-sm border-none font-bold focus:ring-2 ring-blue-100" required>
                                    <input name="deduct" placeholder="DEDUCTION" class="p-3 bg-slate-50 rounded-xl text-sm border-none font-bold focus:ring-2 ring-blue-100">
                                </div>
                                <button class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg">Save to Cloud</button>
                            </form>
                        </div>
                        <div class="bg-slate-900 p-6 rounded-[32px] text-white shadow-xl">
                            <h3 class="text-[10px] font-black text-blue-400 mb-3 uppercase">Sync Attendance Logs</h3>
                            <textarea onblur="importLogs(this.value); this.value=''" placeholder="Paste biometric text content here..." class="w-full h-32 bg-slate-800 rounded-2xl p-4 text-[10px] font-mono outline-none border-none focus:ring-2 ring-blue-500 mb-2"></textarea>
                            <p class="text-[9px] text-slate-500 italic">Formatting: BioID \t Name \t Time</p>
                        </div>
                    </div>

                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white p-5 rounded-[32px] border border-slate-200 flex flex-wrap gap-4 shadow-sm items-end">
                            <div class="flex-1 min-w-[150px]">
                                <label class="text-[9px] font-black text-slate-400 mb-1 block">Quick Filter</label>
                                <select onchange="state.selectedEmpId = this.value; render()" class="w-full p-2.5 bg-slate-50 border-none rounded-xl text-sm font-bold">
                                    <option value="">-- ALL STAFF MEMBERS --</option>
                                    ${Object.entries(state.employees).map(([id, e]) => `<option value="${id}" ${state.selectedEmpId === id ? 'selected' : ''}>${e.name.toUpperCase()} (ID: ${id})</option>`).join('')}
                                </select>
                            </div>
                            <div class="flex gap-2">
                                <input type="date" value="${state.dateRange.start}" onchange="state.dateRange.start=this.value; render()" class="p-2 bg-slate-50 border-none rounded-xl text-xs font-bold">
                                <input type="date" value="${state.dateRange.end}" onchange="state.dateRange.end=this.value; render()" class="p-2 bg-slate-50 border-none rounded-xl text-xs font-bold">
                            </div>
                        </div>

                        <div class="bg-white rounded-[32px] border border-slate-200 overflow-hidden shadow-sm min-h-[450px]">
                            <div class="p-2 bg-slate-50 flex gap-1">
                                ${['summary', 'history', 'payslip'].map(t => `<button onclick="state.activeTab='${t}'; render()" class="flex-1 py-3 rounded-2xl text-[10px] font-black uppercase transition-all ${state.activeTab === t ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}">${t}</button>`).join('')}
                            </div>
                            <div class="p-6">
                                ${renderViewContent()}
                            </div>
                        </div>
                    </div>
                </div>
                ${state.activeTab === 'payslip' ? renderPayslip() : ''}
            `;
        }

        function renderViewContent() {
            if (state.activeTab === 'summary') {
                return `
                    <table class="w-full text-xs">
                        <thead class="text-slate-400 uppercase text-[10px] font-black border-b border-slate-50">
                            <tr><th class="pb-4 text-left">Member</th><th class="pb-4 text-center">Days</th><th class="pb-4 text-right">Payable</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${Object.entries(state.employees).map(([id, emp]) => {
                                const att = state.attendance.filter(a => a.empId === id && a.date >= state.dateRange.start && a.date <= state.dateRange.end);
                                const net = (att.length * emp.rate) - emp.deduct;
                                return `<tr onclick="state.selectedEmpId='${id}'; state.activeTab='payslip'; render()" class="cursor-pointer hover:bg-slate-50"><td class="py-4 font-black">${emp.name}</td><td class="py-4 text-center font-black">${att.length}</td><td class="py-4 text-right font-black">P${net.toLocaleString()}</td></tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                `;
            }
            if (state.activeTab === 'history' && state.selectedEmpId) {
                const att = state.attendance.filter(a => a.empId === state.selectedEmpId && a.date >= state.dateRange.start && a.date <= state.dateRange.end);
                return `<table class="w-full text-xs"><tbody class="divide-y divide-slate-50">${att.sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`<tr><td class="py-3 font-bold text-slate-500">${a.date}</td><td class="py-3 text-center text-blue-600 font-black">IN: ${a.in}</td><td class="py-3 text-right font-black">OUT: ${a.out||'--'}</td></tr>`).join('')}</tbody></table>`;
            }
            return `<div class="py-20 text-center text-slate-300 font-black text-[10px] uppercase">Please Select a Staff Member from Filter</div>`;
        }

        function renderPayslip() {
            if (!state.selectedEmpId) return "";
            const emp = state.employees[state.selectedEmpId];
            const att = state.attendance.filter(a => a.empId === state.selectedEmpId && a.date >= state.dateRange.start && a.date <= state.dateRange.end);
            const gross = att.length * emp.rate;
            const net = gross - emp.deduct;
            return `
                <div class="fixed inset-0 bg-white z-[100] p-16 font-mono text-sm hidden print:block">
                    <div class="text-center mb-10"><h1 class="text-4xl font-black italic">STONE GRILL</h1><p class="text-xs uppercase tracking-widest mt-2">Payroll Statement: ${state.dateRange.start} TO ${state.dateRange.end}</p></div>
                    <div class="border-y-2 border-black py-4 mb-10 flex justify-between font-bold uppercase"><div>Staff: ${emp.name}</div><div>ID: ${state.selectedEmpId}</div></div>
                    <div class="space-y-4 mb-20 text-lg">
                        <div class="flex justify-between"><span>Work Days:</span> <span>${att.length}</span></div>
                        <div class="flex justify-between"><span>Daily Rate:</span> <span>P${emp.rate.toLocaleString()}</span></div>
                        <div class="flex justify-between font-bold border-t border-black pt-4"><span>GROSS AMOUNT:</span> <span>P${gross.toLocaleString()}</span></div>
                        <div class="flex justify-between text-slate-500 italic"><span>Deductions / Adv:</span> <span>-P${emp.deduct.toLocaleString()}</span></div>
                        <div class="flex justify-between text-4xl font-black pt-10 border-t-4 border-black"><span>NET TAKE HOME:</span><span>P${net.toLocaleString()}</span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-20 text-center text-[10px] uppercase font-bold pt-32"><div class="border-t-2 border-black pt-2">Staff Acknowledgment</div><div class="border-t-2 border-black pt-2">Management Approval</div></div>
                </div>
                <div class="max-w-md mx-auto bg-white border-2 border-slate-900 rounded-[40px] p-8 my-10 shadow-2xl no-print text-center">
                    <div class="text-[10px] font-black text-blue-600 mb-2 uppercase">Payslip Preview</div>
                    <div class="text-3xl font-black mb-10 uppercase">${emp.name}</div>
                    <div class="text-4xl font-black mb-10">P${net.toLocaleString()}</div>
                    <button onclick="window.print()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition">Print Official Copy</button>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
