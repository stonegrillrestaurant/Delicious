<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================================================
       BLOCK: META / SEO
  ========================================================== -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{REPLACE_PAGE_TITLE}</title>

  <meta name="description" content="{REPLACE_META_DESCRIPTION}">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="{REPLACE_CANONICAL_URL}">

  <meta property="og:type" content="article">
  <meta property="og:title" content="{REPLACE_OG_TITLE}">
  <meta property="og:description" content="{REPLACE_OG_DESCRIPTION}">
  <meta property="og:url" content="{REPLACE_OG_URL}">
  <meta property="og:image" content="{REPLACE_OG_IMAGE}">

  <!-- =========================================================
       BLOCK: ICONS / PWA
  ========================================================== -->
  <link rel="icon" href="/reflections/assets/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/reflections/assets/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/reflections/assets/icons/apple-touch-icon-180x180.png">
  <link rel="manifest" href="/reflections/manifest.json">
  <meta name="theme-color" content="#120806">

  <!-- =========================================================
       BLOCK: ADSENSE
  ========================================================== -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9771423771078445" crossorigin="anonymous"></script>

  <!-- =========================================================
       BLOCK: GOOGLE ANALYTICS
  ========================================================== -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J6LE469GW6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-J6LE469GW6');
  </script>

  <!-- =========================================================
       BLOCK: JSON-LD
  ========================================================== -->
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"Article",
    "headline":"{REPLACE_JSONLD_HEADLINE}",
    "description":"{REPLACE_JSONLD_DESCRIPTION}",
    "image":["{REPLACE_JSONLD_IMAGE}"],
    "author":{"@type":"Person","name":"Ninox Antolihao"},
    "publisher":{
      "@type":"Organization",
      "name":"Solitude Reflections",
      "logo":{
        "@type":"ImageObject",
        "url":"https://stonegrillresto.net/reflections/assets/icons/icon-512x512.png"
      }
    },
    "mainEntityOfPage":{
      "@type":"WebPage",
      "@id":"{REPLACE_JSONLD_PAGE_URL}"
    },
    "datePublished":"{REPLACE_DATE_PUBLISHED}",
    "dateModified":"{REPLACE_DATE_MODIFIED}"
  }
  </script>

  <!-- =========================================================
       BLOCK: SHARED CSS
  ========================================================== -->
  <link rel="stylesheet" href="/reflections/assets/master.css">
</head>

<body data-reflection-slug="{REPLACE_REFLECTION_SLUG}">
  <div class="page">

    <!-- =========================================================
         BLOCK: TOP BAR
    ========================================================== -->
    <header class="topbar">
      <a href="/reflections/landing.html" class="brand" aria-label="Solitude Reflections Home">
        <img src="/reflections/assets/logo1.PNG" alt="Solitude Reflections" class="brand-logo">
        <div class="brand-copy">
          <span class="brand-title">Solitude Reflections</span>
          <span class="brand-sub">{REPLACE_TOPBAR_SUBTITLE}</span>
        </div>
      </a>

      <button class="menu-btn" type="button" onclick="openDrawer()" aria-label="Open reflections list">☰</button>
    </header>

    <!-- =========================================================
         BLOCK: HERO
    ========================================================== -->
    <section class="hero">
      <div class="hero-card">
        <img src="{REPLACE_HERO_IMAGE}" alt="{REPLACE_HERO_IMAGE_ALT}" class="hero-image">
        <div class="hero-overlay"></div>

        <div class="hero-copy">
          <div class="hero-copy-inner">
            <h1 class="hero-title">{REPLACE_HERO_TITLE}</h1>
            <div class="hero-subtitle">{REPLACE_HERO_SUBTITLE}</div>
            <div class="hero-author">{REPLACE_HERO_AUTHOR}</div>
          </div>
        </div>
      </div>
    </section>

    <!-- =========================================================
         BLOCK: PLAYLIST
    ========================================================== -->
    <section class="playlist-section">
      <div class="playlist-card">
        <div class="section-label">Playlists</div>

        <div class="playlist-list" id="playlist">
          <button class="playlist-row active"
                  data-src="{REPLACE_TRACK_1_SRC}"
                  data-title="{REPLACE_TRACK_1_DATA_TITLE}">
            <div class="playlist-title">{REPLACE_TRACK_1_TITLE}</div>
            <div class="playlist-sub">{REPLACE_TRACK_1_SUBTITLE}</div>
          </button>

          <button class="playlist-row"
                  data-src="{REPLACE_TRACK_2_SRC}"
                  data-title="{REPLACE_TRACK_2_DATA_TITLE}">
            <div class="playlist-title">{REPLACE_TRACK_2_TITLE}</div>
            <div class="playlist-sub">{REPLACE_TRACK_2_SUBTITLE}</div>
          </button>

          <button class="playlist-row"
                  data-src="{REPLACE_TRACK_3_SRC}"
                  data-title="{REPLACE_TRACK_3_DATA_TITLE}">
            <div class="playlist-title">{REPLACE_TRACK_3_TITLE}</div>
            <div class="playlist-sub">{REPLACE_TRACK_3_SUBTITLE}</div>
          </button>
        </div>
      </div>
    </section>

    <!-- =========================================================
         BLOCK: READING
    ========================================================== -->
    <section class="reading-section" id="readingSection">
      <div class="reading-card">
        <div class="reading-head">
          <div class="reading-label">Reading Part</div>
        </div>

        <div class="reading-body">
          <!-- =====================================================
               BLOCK: AD
          ====================================================== -->
          <div class="ad-wrap">
            <ins class="adsbygoogle"
              style="display:block"
              data-ad-client="ca-pub-9771423771078445"
              data-ad-slot="6628486781"
              data-ad-format="auto"
              data-full-width-responsive="true"></ins>
          </div>

          <!-- =====================================================
               BLOCK: READING CONTENT
          ====================================================== -->
          {REPLACE_READING_CONTENT}
        </div>
      </div>
    </section>

    <!-- =========================================================
         BLOCK: COMMENTS
    ========================================================== -->
    <section class="comments-wrap" id="commentsSection">
      <h2 class="comments-title">Comments</h2>
      <p class="comments-note">{REPLACE_COMMENTS_NOTE}</p>

      <div id="cusdis_thread"
        data-host="https://cusdis.com"
        data-app-id="d14e9b16-d8b2-40ac-a7f6-e200b1ac61e8"
        data-theme="light"
        data-page-id=""
        data-page-url=""
        data-page-title="">
      </div>
    </section>

    <!-- =========================================================
         BLOCK: AUDIO PLAYER
    ========================================================== -->
    <section class="audio-section" id="audioSection">
      <div class="audio-card">
        <audio id="reflectionAudio" class="audio-native" controls preload="metadata">
          <source id="audioSource" src="{REPLACE_DEFAULT_AUDIO_SRC}" type="audio/mpeg">
          {REPLACE_AUDIO_FALLBACK_TEXT}
        </audio>

        <div class="audio-controls">
          <button type="button" class="audio-btn" id="prevTrackBtn">&lt; Back</button>
          <button type="button" class="audio-btn main" id="playPauseBtn">PLAY / STOP</button>
          <button type="button" class="audio-btn" id="nextTrackBtn">Next &gt;</button>
        </div>
      </div>
    </section>

    <!-- =========================================================
         BLOCK: FOOTER
    ========================================================== -->
    <footer class="page-footer">
      {REPLACE_FOOTER_TEXT}
    </footer>
  </div>

  <!-- =========================================================
       BLOCK: BOTTOM MINI DOCK
  ========================================================== -->
  <nav class="mini-dock" aria-label="Reader controls">
    <div class="mini-dock-inner">
      <button type="button" class="mini-btn" onclick="history.back()" aria-label="Back">←</button>
      <button type="button" class="mini-btn center" onclick="addToHomeScreen()" aria-label="Add to Home Screen">⌂</button>
      <button type="button" class="mini-btn" onclick="openDrawer()" aria-label="Reflections list">☰</button>
    </div>
  </nav>

  <!-- =========================================================
       BLOCK: DRAWER OVERLAY
  ========================================================== -->
  <div class="drawer-overlay" onclick="closeDrawer()"></div>

  <!-- =========================================================
       BLOCK: DRAWER
  ========================================================== -->
  <aside class="app-drawer" aria-label="Reflections menu">
    <div class="drawer-head">
      <h3 class="drawer-title">Reflections Menu</h3>
      <button class="drawer-close" type="button" onclick="closeDrawer()" aria-label="Close menu">✕</button>
    </div>

    <div class="drawer-body" id="reflectionNavList">
      <button type="button" class="drawer-action" data-static="true" onclick="sharePage()">{REPLACE_SHARE_BUTTON_TEXT}</button>
      <button type="button" class="drawer-action" data-static="true" onclick="copyPageLink()">{REPLACE_COPY_BUTTON_TEXT}</button>
      <button type="button" class="drawer-action" data-static="true" onclick="scrollToComments()">{REPLACE_COMMENTS_BUTTON_TEXT}</button>
    </div>
  </aside>

  <!-- =========================================================
       BLOCK: REFLECTIONS LIST
  ========================================================== -->
  <script src="/reflections/assets/reflections-list.js"></script>

  <!-- =========================================================
       BLOCK: CUSDIS
  ========================================================== -->
  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

  <!-- =========================================================
       BLOCK: ADSENSE PUSH
  ========================================================== -->
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <!-- =========================================================
       BLOCK: SHARED JS
  ========================================================== -->
  <script src="/reflections/assets/master.js"></script>

  <!-- =========================================================
       BLOCK: SERVICE WORKER
  ========================================================== -->
  <script>
    if ('serviceWorker' in navigator && !location.pathname.startsWith('/reflections/pages/')) {
      navigator.serviceWorker.register('/reflections/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
