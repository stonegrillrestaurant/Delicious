<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stone Grill - Data Viewer Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a; --bg: #f3f4f6; --text: #1f2937;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; }
        
        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .pin-display { font-size: 2.5rem; font-weight: 800; letter-spacing: 10px; margin-bottom: 30px; color: var(--primary); min-height: 60px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 300px; }
        .num-btn { background: white; border: none; padding: 20px; font-size: 1.5rem; font-weight: 600; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .num-btn:active { background: #e5e7eb; transform: scale(0.95); }
        .btn-clear { background: #fee2e2; color: #ef4444; }

        /* History Table */
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; font-weight: 800; }
        .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; font-size: 0.85rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .history-table th { background: #f8fafc; padding: 12px; text-align: left; color: #94a3b8; }
        .history-table td { padding: 12px; border-top: 1px solid #f1f5f9; }
        .amount-cell { font-weight: 800; color: #ef4444; }
        .hidden { display: none !important; }
        #status-msg { margin-bottom: 15px; font-size: 0.9rem; font-weight: 600; color: #0284c7; text-align: center;}
        .debug-info { font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <h2 style="margin-bottom: 10px;">DATA TEST</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Enter Admin PIN (2558)</p>
        <div class="pin-display" id="pin-dots">****</div>
        <div class="numpad">
            <button class="num-btn" id="btn-1">1</button>
            <button class="num-btn" id="btn-2">2</button>
            <button class="num-btn" id="btn-3">3</button>
            <button class="num-btn" id="btn-4">4</button>
            <button class="num-btn" id="btn-5">5</button>
            <button class="num-btn" id="btn-6">6</button>
            <button class="num-btn" id="btn-7">7</button>
            <button class="num-btn" id="btn-8">8</button>
            <button class="num-btn" id="btn-9">9</button>
            <button class="num-btn btn-clear" id="btn-c">C</button>
            <button class="num-btn" id="btn-0">0</button>
            <button class="num-btn" style="background:#dcfce7; color:#166534;" id="btn-ok">OK</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden">
        <div class="header">
            DATABASE CONNECTION TEST
        </div>
        <div id="status-msg">Authenticating with Firebase...</div>
        <div id="debug-uid" class="debug-info"></div>
        
        <table class="history-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Staff ID</th>
                    <th>Note</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="4" style="text-align:center;">Waiting for login...</td></tr>
            </tbody>
        </table>
        
        <button id="btn-logout" style="width: 100%; margin-top: 20px; padding: 15px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: bold; cursor: pointer;">RESTART TEST</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Setup Firebase using secure environment variables
    let app, auth, db, appId;
    try {
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        // Using the exact App ID from your screenshot to ensure we look in the right bucket
        appId = 'stone-grill-v1'; 
        
        if (firebaseConfig) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } else {
            document.getElementById('status-msg').innerText = "Error: No Firebase config found in this environment.";
        }
    } catch (e) {
        console.error("Firebase init error", e);
    }

    let currentPin = "";
    const pinDots = document.getElementById('pin-dots');
    
    function updatePinDisplay() {
        pinDots.innerText = "*".repeat(currentPin.length) || "****";
    }

    // Numpad Event Listeners
    for(let i=0; i<=9; i++) {
        document.getElementById(`btn-${i}`).addEventListener('click', () => {
            if (currentPin.length < 4) { currentPin += i; updatePinDisplay(); }
        });
    }
    document.getElementById('btn-c').addEventListener('click', () => { currentPin = ""; updatePinDisplay(); });
    
    document.getElementById('btn-ok').addEventListener('click', () => {
        if (currentPin === "2558") {
            startTest();
        } else {
            alert("Please use Admin PIN 2558 for this test.");
            currentPin = ""; updatePinDisplay();
        }
    });

    document.getElementById('btn-logout').addEventListener('click', () => { location.reload(); });

    async function startTest() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        
        if (!auth) return;

        try {
            // 1. Authenticate FIRST
            document.getElementById('status-msg').innerText = "Logging in...";
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            const currentUser = auth.currentUser;
            if (!currentUser) throw new Error("Authentication failed.");

            document.getElementById('debug-uid').innerText = "Current UID: " + currentUser.uid;

            // 2. Fetch Data using the authenticated user's ID
            // The Firebase security rules ONLY allow reading from your own authenticated ID path.
            // Using the hardcoded 'TY8qdAMR...' string triggered the permissions error because 
            // the system requires the ID in the code to exactly match your login token.
            document.getElementById('status-msg').innerText = "Fetching cash_advances...";
            
            const caRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'cash_advances');
            const snapshot = await getDocs(caRef);
            
            const historyBody = document.getElementById('history-body');
            historyBody.innerHTML = "";

            if (snapshot.empty) {
                historyBody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Folder found, but it is empty for this user!</td></tr>";
                document.getElementById('status-msg').innerText = "Connected! But no documents found.";
                return;
            }

            // Put data into an array so we can sort it in memory
            let records = [];
            snapshot.forEach(doc => {
                records.push(doc.data());
            });

            // Sort by date newest first
            records.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

            // Display records
            records.forEach(data => {
                const row = `
                    <tr>
                        <td>${data.date || 'No Date'}</td>
                        <td>ID: ${data.empId || '?'}</td>
                        <td>${data.reason || '-'}</td>
                        <td class="amount-cell">₱${Number(data.amount || 0).toLocaleString()}</td>
                    </tr>
                `;
                historyBody.innerHTML += row;
            });
            
            document.getElementById('status-msg').innerText = `Success! Found ${records.length} records.`;

        } catch (error) {
            console.error(error);
            document.getElementById('status-msg').innerText = "Error: " + error.message;
            document.getElementById('history-body').innerHTML = `<tr><td colspan='4' style='color:red;'>${error.message}</td></tr>`;
        }
    }
</script>

</body>
</html>
