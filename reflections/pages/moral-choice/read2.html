<!-- SAFE SW -->
<script>

navigator.serviceWorker.register('/reflections/sw.js');
}
</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const audio = document.getElementById('reflectionAudio');
  const section = document.getElementById('audioSection');
  const status = document.getElementById('audioStatus');

  if (!audio || !section || !status) return;

  function setPlayingState(isPlaying) {
    section.classList.toggle('is-playing', isPlaying);
    status.textContent = isPlaying ? 'Playing' : 'Paused';
  }

  audio.addEventListener('play', () => setPlayingState(true));
  audio.addEventListener('pause', () => setPlayingState(false));
  audio.addEventListener('ended', () => setPlayingState(false));

  audio.addEventListener('waiting', () => {
    status.textContent = 'Loading';
  });

  audio.addEventListener('canplay', () => {
    status.textContent = audio.paused ? 'Paused' : 'Playing';
  });
});
</script>
