<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Grill Payroll - Smart Cloud Suite</title>
    
    <link rel="icon" type="image/png" href="/sys/icon.png">
    <link rel="apple-touch-icon" href="/sys/icon.png">
    <link rel="manifest" href="/sys/manifest.json">
    <meta name="theme-color" content="#7a2e13">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuFaPFfKKYhheMmemn0qqoc2cGiTrJzUw",
            authDomain: "stone-grill-payroll.firebaseapp.com",
            projectId: "stone-grill-payroll",
            storageBucket: "stone-grill-payroll.firebasestorage.app",
            messagingSenderId: "255528914541",
            appId: "1:255528914541:web:d58d9731a29d27fc253964"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "stone-grill-v1";

        window.fb = { db, auth, appId, signInWithEmailAndPassword, signOut, onAuthStateChanged, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #interactive-print-section, #interactive-print-section * { visibility: visible; }
            #interactive-print-section { position: absolute; left: 0; top: 0; width: 100%; border: none !important; margin: 0 !important; padding: 0 !important; }
            .print-hidden { display: none !important; }
            .payroll-print-container { padding: 0 !important; border: none !important; box-shadow: none !important; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const normalizeId = (id) => {
            if (!id) return '';
            const strId = String(id).trim();
            return /^\d+$/.test(strId) ? parseInt(strId, 10).toString() : strId.toLowerCase();
        };

        const formatMoney = (v) => {
            const num = Number(v || 0); if (isNaN(num)) return "0";
            return Math.abs(num).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        };

        const Icon = ({ d, className = "w-5 h-5", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}{children}
            </svg>
        );
        const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Banknote = (p) => <Icon {...p}><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></Icon>;
        const CalendarDays = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></Icon>;
        const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
        const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Menu = (p) => <Icon {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;

        function NavItem({ icon, label, active, onClick, open }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center px-6 py-3.5 transition-all duration-300 ${active ? 'bg-[#386df2] text-white border-l-4 border-white shadow-lg' : 'text-blue-200 hover:bg-blue-800/50 hover:text-white border-l-4 border-transparent'}`}>
                    <span className="shrink-0">{icon}</span>{open && <span className="ml-4 text-[11px] font-black uppercase tracking-widest whitespace-nowrap">{label}</span>}
                </button>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl flex items-center gap-6 animate-slide-up hover:shadow-2xl transition-all">
                    <div className={`p-4 rounded-2xl ${color}`}>{icon}</div>
                    <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{title}</p><p className="text-3xl font-black text-slate-800 tracking-tighter">{value}</p></div>
                </div>
            );
        }

        function LoginScreen() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    await window.fb.signInWithEmailAndPassword(window.fb.auth, email, password);
                } catch (err) { alert("Login failed. Check your email or password."); setLoading(false); }
            };

            return (
                <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-10 flex flex-col items-center animate-slide-up">
                        <img src="/sys/icon.png" className="w-16 h-16 mb-6" alt="Logo" />
                        <h2 className="text-2xl font-black text-slate-800 mb-6 uppercase tracking-widest text-center">System Login</h2>
                        <form onSubmit={handleLogin} className="w-full space-y-4">
                            <input type="email" placeholder="Email Address" required value={email} onChange={e => setEmail(e.target.value)} className="w-full border p-4 rounded-2xl outline-none font-bold bg-slate-50"/>
                            <input type="password" placeholder="Password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full border p-4 rounded-2xl outline-none font-bold bg-slate-50"/>
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white h-14 rounded-2xl font-black uppercase tracking-widest shadow-lg transition-all active:scale-95">
                                {loading ? 'Loading...' : 'Login'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState(''); 
            const [currentBiometricId, setCurrentBiometricId] = useState(''); 
            const [isReady, setIsReady] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 1024);
            const [isRestoring, setIsRestoring] = useState(false);
            
            const [employees, setEmployees] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [cashAdvances, setCashAdvances] = useState([]);
            const [interactivePayrolls, setInteractivePayrolls] = useState([]);
            
            const [selectedMonth, setSelectedMonth] = useState(() => new Date().toISOString().slice(0, 7));
            const [viewProfile, setViewProfile] = useState(null);
            const [showAddStaff, setShowAddStaff] = useState(false);
            const [rawInput, setRawInput] = useState('');
            const [caType, setCaType] = useState('advance');
            const [newCa, setNewCa] = useState({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });
            const [newEmpForm, setNewEmpForm] = useState({ biometricId: '', firstName: '', lastName: '', position: '', dailyRate: '', contactNumber: '', sssNumber: '', sssRate: '', miscRate: '', status: 'active' });

            const [dashSearchEmpId, setDashSearchEmpId] = useState('');
            const [dashSearchStart, setDashSearchStart] = useState(() => new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().slice(0, 10));
            const [dashSearchEnd, setDashSearchEnd] = useState(() => new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).toISOString().slice(0, 10));

            const [icEmpId, setIcEmpId] = useState('');
            const [icDateStart, setIcDateStart] = useState(dashSearchStart);
            const [icDateEnd, setIcDateEnd] = useState(dashSearchEnd);
            const [icForm, setIcForm] = useState({ days_worked: 0, bonus: 0, sss: 0, cash_advance: 0, misc_deductions: 0 });

            const isAdmin = userRole === 'Admin';

            const monthOptions = useMemo(() => {
                const options = []; const d = new Date();
                for (let i = 0; i < 12; i++) {
                    options.push({ value: d.toISOString().slice(0, 7), label: d.toLocaleString('default', { month: 'long', year: 'numeric' }) });
                    d.setMonth(d.getMonth() - 1);
                }
                return options;
            }, []);

            useEffect(() => {
                window.fb.onAuthStateChanged(window.fb.auth, (u) => { 
                    setUser(u); 
                    setIsReady(true); 
                    if(!u) { setUserRole(''); setCurrentBiometricId(''); }
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const { db, appId, onSnapshot, collection } = window.fb;
                const path = (n) => collection(db, 'artifacts', appId, 'users', user.uid, n);
                
                const unsubEmps = onSnapshot(path('employees'), (s) => setEmployees(s.docs.map(d => ({ id: d.id, ...d.data(), name: d.data().name || `${d.data().firstName || ''} ${d.data().lastName || ''}`.trim() || d.id })).sort((a,b)=> (a.name || '').localeCompare(b.name || ''))));
                const unsubAtt = onSnapshot(path('attendance'), (s) => setAttendance(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubCA = onSnapshot(path('cash_advances'), (s) => setCashAdvances(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubIP = onSnapshot(path('payroll_entries'), (s) => setInteractivePayrolls(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubEmps(); unsubAtt(); unsubCA(); unsubIP(); };
            }, [user]);

            const payrollSummary = useMemo(() => {
                return employees.map(emp => {
                    const empAtt = attendance.filter(a => normalizeId(a.empId) === normalizeId(emp.id) && (a.date || '').startsWith(selectedMonth));
                    let days = 0; const uniqueDates = new Set(empAtt.map(a => a.date));
                    uniqueDates.forEach(date => days += Math.min(Math.max(...empAtt.filter(a => a.date === date).map(r => parseFloat(r.dayEquivalent) || 0)), 1));
                    const empCAsThisMonth = cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(emp.id) && (ca.date || '').startsWith(selectedMonth));
                    const monthlyCA = empCAsThisMonth.reduce((sum, ca) => sum + (parseFloat(ca.amount) || 0), 0);
                    const gross = days * (parseFloat(emp.dailyRate || emp.rate) || 0);
                    const net = gross - monthlyCA - (parseFloat(emp.sssRate) || 0) - (parseFloat(emp.miscRate) || 0);
                    return { ...emp, days, gross, net, monthlyCA, caBalance: parseFloat(emp.caBalance) || 0 };
                });
            }, [employees, attendance, cashAdvances, selectedMonth]);

            const stats = useMemo(() => {
                const today = new Date().toISOString().slice(0, 10);
                const uniquePresent = new Set(attendance.filter(a => a.date === today).map(a => normalizeId(a.empId))).size;
                const totalCA = employees.reduce((sum, e) => sum + (parseFloat(e.caBalance) || 0), 0);
                return { count: employees.length, present: uniquePresent, totalCA };
            }, [employees, attendance]);

            let quickView = null;
            if (dashSearchEmpId) {
                const emp = payrollSummary.find(e => normalizeId(e.id) === normalizeId(dashSearchEmpId));
                if (emp && dashSearchStart && dashSearchEnd) {
                    const rangeAtt = attendance.filter(a => normalizeId(a.empId) === normalizeId(emp.id) && a.date >= dashSearchStart && a.date <= dashSearchEnd);
                    let rDays = 0; new Set(rangeAtt.map(a=>a.date)).forEach(d => rDays += Math.min(Math.max(...rangeAtt.filter(a=>a.date===d).map(r=>parseFloat(r.dayEquivalent)||0)),1));
                    const rCA = cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(emp.id) && ca.date >= dashSearchStart && ca.date <= dashSearchEnd).reduce((s,c)=>s+(parseFloat(c.amount)||0), 0);
                    const rGross = rDays * (parseFloat(emp.dailyRate || emp.rate) || 0);
                    const rNet = rGross - rCA - (parseFloat(emp.sssRate)||0) - (parseFloat(emp.miscRate)||0);
                    quickView = { ...emp, rangeDays: rDays, rangeGross: rGross, rangeCA: rCA, rangeNet: rNet };
                }
            }

            // PAYSLIP AUTOFILL
            useEffect(() => {
                if (icEmpId && icDateStart && icDateEnd) {
                    const emp = employees.find(e => normalizeId(e.id) === normalizeId(icEmpId));
                    if (emp) {
                        const att = attendance.filter(a => normalizeId(a.empId) === normalizeId(icEmpId) && a.date >= icDateStart && a.date <= icDateEnd);
                        let calcDays = 0; new Set(att.map(a=>a.date)).forEach(d => calcDays += Math.min(Math.max(...att.filter(a=>a.date===d).map(r=>parseFloat(r.dayEquivalent)||0)),1));
                        const rangeCA = cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(icEmpId) && ca.date >= icDateStart && ca.date <= icDateEnd).reduce((s,c)=>s+(parseFloat(c.amount)||0), 0);
                        setIcForm({ days_worked: calcDays, bonus: 0, sss: parseFloat(emp.sssRate) || 0, misc_deductions: parseFloat(emp.miscRate) || 0, cash_advance: rangeCA });
                    }
                }
            }, [icEmpId, icDateStart, icDateEnd, employees, attendance, cashAdvances]);


            const handleProcessLogs = async () => {
                if (!isAdmin || !rawInput.trim()) return;
                const lines = rawInput.trim().split('\n'); let count = 0; const map = {};
                for (const line of lines) {
                    const cols = line.split(/\t+| {2,}/).filter(Boolean); if (cols.length < 3) continue;
                    const id = normalizeId(cols[0]); const name = cols[1];
                    const dM = line.match(/(\d{2}\/\d{2}\/\d{4})/); const tM = line.match(/(\d{2}:\d{2}:\d{2})/);
                    if (!dM || !tM) continue;
                    const [m, d, y] = dM[1].split('/'); const iso = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
                    const key = `${id}_${iso}`; if (!map[key]) map[key] = { id, name, date: iso, p: [] };
                    map[key].p.push(tM[1].substring(0,5));
                }
                for (const k in map) {
                    const r = map[k]; const s = r.p.sort();
                    await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'attendance', k), { empId: r.id, empName: r.name, date: r.date, firstIn: s[0], lastOut: s.length > 1 ? s[s.length-1] : '00:00', dayEquivalent: s.length > 1 ? 1 : 0.5 }, { merge: true });
                    count++;
                }
                setRawInput(''); alert(`Processed ${count} attendance records.`);
            };

            const handleAddStaffSubmit = async (e) => {
                e.preventDefault(); if (!isAdmin) return;
                const bId = normalizeId(newEmpForm.biometricId);
                const payload = { ...newEmpForm, dailyRate: parseFloat(newEmpForm.dailyRate), sssRate: parseFloat(newEmpForm.sssRate) || 0, miscRate: parseFloat(newEmpForm.miscRate) || 0, name: `${newEmpForm.firstName} ${newEmpForm.lastName}`.trim() };
                await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', bId), payload, { merge: true });
                setShowAddStaff(false);
            };

            const handleIssueCA = async () => {
                if (!isAdmin || !newCa.empId) return;
                let amt = parseFloat(newCa.amount) || 0; if (caType === 'payment') amt = -Math.abs(amt);
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'cash_advances'), { ...newCa, amount: amt, type: caType });
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', normalizeId(newCa.empId)), { caBalance: (parseFloat(employees.find(e=>normalizeId(e.id)===normalizeId(newCa.empId))?.caBalance) || 0) + amt });
                setNewCa({ empId: '', amount: '', reason: '', date: new Date().toISOString().slice(0, 10) });
            };

            const handleDeleteEmployee = async (id, name) => {
                if (!isAdmin || !window.confirm(`PERMANENTLY delete ${name}?\nThis action cannot be undone.`)) return;
                await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', normalizeId(id)));
                setViewProfile(null);
            };

            const handleDeleteCA = async (caId, empId, amt) => {
                if (!isAdmin || !window.confirm(`Delete and reverse this transaction?`)) return;
                await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'cash_advances', caId));
                const emp = employees.find(e => normalizeId(e.id) === normalizeId(empId));
                if (emp) await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'employees', normalizeId(empId)), { caBalance: (parseFloat(emp.caBalance) || 0) - amt });
            };

            const handleExportBackup = () => {
                if(!isAdmin) return;
                const data = { employees, attendance, cashAdvances, interactivePayrolls };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `stonegrill_backup.json`; a.click();
            };

            const handleImportBackup = (event) => {
                const file = event.target.files[0]; if (!file || !user || !isAdmin) return;
                setIsRestoring(true); const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result); const { db, appId, doc, setDoc } = window.fb;
                        const restoreCollection = async (colName, items) => {
                            if (!items || !Array.isArray(items)) return;
                            for (const item of items) { const { id, ...rest } = item; if (id) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, colName, id), rest, { merge: true }); }
                        };
                        await restoreCollection('employees', data.employees); await restoreCollection('attendance', data.attendance); await restoreCollection('cash_advances', data.cashAdvances || data.cash_advances); await restoreCollection('payroll_entries', data.interactivePayrolls);
                        alert(`Restore Complete!`);
                    } catch (err) { alert("Restore Error: " + err.message); }
                    setIsRestoring(false);
                };
                reader.readAsText(file); event.target.value = ''; 
            };

            if (!isReady) return null;
            if (!user) return <LoginScreen />;

            // --- SECURE PIN GATE ---
            if (!userRole) {
                return (
                    <div className="fixed inset-0 bg-blue-950 flex items-center justify-center p-6 text-center">
                        <div className="bg-white rounded-3xl p-10 shadow-2xl max-w-sm w-full animate-slide-up">
                            <img src="/sys/icon.png" className="w-12 h-12 mx-auto mb-4" alt="Logo" />
                            <h2 className="text-xl font-black mb-6 uppercase tracking-widest text-slate-800">Verify Access</h2>
                            
                            <input type="password" placeholder="Enter PIN" autoFocus className="w-full border-2 p-4 rounded-2xl mb-4 text-center text-xl font-black outline-none border-slate-100 focus:border-blue-500" 
                                onChange={(e) => {
                                    if(e.target.value === '2558') { setUserRole('Admin'); setCurrentBiometricId('ADMIN'); }
                                    if(e.target.value === '1234') { 
                                        const id = window.prompt("Enter Your Machine ID:"); 
                                        if (employees.some(emp => normalizeId(emp.id) === normalizeId(id))) { setCurrentBiometricId(id); setUserRole('Staff'); } 
                                        else if (id) alert("ID Not Found. Ensure Admin has added your ID.");
                                    }
                                }} 
                            />
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Enter Authorized Access PIN</p>
                            
                            <button onClick={() => window.fb.signOut(window.fb.auth)} className="mt-8 text-rose-500 font-bold uppercase text-[10px]">Logout Entirely</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden relative font-sans">
                    {isRestoring && <div className="fixed inset-0 bg-blue-950/80 flex items-center justify-center p-4 z-[100] font-sans flex-col text-white"><div className="w-16 h-16 border-4 border-t-white rounded-full animate-spin mb-6" /><h2 className="text-2xl font-black uppercase tracking-widest animate-pulse">Restoring Database...</h2></div>}

                    <aside className={`fixed lg:static inset-y-0 left-0 z-40 bg-blue-900 text-white transition-all duration-300 flex flex-col h-full print-hidden ${isSidebarOpen ? 'w-64 translate-x-0' : 'w-20 -translate-x-full lg:translate-x-0'} shadow-2xl`}>

                                                            </div>
                                                        </div>
                                                    )}
                                                    <button onClick={() => window.print()} className="mt-10 w-full bg-slate-800 text-white py-3 rounded-full font-black uppercase text-[10px] print-hidden flex items-center justify-center gap-2 hover:bg-black"><Printer/> Print Card</button>
                                                </div>
                                                );
                                            })() : <div className="py-24 text-slate-300 italic flex flex-col items-center"><FileText className="w-16 h-16 opacity-10 mb-4"/>Select employee to view payslip</div>}
                                        </div>
                                    </div>
                                )}

                                {isAdmin && activeTab === 'ca' && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 animate-slide-up">
                                        <div className="bg-white p-8 rounded-3xl shadow-xl space-y-4 h-max">
                                            <h2 className="font-black text-blue-900 uppercase">Issue Entry</h2>
                                            <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
                                                <button onClick={()=>setCaType('advance')} className={`flex-1 py-2 text-[10px] font-black rounded-lg ${caType==='advance'?'bg-white shadow text-blue-900':'text-slate-400'}`}>ADVANCE</button>
                                                <button onClick={()=>setCaType('payment')} className={`flex-1 py-2 text-[10px] font-black rounded-lg ${caType==='payment'?'bg-white shadow text-emerald-600':'text-slate-400'}`}>PAYMENT</button>
                                            </div>
                                            <select className="w-full p-3 border rounded-xl font-black bg-slate-50 outline-none" value={newCa.empId} onChange={e=>setNewCa({...newCa, empId: e.target.value})}><option value="">Select Member</option>{employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select>
                                            {newCa.empId && <div className="bg-rose-50 p-4 rounded-xl text-center"><p className="text-[10px] font-black text-rose-800 opacity-50 uppercase">Current Debt</p><p className="text-2xl font-black text-rose-600 font-mono">₱{formatMoney(employees.find(e=>normalizeId(e.id)===normalizeId(newCa.empId))?.caBalance)}</p></div>}
                                            <input type="date" className="w-full p-3 border rounded-xl font-bold bg-slate-50 outline-none" value={newCa.date} onChange={e=>setNewCa({...newCa, date: e.target.value})} />
                                            <input type="number" placeholder="Amount" className="w-full p-3 border rounded-xl font-black bg-slate-50 outline-none" value={newCa.amount} onChange={e=>setNewCa({...newCa, amount: e.target.value})} />
                                            <input type="text" placeholder="Note" className="w-full p-3 border rounded-xl font-bold bg-slate-50 outline-none" value={newCa.reason} onChange={e=>setNewCa({...newCa, reason: e.target.value})} />
                                            <button onClick={handleIssueCA} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg active:scale-95">Commit Entry</button>
                                        </div>
                                        <div className="md:col-span-2 bg-white rounded-3xl border shadow-xl overflow-hidden">
                                            <div className="p-5 bg-gray-50 border-b font-black text-blue-900 uppercase text-[10px]">Cloud Ledger history</div>
                                            <div className="max-h-[600px] overflow-y-auto custom-scrollbar">
                                                <table className="w-full text-xs text-left">
                                                    <thead className="bg-white border-b text-[9px] font-black text-slate-400 uppercase sticky top-0"><tr><th className="p-4">Date</th><th className="p-4">Name</th><th className="p-4 text-right">Value</th><th className="p-4 text-center">Action</th></tr></thead>
                                                    <tbody className="divide-y divide-gray-50">
                                                        {cashAdvances.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(ca=>(
                                                            <tr key={ca.id} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 font-mono text-slate-400">{ca.date}</td>
                                                                <td className="p-4 font-black uppercase text-slate-700">{employees.find(e=>normalizeId(e.id)===normalizeId(ca.empId))?.name || ca.empId} <span className="italic text-slate-400 font-normal ml-2">{ca.reason}</span></td>
                                                                <td className={`p-4 text-right font-black ${ca.amount < 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{ca.amount < 0 ? '-' : '+'}₱{formatMoney(ca.amount)}</td>
                                                                <td className="p-4 text-center"><button onClick={() => handleDeleteCA(ca.id, ca.empId, ca.amount)} className="p-2 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded"><X className="w-3 h-3"/></button></td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {isAdmin && activeTab === 'payroll' && (
                                    <div className="bg-white w-full p-4 lg:p-8 animate-slide-up">
                                        <div className="flex justify-between items-center mb-8 print-hidden">
                                            <div className="flex items-center gap-4"><h2 className="text-2xl font-black text-slate-900 uppercase">Payroll List</h2><select className="border-2 rounded-xl px-4 py-2 text-sm font-bold outline-none" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>{monthOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}</select></div>
                                            <button onClick={() => window.print()} className="bg-slate-900 text-white hover:bg-black px-6 py-3 rounded-xl text-xs font-black uppercase shadow-lg flex items-center gap-2"><Printer className="w-4 h-4"/> Print</button>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm min-w-[800px]">
                                                <thead><tr className="border-t-4 border-red-600 border-b-2 border-gray-900"><th className="py-3 px-2 font-bold uppercase text-xs">Name</th><th className="py-3 px-2 font-bold uppercase text-xs text-center">Rate</th><th className="py-3 px-2 font-bold uppercase text-xs text-center">Days</th><th className="py-3 px-2 font-bold uppercase text-xs text-right text-red-600">CA.</th><th className="py-3 px-2 font-black uppercase text-xs text-right">Salary</th><th className="py-3 px-2 font-bold uppercase text-xs text-center">Signature</th></tr></thead>
                                                <tbody className="divide-y divide-gray-200">
                                                    {payrollSummary.map(row => (
                                                        <tr key={row.id}>
                                                            <td className="py-3 px-2 font-bold uppercase">{row.name}</td>
                                                            <td className="py-3 px-2 text-center font-mono">{formatMoney(row.dailyRate || row.rate)}</td>
                                                            <td className="py-3 px-2 text-center font-bold">{row.days}</td>
                                                            <td className="py-3 px-2 text-right text-red-600 font-bold font-mono">{row.monthlyCA > 0 ? formatMoney(row.monthlyCA) : ''}</td>
                                                            <td className={`py-3 px-2 text-right font-black font-mono text-base ${row.net < 0 ? 'text-rose-600' : 'text-slate-900'}`}>{row.net < 0 ? '-' : ''}{formatMoney(row.net)}</td>
                                                            <td className="py-3 px-2"><div className="w-full h-8 border-b border-dashed border-gray-400"></div></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                                <tfoot><tr className="border-t-2 border-gray-900 font-black text-lg"><td colSpan="4" className="py-5 px-2 text-right uppercase">TOTAL:</td><td className="py-5 px-2 text-right font-mono">₱{formatMoney(payrollSummary.reduce((sum, row) => sum + row.net, 0))}</td><td></td></tr></tfoot>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {isAdmin && activeTab === 'summary' && (
                                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col min-h-[500px] animate-slide-up">
                                        <div className="p-6 border-b bg-slate-900 text-white"><h2 className="font-black uppercase flex items-center gap-2"><CalendarDays className="w-5 h-5"/> Yearly Overview</h2></div>
                                        <div className="overflow-auto flex-1 custom-scrollbar">
                                            <table className="w-full text-right text-xs min-w-max">
                                                <thead className="bg-slate-800 text-white sticky top-0 z-20"><tr><th className="p-4 text-left border border-slate-700 sticky left-0 bg-slate-800 font-black uppercase text-[10px] z-30">Staff Name</th>{['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'].map(m => <th key={m} className="p-4 border border-slate-700 font-black">{m}</th>)}</tr></thead>
                                                <tbody>
                                                    {employees.map(emp => (
                                                        <tr key={emp.id} className="border-b border-gray-100 hover:bg-blue-50/50">
                                                            <td className="p-4 text-left border-r sticky left-0 bg-white font-black uppercase text-slate-700 z-10">{emp.name}</td>
                                                            {Array.from({length: 12}).map((_, i) => {
                                                                const isCurrent = selectedMonth.endsWith((i+1).toString().padStart(2,'0'));
                                                                return <td key={i} className={`p-4 font-mono font-bold border-r ${isCurrent ? 'text-blue-600 bg-blue-50/30' : 'text-slate-300 italic'}`}>{isCurrent ? `₱${formatMoney(payrollSummary.find(p=>p.id===emp.id)?.net)}` : '--'}</td>;
                                                            })}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {isAdmin && activeTab === 'settings' && (
                                    <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md mx-auto mt-10 text-center animate-slide-up">
                                        <h3 className="font-black text-2xl uppercase mb-2">Cloud Database</h3>
                                        <p className="text-slate-400 mb-8 font-bold text-xs">Backup or Restore complete environment.</p>
                                        <div className="space-y-4">
                                            <button onClick={handleExportBackup} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Download Backup</button>
                                            <div className="relative">
                                                <label className="flex w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg cursor-pointer justify-center">Upload Restore JSON<input type="file" accept=".json" className="hidden" onChange={handleImportBackup} /></label>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* ADMIN ADD STAFF MODAL */}
                    {showAddStaff && isAdmin && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleAddStaffSubmit} className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 space-y-5 animate-in zoom-in-95">
                                <div className="flex justify-between items-center mb-2"><h3 className="font-black uppercase tracking-widest text-blue-900">Add Staff</h3><button type="button" onClick={()=>setShowAddStaff(false)} className="text-slate-400"><X/></button></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Biometric ID</label><input type="text" required value={newEmpForm.biometricId} onChange={e=>setNewEmpForm({...newEmpForm, biometricId: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black"/></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">First Name</label><input type="text" required value={newEmpForm.firstName} onChange={e=>setNewEmpForm({...newEmpForm, firstName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Last Name</label><input type="text" required value={newEmpForm.lastName} onChange={e=>setNewEmpForm({...newEmpForm, lastName: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Role</label><input type="text" value={newEmpForm.position} onChange={e=>setNewEmpForm({...newEmpForm, position: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-bold"/></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Daily Rate</label><input type="number" required value={newEmpForm.dailyRate} onChange={e=>setNewEmpForm({...newEmpForm, dailyRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black text-blue-600"/></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">SSS Ded.</label><input type="number" value={newEmpForm.sssRate} onChange={e=>setNewEmpForm({...newEmpForm, sssRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black text-rose-600"/></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Misc Ded.</label><input type="number" value={newEmpForm.miscRate} onChange={e=>setNewEmpForm({...newEmpForm, miscRate: e.target.value})} className="w-full border p-3 rounded-2xl bg-slate-50 outline-none font-black text-rose-600"/></div>
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl mt-4">Save to Cloud</button>
                            </form>
                        </div>
                    )}

                    {/* ADMIN VIEW PROFILE MODAL */}
                    {viewProfile && isAdmin && (
                        <div className="fixed inset-0 bg-blue-950/40 backdrop-blur-md z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95">
                                <div className="bg-blue-900 text-white p-6 flex justify-between items-center shrink-0"><h2 className="text-xl font-black uppercase tracking-widest"><Users className="w-6 h-6 inline mr-2"/> Profile</h2><button onClick={() => setViewProfile(null)}><X/></button></div>
                                <div className="overflow-y-auto p-8 flex-1 space-y-8 custom-scrollbar">
                                    <div className="flex justify-between items-end border-b pb-6">
                                        <div>
                                            <h3 className="text-4xl font-black text-slate-800 uppercase tracking-tighter">{viewProfile.name}</h3>
                                            <p className="text-xs text-slate-400 font-black mt-1">ID: {viewProfile.id} • {viewProfile.position}</p>
                                            <button onClick={()=>handleDeleteEmployee(viewProfile.id, viewProfile.name)} className="mt-4 bg-rose-50 text-rose-600 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-rose-100 transition-colors">Delete Profile</button>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-black text-blue-600 font-mono text-2xl tracking-tighter">₱{formatMoney(viewProfile.dailyRate || viewProfile.rate)}/DAY</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-100 text-center">
                                        <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Days Present</p><p className="text-3xl font-black text-slate-800 font-mono">{viewProfile.days}</p></div>
                                        <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Net Salary</p><p className={`text-3xl font-black font-mono ${viewProfile.net < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{viewProfile.net < 0 ? '-' : ''}₱{formatMoney(viewProfile.net)}</p></div>
                                    </div>
                                    
                                    <div className="bg-rose-50 p-6 rounded-3xl border border-rose-100 text-center">
                                        <p className="text-[10px] font-black text-rose-800 opacity-50 uppercase mb-2">Lifetime C.A. Balance</p>
                                        <p className="text-5xl font-black text-rose-600 font-mono tracking-tighter">₱{formatMoney(viewProfile.caBalance)}</p>
                                    </div>
                                    
                                    <div className="mt-6">
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">Transaction History</h4>
                                        <div className="max-h-48 overflow-y-auto custom-scrollbar bg-slate-50 border rounded-2xl">
                                            <table className="w-full text-left text-xs">
                                                <thead className="bg-slate-100 font-black uppercase text-[9px] text-slate-400 sticky top-0"><tr><th className="p-3">Date</th><th className="p-3">Note</th><th className="p-3 text-right">Amount</th><th className="p-3 text-center">Action</th></tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(viewProfile.id)).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(ca => (
                                                        <tr key={ca.id} className="hover:bg-white transition-colors">
                                                            <td className="p-3 font-mono text-slate-500">{ca.date}</td>
                                                            <td className="p-3 italic text-slate-600">{ca.reason || '--'}</td>
                                                            <td className={`p-3 text-right font-black ${ca.amount < 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{ca.amount < 0 ? '-' : '+'}₱{formatMoney(ca.amount)}</td>
                                                            <td className="p-3 text-center"><button onClick={() => handleDeleteCA(ca.id, ca.empId, ca.amount)} className="p-1.5 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded"><X className="w-3 h-3"/></button></td>
                                                        </tr>
                                                    ))}
                                                    {cashAdvances.filter(ca => normalizeId(ca.empId) === normalizeId(viewProfile.id)).length === 0 && <tr><td colSpan="4" className="p-6 text-center text-slate-400 italic">No transactions recorded.</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
