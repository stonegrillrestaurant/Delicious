<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stone Grill Staff Portal</title>
    <style>
        :root { --primary: #4CAF50; --danger: #f44336; --dark: #2c3e50; --light: #f8f9fa; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; margin: 50px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .container { width: 100%; max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="loginView" class="box">
    <h2 style="text-align:center">🔐 Staff Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <p id="errorMsg" style="color:red; font-size: 0.8rem;"></p>
</div>

<!-- Main App Section -->
<div id="appView" class="container hidden">
    <div class="header">
        <h2>Stone Grill Ledger</h2>
        <button onclick="handleLogout()" style="width:auto; background:var(--danger);">Logout</button>
    </div>
    
    <!-- Ledger Form -->
    <div style="background:#e3f2fd; padding:15px; border-radius:8px;">
        <input type="date" id="date">
        <select id="type"><option value="sale">Sale (+)</option><option value="expense">Expense (-)</option></select>
        <input type="text" id="desc" placeholder="Description">
        <input type="number" id="amt" placeholder="Amount">
        <button onclick="addTransaction()">Add Entry</button>
    </div>

    <table>
        <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th></tr></thead>
        <tbody id="transactionList"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDX6OKrMdfnzml4LA8SE4PDFkDJLVPmKIc",
        authDomain: "stone-grill-app.firebaseapp.com",
        projectId: "stone-grill-app",
        storageBucket: "stone-grill-app.firebasestorage.app",
        messagingSenderId: "724825019953",
        appId: "1:724825019953:web:7d07941fd10c3a988ba710"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleLogin = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } 
        catch (e) { document.getElementById('errorMsg').innerText = "Login failed!"; }
    };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('appView').classList.remove('hidden');
            loadData();
        } else {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('appView').classList.add('hidden');
        }
    });

    window.addTransaction = async () => {
        await addDoc(collection(db, "transactions"), {
            date: document.getElementById('date').value,
            type: document.getElementById('type').value,
            desc: document.getElementById('desc').value,
            amt: parseFloat(document.getElementById('amt').value),
            ts: Date.now()
        });
    };

    function loadData() {
        const q = query(collection(db, "transactions"), orderBy("ts", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('transactionList');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<tr><td>${d.date}</td><td>${d.type}</td><td>${d.desc}</td><td>$${d.amt}</td></tr>`;
            });
        });
    }
</script>
</body>
</html>
