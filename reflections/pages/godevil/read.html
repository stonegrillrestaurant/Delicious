<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Solitude Reflections</title>
  <meta name="description" content="A reflection page from Solitude Reflections." />
  <meta name="theme-color" content="#f6f1e8" />
  <meta name="robots" content="index,follow,max-image-preview:large" />

  <link rel="canonical" href="https://stonegrillresto.net/reflections/" />

  <meta property="og:type" content="article" />
  <meta property="og:title" content="Solitude Reflections" />
  <meta property="og:description" content="A reflection page from Solitude Reflections." />
  <meta property="og:url" content="https://stonegrillresto.net/reflections/" />
  <meta property="og:image" content="https://stonegrillresto.net/reflections/og-default.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Solitude Reflections" />
  <meta name="twitter:description" content="A reflection page from Solitude Reflections." />
  <meta name="twitter:image" content="https://stonegrillresto.net/reflections/og-default.jpg" />

  <style>
    :root {
      --radius: 20px;
      --shadow: 0 18px 50px rgba(0,0,0,.08);

      /* Light */
      --bg: #f7f3ec;
      --panel: #fffaf3;
      --panel-2: #f2eadf;
      --text: #221d18;
      --muted: #6b6258;
      --line: #ddd1c1;
      --brand: #8c5e34;

      --spirituality: #b28746;
      --human: #6f8090;
      --religion: #8f625c;
    }

    html[data-theme="dark"] {
      --bg: #171514;
      --panel: #211d1b;
      --panel-2: #2a2522;
      --text: #f4eee6;
      --muted: #c1b5a6;
      --line: #433a34;
      --brand: #d2a36c;

      --spirituality: #d0a461;
      --human: #97aabd;
      --religion: #c48b82;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 68px;
      padding: 10px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 3px;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text strong {
      display: block;
      font-size: 1rem;
      line-height: 1.1;
    }

    .brand-text span {
      display: block;
      font-size: .83rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn, .chip, .menu-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn:hover, .chip:hover, .menu-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand) 35%, var(--line));
    }

    .hero {
      padding: 28px 0 14px;
    }

    .hero-card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
    }

    .cover-wrap {
      background: var(--panel-2);
      border-right: 1px solid var(--line);
      min-height: 100%;
    }

    .cover-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      max-height: 560px;
      object-fit: cover;
    }

    .hero-copy {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      max-width: 100%;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 78%, transparent);
      color: var(--muted);
      font-size: .88rem;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--brand);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.08;
      letter-spacing: -.02em;
    }

    .subtitle {
      margin: 0;
      font-size: 1.03rem;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 20px;
      padding: 20px 0 40px;
    }

    .stack {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
      min-width: 0;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1.12rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: .86rem;
      color: var(--muted);
      background: var(--panel-2);
    }

    .tag--spirituality { border-color: color-mix(in srgb, var(--spirituality) 45%, var(--line)); }
    .tag--human-nature { border-color: color-mix(in srgb, var(--human) 45%, var(--line)); }
    .tag--religion { border-color: color-mix(in srgb, var(--religion) 45%, var(--line)); }

    .article {
      font-size: 1.04rem;
    }

    .article p:first-child { margin-top: 0; }
    .article p:last-child { margin-bottom: 0; }

    .audio-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .audio-btn.active {
      border-color: color-mix(in srgb, var(--brand) 50%, var(--line));
      background: color-mix(in srgb, var(--brand) 10%, var(--panel));
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .grouped-nav {
      display: grid;
      gap: 14px;
    }

    .group {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel);
    }

    .group summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 600;
      border-bottom: 1px solid transparent;
    }

    .group[open] summary {
      border-bottom-color: var(--line);
      background: var(--panel-2);
    }

    .group[data-group="spirituality"] summary { color: var(--spirituality); }
    .group[data-group="human-nature"] summary { color: var(--human); }
    .group[data-group="religion"] summary { color: var(--religion); }

    .group-links {
      display: grid;
      padding: 8px;
    }

    .group-links a {
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--text);
    }

    .group-links a:hover {
      background: var(--panel-2);
    }

    .group-links a.current {
      background: color-mix(in srgb, var(--brand) 10%, var(--panel-2));
      border: 1px solid color-mix(in srgb, var(--brand) 35%, var(--line));
    }

    .footer {
      padding: 0 0 34px;
    }

    .footer-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      color: var(--muted);
      font-size: .95rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .footer-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 980px) {
      .hero-grid,
      .layout {
        grid-template-columns: 1fr;
      }

      .cover-wrap {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .cover-wrap img {
        max-height: 430px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 16px, 100%);
      }

      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .hero-copy,
      .card {
        padding: 18px;
      }

      h1 {
        font-size: 1.85rem;
      }
    }
  </style>

  <script>
    const PAGE_KEY = "the-madness-of-fath";
  </script>
  <script src="/reflections/assets/reflection-data.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="/reflections/">
        <img src="/reflections/assets/icon-512.png" alt="Solitude Reflections logo">
        <div class="brand-text">
          <strong>Solitude Reflections</strong>
          <span>Stone Grill Press</span>
        </div>
      </a>

      <div class="controls">
        <button class="btn" type="button" onclick="history.back()">Back</button>
        <a class="btn" href="/reflections/">Reflections Home</a>
        <button class="btn" type="button" id="themeToggle">Dark Mode</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero-card">
        <div class="hero-grid">
          <div class="cover-wrap">
            <img id="pageCover" src="" alt="">
          </div>

          <div class="hero-copy">
            <div class="eyebrow">
              <span class="eyebrow-dot"></span>
              <span id="pageCategory">Reflection</span>
            </div>

            <h1 id="pageTitle">Reflection Title</h1>
            <p class="subtitle" id="pageSubtitle"></p>

            <div class="meta">
              <span class="tag" id="pageSlugTag">slug</span>
              <span class="tag" id="pageCategoryTag">category</span>
            </div>

            <div class="hero-actions">
              <a class="chip" href="#audioSection">Jump to Audio</a>
              <a class="chip" href="#articleSection">Jump to Reflection</a>
              <a class="chip" href="#cusdis_thread">Jump to Comments</a>
              <button class="chip" type="button" id="shareBtn">Share</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="stack">
        <article class="card" id="articleSection">
          <h2>Reflection</h2>
          <div class="article" id="articleBody"></div>
        </article>

        <section class="card" id="cusdisSection">
          <h2>Comments</h2>
          <div
            id="cusdis_thread"
            data-host="https://cusdis.com"
            data-app-id="c1f29f24-6d93-4d71-9b92-6df2d3514f2f"
            data-page-id=""
            data-page-url=""
            data-page-title="">
          </div>
        </section>
      </div>

      <aside class="stack">
        <section class="card" id="audioSection">
          <h2>Listen</h2>
          <div class="audio-list" id="audioButtons"></div>
          <div id="audioCaption" class="subtitle"></div>
          <audio id="audioPlayer" controls preload="metadata"></audio>
        </section>

        <section class="card">
          <h2>Explore More Reflections</h2>
          <div class="grouped-nav" id="groupedNav"></div>
        </section>
      </aside>
    </section>
  </main>

  <footer class="footer shell">
    <div class="footer-card">
      <div>Stone Grill Press -- ❖ -- Solitude Reflections</div>
      <div class="footer-links">
        <a href="/">Main Home</a>
        <a href="/reflections/">Reflections Home</a>
        <a href="/order/">Order Page</a>
      </div>
    </div>
  </footer>

  <script>
    const PAGE = REFLECTION_DATA[PAGE_KEY];

    function categoryLabel(key) {
      if (key === "spirituality") return "Spirituality";
      if (key === "human-nature") return "Human Nature";
      if (key === "religion") return "Religion";
      return "Reflection";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setMeta(name, content, attr = "name") {
      let el = document.head.querySelector(`meta[${attr}="${name}"]`);
      if (!el) {
        el = document.createElement("meta");
        el.setAttribute(attr, name);
        document.head.appendChild(el);
      }
      el.setAttribute("content", content || "");
    }

    function setCanonical(url) {
      let el = document.head.querySelector('link[rel="canonical"]');
      if (!el) {
        el = document.createElement("link");
        el.rel = "canonical";
        document.head.appendChild(el);
      }
      el.href = url || "";
    }

    function renderHead() {
      const title = PAGE.title || "Solitude Reflections";
      const description = PAGE.description || `A reflection page from Solitude Reflections: ${title}.`;
      const canonical = PAGE.canonical || location.href;
      const ogImage = PAGE.cover
        ? `https://stonegrillresto.net${PAGE.cover}`
        : "https://stonegrillresto.net/reflections/og-default.jpg";

      document.title = `${title} -- Solitude Reflections · Ninox Antolihao`;
      setMeta("description", description);
      setCanonical(canonical);

      setMeta("og:title", title, "property");
      setMeta("og:description", description, "property");
      setMeta("og:url", canonical, "property");
      setMeta("og:image", ogImage, "property");

      setMeta("twitter:title", title);
      setMeta("twitter:description", description);
      setMeta("twitter:image", ogImage);
    }

    function renderPage() {
      if (!PAGE) {
        document.getElementById("pageTitle").textContent = "Reflection not found";
        return;
      }

      const title = PAGE.title || "Untitled Reflection";
      const subtitle = PAGE.subtitle || "";
      const category = PAGE.category || "religion";

      document.getElementById("pageTitle").textContent = title;
      document.getElementById("pageSubtitle").textContent = subtitle;
      document.getElementById("pageCategory").textContent = categoryLabel(category);
      document.getElementById("pageSlugTag").textContent = PAGE_KEY;
      document.getElementById("pageCategoryTag").textContent = categoryLabel(category);

      const cover = document.getElementById("pageCover");
      cover.src = PAGE.cover || "";
      cover.alt = title;

      const article = document.getElementById("articleBody");
      article.innerHTML = PAGE.articleHtml || `<p>${escapeHtml(PAGE.description || "Reflection content will appear here.")}</p>`;
      document.getElementById("audioCaption").textContent = title;
      document.getElementById("pageCategoryTag").classList.add(`tag--${category}`);
    }

    function renderAudio() {
      const tracks = [
        PAGE.audio1 ? { label: PAGE.audio1Label || "Reflection", src: PAGE.audio1 } : null,
        PAGE.audio2 ? { label: PAGE.audio2Label || "Podcast", src: PAGE.audio2 } : null
      ].filter(Boolean);

      const container = document.getElementById("audioButtons");
      const player = document.getElementById("audioPlayer");

      if (!tracks.length) {
        container.innerHTML = `<span class="subtitle">No audio available yet.</span>`;
        player.remove();
        return;
      }

      function loadTrack(track, btn) {
        player.src = track.src;
        document.getElementById("audioCaption").textContent = `${PAGE.title} -- ${track.label}`;
        [...container.querySelectorAll(".audio-btn")].forEach(b => b.classList.remove("active"));
        if (btn) btn.classList.add("active");
      }

      tracks.forEach((track, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "menu-btn audio-btn";
        btn.textContent = track.label;
        btn.addEventListener("click", () => loadTrack(track, btn));
        container.appendChild(btn);

        if (index === 0) {
          loadTrack(track, btn);
        }
      });
    }

    function renderGroupedNav() {
      const groups = {
        "spirituality": [],
        "human-nature": [],
        "religion": []
      };

      Object.entries(REFLECTION_DATA).forEach(([key, item]) => {
        const group = item.category || "religion";
        if (!groups[group]) groups[group] = [];
        groups[group].push({ key, item });
      });

      const container = document.getElementById("groupedNav");
      container.innerHTML = "";

      ["spirituality", "human-nature", "religion"].forEach(groupKey => {
        const details = document.createElement("details");
        details.className = "group";
        details.dataset.group = groupKey;
        if (groupKey === (PAGE.category || "religion")) details.open = true;

        const summary = document.createElement("summary");
        summary.textContent = categoryLabel(groupKey);
        details.appendChild(summary);

        const links = document.createElement("div");
        links.className = "group-links";

        groups[groupKey].forEach(({ key, item }) => {
          const a = document.createElement("a");
          a.href = item.read || "#";
          a.textContent = item.title || key;
          if (key === PAGE_KEY) a.classList.add("current");
          links.appendChild(a);
        });

        details.appendChild(links);
        container.appendChild(details);
      });
    }

    function setupTheme() {
      const root = document.documentElement;
      const saved = localStorage.getItem("reflections-theme");
      if (saved === "dark" || saved === "light") {
        root.setAttribute("data-theme", saved);
      }

      const toggle = document.getElementById("themeToggle");

      function refreshLabel() {
        toggle.textContent = root.getAttribute("data-theme") === "dark" ? "Light Mode" : "Dark Mode";
      }

      toggle.addEventListener("click", () => {
        const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("reflections-theme", next);
        refreshLabel();
      });

      refreshLabel();
    }

    function setupShare() {
      const btn = document.getElementById("shareBtn");
      btn.addEventListener("click", async () => {
        const shareData = {
          title: PAGE.title,
          text: PAGE.title,
          url: PAGE.canonical || location.href
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
          } else {
            await navigator.clipboard.writeText(shareData.url);
            btn.textContent = "Link Copied";
            setTimeout(() => btn.textContent = "Share", 1400);
          }
        } catch (_) {}
      });
    }

    function setupCusdis() {
      const thread = document.getElementById("cusdis_thread");
      thread.setAttribute("data-page-id", PAGE_KEY);
      thread.setAttribute("data-page-url", PAGE.canonical || location.href);
      thread.setAttribute("data-page-title", PAGE.title || "Solitude Reflections");
    }

    renderHead();
    renderPage();
    renderAudio();
    renderGroupedNav();
    setupTheme();
    setupShare();
    setupCusdis();
  </script>

  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
</body>
</html>
